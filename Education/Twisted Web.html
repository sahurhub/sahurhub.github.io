<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Chaser: Twisted Web</title>
    <style>
        :root {
            --bg-color: rgba(15, 23, 42, 0.85);
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            margin: 0; overflow: hidden; background-color: #000; 
            font-family: system-ui, -apple-system, sans-serif; 
            user-select: none; color: var(--text-main);
        }
        
        #game-canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #hud-canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: var(--bg-color); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: opacity 0.4s ease; 
        }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
        
        h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; font-weight: 500; }
        
        .vehicle-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1000px; }
        .vehicle-card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            padding: 20px; border-radius: 16px; width: 220px; text-align: left; 
            cursor: pointer; transition: all 0.2s ease; 
        }
        .vehicle-card:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-3px); }
        .vehicle-card.selected { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); box-shadow: 0 8px 30px rgba(59, 130, 246, 0.2); }
        
        .v-name { font-weight: 700; font-size: 1.25rem; margin-bottom: 15px; }
        .v-stat { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; font-size: 0.85rem; color: var(--text-muted); font-weight: 600;}
        .v-bar { width: 120px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .v-fill { height: 100%; background: var(--accent); border-radius: 3px; }
        .v-desc { font-size: 0.85rem; color: var(--text-muted); margin-top: 20px; line-height: 1.4; height: 60px;}
        
        #deploy-btn { 
            margin-top: 40px; padding: 16px 60px; font-size: 1.2rem; font-family: inherit; font-weight: 700; 
            background: var(--accent); color: white; border: none; border-radius: 30px; 
            cursor: pointer; transition: 0.2s ease; letter-spacing: 1px;
        }
        #deploy-btn:hover:not(:disabled) { background: var(--accent-hover); transform: scale(1.05); }
        #deploy-btn:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; }

        #pause-menu { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        .damage-pulse { animation: pulseRed 0.5s infinite; }
        @keyframes pulseRed { 0% { box-shadow: inset 0 0 0px red; } 50% { box-shadow: inset 0 0 80px rgba(255,0,0,0.5); } 100% { box-shadow: inset 0 0 0px red; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>
    <canvas id="hud-canvas"></canvas>

    <div id="ui-layer">
        <h1>Twisted Web</h1>
        <div class="subtitle">Select your intercept vehicle</div>
        <div class="vehicle-grid" id="v-grid"></div>
        <button id="deploy-btn" disabled>Deploy to Field</button>
    </div>

    <div id="pause-menu" class="hidden">
        <h1>Paused</h1>
        <p style="color: var(--text-muted); margin-top: -10px; margin-bottom: 30px;">Press ESC to resume</p>
        <div style="text-align: left; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; font-size: 0.9rem;">
            <p><b>WASD</b> - Drive</p>
            <p><b>F</b> - Deploy anchors / Drop suspension</p>
            <p><b>C</b> - Cycle camera view</p>
            <p><b>Right-Click Drag</b> - Orbit Camera</p>
            <p><b>Scroll</b> - Zoom camera</p>
        </div>
    </div>

    <script>
        // --- DATA & CONFIG ---
        const VEHICLES = [
            { id: 'dom3', name: 'Dominator', speed: 7, armor: 9, weight: 8, handling: 6, desc: 'Aerodynamic armored interceptor. F: Drops suspension & hydraulic spikes.', color: 0xaa2222 },
            { id: 'tiv2', name: 'TIV Tank', speed: 5, armor: 10, weight: 10, handling: 4, desc: 'Massive, heavy mobile fortress. F: Deploy ground blades to survive direct hits.', color: 0x333333 },
            { id: 'riv', name: 'Scout RIV', speed: 10, armor: 4, weight: 4, handling: 9, desc: 'Sleek, fast sports interceptor. F: Engage turbo boost (Very light, easily lifted).', color: 0x1066ff },
            { id: 'twistex', name: 'Probe Truck', speed: 6, armor: 7, weight: 6, handling: 7, desc: 'Utility pickup. F: Drop science probe into path for instant data points.', color: 0xffffff },
            { id: 'van', name: 'Doppler Van', speed: 5, armor: 6, weight: 7, handling: 5, desc: 'Mobile radar lab. F: Raise radar mast to passively earn data while parked.', color: 0xdddddd }
        ];

        let selectedVehicleId = null;
        let gameState = 'menu'; 
        let dataPoints = 0;
        let cameraShake = 0;

        // --- AUDIO SYSTEM ---
        const AudioSys = {
            ctx: null, windGain: null, engineOsc: null,
            init() {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                
                const bufferSize = this.ctx.sampleRate * 2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noiseSource = this.ctx.createBufferSource();
                noiseSource.buffer = buffer; noiseSource.loop = true;
                
                const windFilter = this.ctx.createBiquadFilter();
                windFilter.type = 'lowpass'; windFilter.frequency.value = 600;
                
                this.windGain = this.ctx.createGain(); this.windGain.gain.value = 0;
                
                noiseSource.connect(windFilter); windFilter.connect(this.windGain);
                this.windGain.connect(this.ctx.destination); noiseSource.start();

                this.engineOsc = this.ctx.createOscillator(); this.engineOsc.type = 'sawtooth';
                this.engineOsc.frequency.value = 40;
                const engineGain = this.ctx.createGain(); engineGain.gain.value = 0.03;
                this.engineOsc.connect(engineGain); engineGain.connect(this.ctx.destination);
                this.engineOsc.start();
            },
            updateWind(proximity) { 
                if(this.ctx) this.windGain.gain.setTargetAtTime(proximity * 0.8, this.ctx.currentTime, 0.1);
            },
            updateEngine(speedRatio) {
                if(this.ctx) this.engineOsc.frequency.setTargetAtTime(40 + speedRatio * 120, this.ctx.currentTime, 0.1);
            },
            playBang() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.8, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.4);
            }
        };

        // --- CORE ENGINES ---
        const canvas = document.getElementById('game-canvas');
        const hudCanvas = document.getElementById('hud-canvas');
        const hudCtx = hudCanvas.getContext('2d');
        
        let scene, camera, renderer, dirLight, ambientLight, skyMesh;
        let player, tornado, terrain;
        let props = [];
        let time = 0;

        const Input = {
            keys: { w:false, a:false, s:false, d:false },
            mouse: { rightDown: false, x: 0, y: 0 },
            camMode: 0, 
            orbitAngleX: Math.PI, orbitAngleY: Math.PI/6, zoom: 25 // Camera starts behind
        };

        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x5c7a99, 0.0015); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            ambientLight = new THREE.AmbientLight(0xffffff, 0.5); 
            scene.add(ambientLight);

            dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2); 
            dirLight.position.set(150, 250, 100);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.top = 300; dirLight.shadow.camera.bottom = -300;
            dirLight.shadow.camera.left = -300; dirLight.shadow.camera.right = 300;
            scene.add(dirLight);

            const skyGeo = new THREE.SphereGeometry(1500, 32, 15);
            const skyMat = new THREE.MeshBasicMaterial({ color: 0x60a5fa, side: THREE.BackSide }); 
            skyMesh = new THREE.Mesh(skyGeo, skyMat);
            scene.add(skyMesh);

            createWorld();
            window.addEventListener('resize', onWindowResize);
            setupInputs();
        }

        function createWorld() {
            const planeGeo = new THREE.PlaneGeometry(3000, 3000, 64, 64);
            const planeMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.8, flatShading: true });
            
            const pos = planeGeo.attributes.position;
            for(let i=0; i<pos.count; i++) {
                let x = pos.getX(i), y = pos.getY(i);
                if(Math.abs(x % 400) > 20 && Math.abs(y % 400) > 20) { 
                    pos.setZ(i, Math.sin(x*0.01) * Math.cos(y*0.01) * 10);
                }
            }
            planeGeo.computeVertexNormals();

            terrain = new THREE.Mesh(planeGeo, planeMat);
            terrain.rotation.x = -Math.PI / 2;
            terrain.receiveShadow = true;
            scene.add(terrain);

            const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
            for(let i=-3; i<=3; i++) {
                let rNS = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 3000), roadMat);
                rNS.position.set(i * 400, 0.2, 0); rNS.receiveShadow = true; scene.add(rNS);
                
                let lineNS = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 3000), lineMat);
                lineNS.position.set(i*400, 0.25, 0); scene.add(lineNS);

                let rEW = new THREE.Mesh(new THREE.BoxGeometry(3000, 0.2, 12), roadMat);
                rEW.position.set(0, 0.2, i * 400); rEW.receiveShadow = true; scene.add(rEW);
            }

            const treeLeafGeo = new THREE.ConeGeometry(2.5, 7, 5);
            const treeTrunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 2, 5);
            const treeMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32, flatShading:true });
            const woodMat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
            
            const poleGeo = new THREE.CylinderGeometry(0.2, 0.2, 14, 4);
            const crossGeo = new THREE.BoxGeometry(4, 0.2, 0.2);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x4a3b32 });

            for(let i=0; i<400; i++) {
                let x = (Math.random() - 0.5) * 2800;
                let z = (Math.random() - 0.5) * 2800;
                let isNearRoad = (Math.abs(x % 400) < 25 || Math.abs(z % 400) < 25);
                let onRoad = (Math.abs(x % 400) < 10 || Math.abs(z % 400) < 10);
                if(onRoad) continue;

                if(isNearRoad && Math.random() > 0.5) {
                    let group = new THREE.Group();
                    let pole = new THREE.Mesh(poleGeo, poleMat); pole.position.y = 7;
                    let cross = new THREE.Mesh(crossGeo, poleMat); cross.position.y = 13;
                    if(Math.abs(x % 400) < 25) cross.rotation.y = Math.PI/2;
                    group.add(pole, cross); group.position.set(x, 0, z);
                    pole.castShadow = true; scene.add(group);
                    props.push({ mesh: group, type: 'pole', active: true });
                } else if(Math.random() > 0.1) {
                    let group = new THREE.Group();
                    let trunk = new THREE.Mesh(treeTrunkGeo, woodMat); trunk.position.y = 1;
                    let leaves = new THREE.Mesh(treeLeafGeo, treeMat); leaves.position.y = 5;
                    group.add(trunk, leaves); group.position.set(x, 0, z);
                    trunk.castShadow = true; leaves.castShadow = true; scene.add(group);
                    props.push({ mesh: group, type: 'tree', active: true });
                }
            }
        }

        function createWedge(w, h, d) {
            const geom = new THREE.BufferGeometry();
            const vertices = new Float32Array([
                -w/2, 0, -d/2,  w/2, 0, -d/2,  w/2, 0, d/2,
                -w/2, 0, -d/2,  w/2, 0, d/2,  -w/2, 0, d/2,
                -w/2, 0, -d/2,  -w/2, h, -d/2,  w/2, h, -d/2,
                -w/2, 0, -d/2,  w/2, h, -d/2,  w/2, 0, -d/2,
                -w/2, h, -d/2,  -w/2, 0, d/2,   w/2, 0, d/2,
                -w/2, h, -d/2,  w/2, 0, d/2,   w/2, h, -d/2,
                -w/2, 0, -d/2,  -w/2, 0, d/2,  -w/2, h, -d/2,
                w/2, 0, -d/2,   w/2, h, -d/2,  w/2, 0, d/2,
            ]);
            geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            geom.computeVertexNormals();
            return geom;
        }

        class Vehicle {
            constructor(data) {
                this.data = data;
                this.group = new THREE.Group();
                this.chassis = new THREE.Group(); // Holds the body (can squat down)
                this.group.add(this.chassis);

                this.health = 100;
                this.speed = 0;
                this.maxSpeed = data.speed * 4;
                this.turnSpeed = data.handling * 0.005;
                this.armor = data.armor;
                this.weight = data.weight;
                
                this.velocityY = 0; // For vertical lifting
                this.isDeployed = false;
                this.deployCooldown = 0;
                this.airbagsActive = false;
                this.airbags = [];
                
                this.buildGeometry();
                scene.add(this.group);
            }

            buildGeometry() {
                const mat = new THREE.MeshStandardMaterial({ color: this.data.color, roughness: 0.4 });
                const darkMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
                const glassMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.1 });
                
                this.deployParts = [];

                if(this.data.id === 'dom3') {
                    let base = new THREE.Mesh(new THREE.BoxGeometry(2.6, 1.2, 5.5), mat); base.position.y = 1.0;
                    let slope = new THREE.Mesh(createWedge(2.6, 1.5, 2.5), mat); slope.position.set(0, 1.6, 1.5); slope.rotation.y = Math.PI;
                    let roof = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.8, 3), mat); roof.position.set(0, 2.0, -1);
                    this.chassis.add(base, slope, roof);
                    
                    for(let i of [[1.3,2], [-1.3,2], [1.3,-2], [-1.3,-2]]) {
                        let s = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2), darkMat);
                        s.position.set(i[0], 1, i[1]); this.chassis.add(s); this.deployParts.push(s);
                    }
                } 
                else if(this.data.id === 'tiv2') {
                    let base = new THREE.Mesh(new THREE.CylinderGeometry(2.2, 2.2, 6.5, 6), mat); 
                    base.rotation.z = Math.PI/2; base.rotation.y = Math.PI/2; base.position.y = 1.5;
                    let turret = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.5, 1.5, 8), glassMat); turret.position.y = 3;
                    this.chassis.add(base, turret);
                    
                    let b1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.5, 4), darkMat); b1.position.set(2, 1, 0);
                    let b2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.5, 4), darkMat); b2.position.set(-2, 1, 0);
                    this.chassis.add(b1, b2); this.deployParts.push(b1, b2);
                }
                else if(this.data.id === 'riv') {
                    let body = new THREE.Mesh(createWedge(2.2, 1.2, 5), mat); body.position.y = 0.6; body.rotation.y = Math.PI;
                    let cab = new THREE.Mesh(createWedge(1.8, 1, 2.5), glassMat); cab.position.set(0, 1.8, -0.5); cab.rotation.y = Math.PI;
                    let spoiler = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.2, 0.6), darkMat); spoiler.position.set(0, 2, -2.2);
                    this.chassis.add(body, cab, spoiler);
                }
                else if(this.data.id === 'twistex') {
                    let cab = new THREE.Mesh(new THREE.BoxGeometry(2.4, 2, 2.5), mat); cab.position.set(0, 1.5, 1);
                    let bed = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1, 3), mat); bed.position.set(0, 1, -1.5);
                    let pod = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshStandardMaterial({color:0xffaa00})); pod.position.set(0, 1.8, -1.5);
                    this.chassis.add(cab, bed, pod); this.deployParts.push(pod); 
                }
                else { 
                    let body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.8, 5.5), mat); body.position.y = 1.8;
                    let radar = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 0.2, 16), new THREE.MeshStandardMaterial({color:0xdddddd}));
                    radar.rotation.x = Math.PI/2; radar.position.set(0, 3.5, -1);
                    this.chassis.add(body, radar); this.deployParts.push(radar); 
                }

                // Wheels stay outside chassis so they don't squash into the floor
                this.wheels = [];
                const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.5, 16);
                wheelGeo.rotateZ(Math.PI/2);
                const wx = this.data.id === 'tiv2' ? 1.8 : 1.3;
                for(let pos of [[wx, 0.6, 1.8], [-wx, 0.6, 1.8], [wx, 0.6, -1.8], [-wx, 0.6, -1.8]]) {
                    let w = new THREE.Mesh(wheelGeo, darkMat); w.position.set(...pos);
                    this.group.add(w); this.wheels.push(w);
                }

                this.group.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; }});

                const bagGeo = new THREE.SphereGeometry(1, 16, 16);
                const bagMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent:true, opacity:0.8 });
                [ [0, 1.5, 3], [1.5, 1.5, 0], [-1.5, 1.5, 0] ].forEach(pos => {
                    let b = new THREE.Mesh(bagGeo, bagMat);
                    b.position.set(...pos); b.scale.set(0.01,0.01,0.01);
                    this.chassis.add(b); this.airbags.push(b);
                });
            }

            update(dt) {
                if(this.deployCooldown > 0) this.deployCooldown -= dt;

                if(Input.keys.f && this.deployCooldown <= 0 && this.group.position.y <= 0.1) {
                    this.isDeployed = !this.isDeployed;
                    this.deployCooldown = 5; 
                    
                    if(this.data.id === 'riv' && this.isDeployed) {
                        this.speed = this.maxSpeed * 2.5; 
                        setTimeout(() => this.isDeployed = false, 3000);
                    }
                    if(this.data.id === 'twistex' && this.isDeployed) {
                        dataPoints += 200; 
                        this.deployParts[0].visible = false;
                        setTimeout(() => { this.deployParts[0].visible = true; this.isDeployed = false; }, 5000);
                    }
                }

                if(this.data.id === 'van' && this.isDeployed && this.speed < 1 && this.group.position.y <= 0) {
                    dataPoints += 2;
                    this.deployParts[0].rotation.y += dt * 5; 
                }

                // Visual Suspension Squat & Anchors
                let targetChassisY = 0;
                if(this.data.id === 'dom3') {
                    targetChassisY = this.isDeployed ? -0.4 : 0;
                    this.deployParts.forEach(p => p.position.y = THREE.MathUtils.lerp(p.position.y, this.isDeployed ? -0.5 : 1, 0.1));
                } else if(this.data.id === 'tiv2') {
                    targetChassisY = this.isDeployed ? -0.3 : 0;
                    this.deployParts[0].position.x = THREE.MathUtils.lerp(this.deployParts[0].position.x, this.isDeployed ? 2.6 : 2, 0.1);
                    this.deployParts[1].position.x = THREE.MathUtils.lerp(this.deployParts[1].position.x, this.isDeployed ? -2.6 : -2, 0.1);
                }
                this.chassis.position.y = THREE.MathUtils.lerp(this.chassis.position.y, targetChassisY, 0.1);

                // Driving & Airborne Physics
                let isGrounded = (this.group.position.y <= 0.1);

                if(isGrounded) {
                    if(!this.isDeployed || this.data.id === 'riv' || this.data.id === 'twistex' || this.data.id === 'van') {
                        if(Input.keys.w) this.speed += 0.8;
                        else if(Input.keys.s) this.speed -= 0.8;
                        else this.speed *= 0.96; 
                    } else {
                        this.speed *= 0.8; // Anchored brake
                    }
                    
                    this.speed = Math.max(-this.maxSpeed/2, Math.min(this.speed, this.maxSpeed));
                    
                    // Steering (only if moving and grounded)
                    if(Math.abs(this.speed) > 0.1) {
                        let turn = this.turnSpeed * (this.speed > 0 ? 1 : -1);
                        if(Input.keys.a) this.group.rotation.y += turn;
                        if(Input.keys.d) this.group.rotation.y -= turn;
                    }
                } else {
                    // Airborne Drag
                    this.speed *= 0.99;
                }

                // Move forward (Three.js standard is -Z is forward)
                this.group.translateZ(-this.speed * dt); 
                
                // Wheel Spin
                if(isGrounded) this.wheels.forEach(w => w.rotation.x -= this.speed * dt * 1.5);

                // Vertical Lifting Gravity
                this.group.position.y += this.velocityY * dt;
                if(this.group.position.y > 0) {
                    this.velocityY -= 30 * dt; // Gravity
                    this.group.rotation.z = THREE.MathUtils.lerp(this.group.rotation.z, Math.sin(time*10)*0.2, 0.1); // Wobble in air
                } else {
                    if (this.velocityY < -20) this.triggerCollision(Math.abs(this.velocityY) * 0.5); // Fall damage
                    this.group.position.y = 0;
                    this.velocityY = 0;
                    this.group.rotation.z = THREE.MathUtils.lerp(this.group.rotation.z, 0, 0.2); // Settle
                }

                // Map Bounds
                ['x','z'].forEach(axis => {
                    if(this.group.position[axis] > 1450) this.group.position[axis] = 1450;
                    if(this.group.position[axis] < -1450) this.group.position[axis] = -1450;
                });

                let targetScale = this.airbagsActive ? 1.2 : 0.01;
                this.airbags.forEach(b => {
                    b.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.2);
                });
            }

            triggerCollision(impact) {
                if(this.airbagsActive || impact < 2) return;
                this.health -= impact * (10 / this.armor);
                this.airbagsActive = true;
                AudioSys.playBang();
                document.body.classList.add('damage-pulse');
                
                setTimeout(() => {
                    this.airbagsActive = false;
                    document.body.classList.remove('damage-pulse');
                }, 2500);

                if(this.health <= 0) {
                    gameState = 'menu';
                    const ui = document.getElementById('ui-layer');
                    ui.classList.remove('hidden');
                    ui.innerHTML = `<h1 style="color:#ef4444">VEHICLE DESTROYED</h1><p class="subtitle">Data Collected: ${Math.floor(dataPoints)}</p><button id="deploy-btn" onclick="location.reload()">Return to Base</button>`;
                }
            }
        }

        class Tornado {
            constructor() {
                this.group = new THREE.Group();
                this.efScale = Math.floor(Math.random() * 5) + 1; // EF1-EF5
                this.speed = 8 + Math.random() * 4; 
                
                // Spawn on map edge and aim inwards
                let spawnAngle = Math.random() * Math.PI * 2;
                this.group.position.set(Math.cos(spawnAngle) * 1200, 0, Math.sin(spawnAngle) * 1200);
                this.directionAngle = spawnAngle + Math.PI + ((Math.random() - 0.5) * 1.0); // Travel in straight line
                
                const mat = new THREE.MeshStandardMaterial({ color: 0x11161c, roughness: 0.9, transparent: true, opacity: 0.85 });
                this.funnelLayers = [];
                
                // Dynamic size based on EF Scale
                let scaleMult = 0.5 + (this.efScale * 0.3); // EF1 is thin, EF5 is massive

                for(let i=0; i<18; i++) {
                    let radius = (2 + (i * i * 0.4)) * scaleMult;
                    let geo = new THREE.CylinderGeometry(radius*1.15, radius, 12, 16);
                    let mesh = new THREE.Mesh(geo, mat);
                    mesh.position.y = i * 10 + 6;
                    this.funnelLayers.push(mesh);
                    this.group.add(mesh);
                }

                const partGeo = new THREE.BufferGeometry();
                const partCount = 1000 + this.efScale * 500;
                const posArray = new Float32Array(partCount * 3);
                for(let i=0; i<partCount*3; i++) posArray[i] = (Math.random()-0.5)*150 * scaleMult;
                partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const partMat = new THREE.PointsMaterial({ color: 0x222222, size: 3 });
                this.debris = new THREE.Points(partGeo, partMat);
                this.group.add(this.debris);

                scene.add(this.group);
            }

            update(dt, playerPos) {
                // Violent Rotation
                this.group.children.forEach((c, idx) => {
                    c.rotation.y += dt * (8 - idx*0.1);
                    if(c.isMesh) c.position.x = Math.sin(time*2 + idx) * (1 + idx*0.2); 
                });
                
                // Predictable straight-line movement
                this.group.position.x += Math.cos(this.directionAngle) * this.speed * dt;
                this.group.position.z += Math.sin(this.directionAngle) * this.speed * dt;

                let dist = this.group.position.distanceTo(playerPos);
                
                // Dynamic wind/lift calculations
                let pushRadius = 150 + this.efScale * 80;
                
                if(dist < pushRadius) {
                    let windStrength = (1 - dist/pushRadius) * this.efScale; // 0 to EF Scale
                    let gripThreshold = player.isDeployed ? player.weight * 0.8 : player.weight * 0.4;
                    
                    // Only drift if wind strength overcomes vehicle grip (EF4/5 usually)
                    if (windStrength > gripThreshold) {
                        let force = (windStrength - gripThreshold) * 40;
                        let dir = new THREE.Vector3().subVectors(playerPos, this.group.position).normalize();
                        let tangent = new THREE.Vector3(-dir.z, 0, dir.x);
                        
                        // Drag vehicle inward and sideways
                        player.group.position.addScaledVector(dir, -force * dt * 0.5); 
                        player.group.position.addScaledVector(tangent, force * dt * 0.8);
                    }

                    // Lifting Logic! (Close proximity core)
                    let coreRadius = 40 + this.efScale * 10;
                    if(dist < coreRadius) {
                        let liftForce = (this.efScale * 15) * (1 - dist/coreRadius);
                        if (player.isDeployed) liftForce *= 0.2; // Anchors prevent most lift
                        
                        if (liftForce > player.weight) {
                            player.velocityY += (liftForce - player.weight) * dt * 5; // Launch upward
                        }
                        
                        player.triggerCollision(8 * dt); // Core damage over time
                    }

                    cameraShake = Math.max(0, windStrength * 0.2);
                } else {
                    cameraShake = 0;
                }

                props.forEach(p => {
                    if(p.active && this.group.position.distanceTo(p.mesh.position) < 40 + this.efScale*8) {
                        p.active = false;
                        p.mesh.scale.set(0.1, 0.1, 0.1); 
                        p.mesh.position.y = -5;
                        dataPoints += 15; 
                    }
                });

                return { dist, speed: (this.speed * 15) + (this.efScale*30), ef: this.efScale }; 
            }
        }

        // --- INPUT & CAMERA ---
        function setupInputs() {
            window.addEventListener('keydown', e => {
                if(e.key === 'Escape') togglePause();
                if(gameState !== 'playing') return;
                const k = e.key.toLowerCase();
                if(Input.keys.hasOwnProperty(k)) Input.keys[k] = true;
                if(k === 'f') Input.keys.f = true;
                if(k === 'c') Input.camMode = (Input.camMode + 1) % 4;
            });
            window.addEventListener('keyup', e => {
                const k = e.key.toLowerCase();
                if(Input.keys.hasOwnProperty(k)) Input.keys[k] = false;
                if(k === 'f') Input.keys.f = false;
            });
            window.addEventListener('mousedown', e => {
                if(e.button === 2 || e.button === 1) { Input.mouse.rightDown = true; Input.mouse.x = e.clientX; Input.mouse.y = e.clientY; }
            });
            window.addEventListener('mouseup', e => { if(e.button === 2 || e.button === 1) Input.mouse.rightDown = false; });
            window.addEventListener('mousemove', e => {
                if(Input.mouse.rightDown) {
                    Input.orbitAngleX += (e.clientX - Input.mouse.x) * 0.01;
                    Input.orbitAngleY += (e.clientY - Input.mouse.y) * 0.01;
                    Input.orbitAngleY = Math.max(0.05, Math.min(Math.PI/2.1, Input.orbitAngleY));
                    Input.mouse.x = e.clientX; Input.mouse.y = e.clientY;
                }
            });
            window.addEventListener('wheel', e => { Input.zoom = Math.max(8, Math.min(60, Input.zoom + e.deltaY * 0.05)); });
            document.addEventListener('contextmenu', e => e.preventDefault());
        }

        function updateCamera() {
            if(!player) return;
            const target = player.group.position.clone();
            let camPos = new THREE.Vector3();

            if(Input.camMode === 0) { // Chase Cam (Fixed to face the way we drive)
                if(!Input.mouse.rightDown) {
                    // Smoothly auto-align behind the car
                    let diff = player.group.rotation.y - Input.orbitAngleX;
                    // Normalize angle
                    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                    Input.orbitAngleX += diff * 0.05;
                }
                
                // Math standard: Car drives -Z. To place camera BEHIND it, we add Z.
                camPos.set(
                    target.x + Math.sin(Input.orbitAngleX) * Input.zoom * Math.cos(Input.orbitAngleY),
                    target.y + Math.sin(Input.orbitAngleY) * Input.zoom,
                    target.z + Math.cos(Input.orbitAngleX) * Input.zoom * Math.cos(Input.orbitAngleY)
                );
            } else if(Input.camMode === 1) { // Hood
                camPos.set(target.x - Math.sin(player.group.rotation.y)*0.5, target.y + 2.5, target.z - Math.cos(player.group.rotation.y)*0.5);
                target.set(target.x - Math.sin(player.group.rotation.y)*20, target.y + 2, target.z - Math.cos(player.group.rotation.y)*20);
            } else if(Input.camMode === 2) { // Cinematic
                camPos.set(target.x + Math.sin(time*0.5)*35, target.y + 8, target.z + Math.cos(time*0.5)*35);
            } else if(Input.camMode === 3) { // Drone
                camPos.set(target.x, target.y + 60, target.z);
            }

            if(cameraShake > 0) {
                camPos.x += (Math.random()-0.5) * cameraShake;
                camPos.y += (Math.random()-0.5) * cameraShake;
                camPos.z += (Math.random()-0.5) * cameraShake;
            }

            camera.position.lerp(camPos, 0.2);
            camera.lookAt(target);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            hudCanvas.width = window.innerWidth;
            hudCanvas.height = window.innerHeight;
        }

        function togglePause() {
            if(gameState === 'playing') {
                gameState = 'paused';
                document.getElementById('pause-menu').classList.remove('hidden');
            } else if(gameState === 'paused') {
                gameState = 'playing';
                document.getElementById('pause-menu').classList.add('hidden');
                lastTime = performance.now();
                animate(lastTime);
            }
        }

        // --- MODERN HUD ---
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath(); ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r);
            ctx.arcTo(x+w, y+h, x, y+h, r); ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
        }

        function drawHUD(tStats) {
            hudCtx.clearRect(0,0, hudCanvas.width, hudCanvas.height);
            hudCtx.font = '600 15px system-ui, sans-serif';
            
            const mapSize = 160;
            const mX = 25, mY = 25;
            hudCtx.fillStyle = 'rgba(15, 23, 42, 0.6)';
            roundRect(hudCtx, mX, mY, mapSize, mapSize, 12); hudCtx.fill();
            
            let px = (player.group.position.x / 3000) * mapSize + mapSize/2;
            let py = (player.group.position.z / 3000) * mapSize + mapSize/2;
            hudCtx.fillStyle = '#3b82f6';
            hudCtx.beginPath(); hudCtx.arc(mX+px, mY+py, 4, 0, Math.PI*2); hudCtx.fill();

            let tx = (tornado.group.position.x / 3000) * mapSize + mapSize/2;
            let ty = (tornado.group.position.z / 3000) * mapSize + mapSize/2;
            hudCtx.fillStyle = '#ef4444';
            hudCtx.beginPath(); hudCtx.arc(mX+tx, mY+ty, 6 + (tStats.ef), 0, Math.PI*2); hudCtx.fill(); // Blip scales with EF

            const panelBg = 'rgba(15, 23, 42, 0.7)';
            
            hudCtx.textAlign = 'right'; hudCtx.fillStyle = panelBg;
            roundRect(hudCtx, window.innerWidth - 220, 25, 195, 90, 12); hudCtx.fill();
            hudCtx.fillStyle = '#94a3b8';
            hudCtx.fillText(`Distance`, window.innerWidth - 45, 50);
            hudCtx.fillText(`Vortex Wind`, window.innerWidth - 45, 75);
            hudCtx.fillStyle = '#f8fafc';
            hudCtx.fillText(`${Math.floor(tStats.dist)}m`, window.innerWidth - 130, 50);
            hudCtx.fillText(`${Math.floor(tStats.speed)} mph`, window.innerWidth - 130, 75);
            
            hudCtx.fillStyle = tStats.ef > 3 ? '#ef4444' : '#f59e0b';
            hudCtx.font = '800 22px system-ui, sans-serif';
            hudCtx.fillText(`EF-${tStats.ef}`, window.innerWidth - 45, 100);

            hudCtx.textAlign = 'left'; hudCtx.font = '600 15px system-ui, sans-serif';
            hudCtx.fillStyle = panelBg;
            roundRect(hudCtx, 25, window.innerHeight - 110, 240, 85, 12); hudCtx.fill();

            hudCtx.fillStyle = '#f8fafc';
            hudCtx.fillText(`${Math.floor(Math.abs(player.speed * 8))} MPH`, 45, window.innerHeight - 80);
            if (player.group.position.y > 0.5) hudCtx.fillText(`[ AIRBORNE! ]`, 130, window.innerHeight - 80);
            
            hudCtx.fillStyle = 'rgba(255,255,255,0.1)';
            roundRect(hudCtx, 45, window.innerHeight - 65, 200, 8, 4); hudCtx.fill();
            hudCtx.fillStyle = player.health > 40 ? '#10b981' : '#ef4444';
            roundRect(hudCtx, 45, window.innerHeight - 65, Math.max(0, player.health * 2), 8, 4); hudCtx.fill();

            if(player.deployCooldown > 0) {
                hudCtx.fillStyle = '#f59e0b'; hudCtx.fillText(`RECHARGING...`, 45, window.innerHeight - 40);
            } else {
                hudCtx.fillStyle = player.isDeployed ? '#3b82f6' : '#94a3b8';
                hudCtx.fillText(player.isDeployed ? "ACTIVE [F]" : "READY [F]", 45, window.innerHeight - 40);
            }

            hudCtx.textAlign = 'center'; hudCtx.font = '800 24px system-ui, sans-serif';
            hudCtx.fillStyle = '#3b82f6';
            hudCtx.fillText(`${Math.floor(dataPoints)}`, window.innerWidth/2, window.innerHeight - 35);
            hudCtx.font = '600 12px system-ui, sans-serif';
            hudCtx.fillStyle = '#94a3b8';
            hudCtx.fillText(`DATA COLLECTED`, window.innerWidth/2, window.innerHeight - 60);

            if(tStats.dist < 250) {
                let intensity = (1 - tStats.dist/250) * 0.4;
                let grd = hudCtx.createRadialGradient(window.innerWidth/2, window.innerHeight/2, window.innerHeight/3, window.innerWidth/2, window.innerHeight/2, window.innerWidth);
                grd.addColorStop(0, "transparent"); grd.addColorStop(1, `rgba(239, 68, 68, ${intensity})`);
                hudCtx.fillStyle = grd; hudCtx.fillRect(0,0, window.innerWidth, window.innerHeight);
            }
        }

        // --- MAIN LOOP ---
        let lastTime = 0;
        function animate(now) {
            if(gameState !== 'playing') return;
            requestAnimationFrame(animate);
            
            let dt = (now - lastTime) / 1000;
            if(dt > 0.1) dt = 0.1;
            lastTime = now;
            time += dt;

            player.update(dt);
            let tStats = tornado.update(dt, player.group.position);
            
            let stormFactor = Math.max(0, 1 - tStats.dist / 1200);
            skyMesh.material.color.setHex(0x60a5fa).lerp(new THREE.Color(0x1e293b), stormFactor); 
            scene.fog.color.setHex(0x5c7a99).lerp(new THREE.Color(0x1e293b), stormFactor);
            dirLight.intensity = 1.2 * (1 - stormFactor * 0.8);
            ambientLight.intensity = 0.5 * (1 - stormFactor * 0.5);
            
            AudioSys.updateWind(stormFactor);
            AudioSys.updateEngine(Math.abs(player.speed / player.maxSpeed));

            updateCamera();
            renderer.render(scene, camera);
            drawHUD(tStats);
        }

        // --- BOOTSTRAP ---
        function buildMenu() {
            const grid = document.getElementById('v-grid');
            VEHICLES.forEach(v => {
                const card = document.createElement('div');
                card.className = 'vehicle-card';
                card.innerHTML = `
                    <div class="v-name">${v.name}</div>
                    <div class="v-stat"><span>SPEED</span><div class="v-bar"><div class="v-fill" style="width:${v.speed*10}%"></div></div></div>
                    <div class="v-stat"><span>ARMOR</span><div class="v-bar"><div class="v-fill" style="width:${v.armor*10}%"></div></div></div>
                    <div class="v-stat"><span>WEIGHT</span><div class="v-bar"><div class="v-fill" style="width:${v.weight*10}%"></div></div></div>
                    <div class="v-desc">${v.desc}</div>
                `;
                card.onclick = () => {
                    document.querySelectorAll('.vehicle-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedVehicleId = v.id;
                    document.getElementById('deploy-btn').disabled = false;
                };
                grid.appendChild(card);
            });
            document.getElementById('deploy-btn').onclick = () => startGame();
        }

        function startGame() {
            document.getElementById('ui-layer').classList.add('hidden');
            initThree();
            AudioSys.init();
            
            const vData = VEHICLES.find(v => v.id === selectedVehicleId);
            player = new Vehicle(vData);
            tornado = new Tornado();

            onWindowResize(); 
            gameState = 'playing';
            lastTime = performance.now();
            requestAnimationFrame(animate);
        }

        window.onload = buildMenu;
    </script>
</body>
