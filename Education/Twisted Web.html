<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Chaser: Twisted Web v4</title>
    <style>
        :root {
            --bg-color: rgba(15, 23, 42, 0.85);
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            margin: 0; overflow: hidden; background-color: #000; 
            font-family: system-ui, -apple-system, sans-serif; 
            user-select: none; color: var(--text-main);
        }
        
        #game-canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #hud-canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: var(--bg-color); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: opacity 0.4s ease; 
            /* Fix for Chromebooks / small screens: allow scrolling if it doesn't fit */
            overflow-y: auto; padding: 40px 0; box-sizing: border-box;
        }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
        
        h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; text-shadow: 0 4px 20px rgba(0,0,0,0.5); text-align: center; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 20px; font-weight: 500; text-align: center;}
        
        .career-stats { background: rgba(0,0,0,0.4); padding: 10px 30px; border-radius: 20px; font-weight: bold; color: #22c55e; margin-bottom: 30px; border: 1px solid rgba(34, 197, 94, 0.3); }

        .vehicle-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1000px; padding: 0 20px;}
        .vehicle-card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            padding: 20px; border-radius: 16px; width: 220px; text-align: left; 
            cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden;
        }
        .vehicle-card:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-3px); }
        .vehicle-card.selected { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); box-shadow: 0 8px 30px rgba(59, 130, 246, 0.2); }
        
        .v-name { font-weight: 700; font-size: 1.25rem; margin-bottom: 15px; }
        .v-stat { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; font-size: 0.85rem; color: var(--text-muted); font-weight: 600;}
        .v-bar { width: 120px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .v-fill { height: 100%; background: var(--accent); border-radius: 3px; }
        .v-desc { font-size: 0.85rem; color: var(--text-muted); margin-top: 20px; line-height: 1.4; height: 60px;}
        
        #deploy-btn { 
            margin-top: 40px; margin-bottom: 20px; padding: 16px 80px; font-size: 1.5rem; font-weight: 800; 
            background: var(--accent); color: white; border: none; border-radius: 30px; 
            cursor: pointer; transition: 0.2s ease; letter-spacing: 2px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        #deploy-btn:hover:not(:disabled) { background: var(--accent-hover); transform: scale(1.05); }
        #deploy-btn:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; box-shadow: none; }

        #pause-menu { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        .damage-pulse { animation: pulseRed 0.5s infinite; }
        @keyframes pulseRed { 0% { box-shadow: inset 0 0 0px red; } 50% { box-shadow: inset 0 0 80px rgba(255,0,0,0.5); } 100% { box-shadow: inset 0 0 0px red; } }
        
        .flash-white { animation: flashScreen 0.2s ease-out; }
        @keyframes flashScreen { 0% { background-color: white; opacity: 1; } 100% { background-color: transparent; opacity: 0; } }
        #lightning-flash { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 5; pointer-events: none; opacity: 0; background: white; }

        /* --- NEW HUD ELEMENTS --- */
        #game-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 8; pointer-events: none;
        }

        #money-container {
            position: absolute; top: 20px; right: 30px; text-align: right;
            font-size: 2.5rem; font-weight: 900; color: #4ade80;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        #money-popups {
            position: absolute; top: 60px; right: 0; width: 200px;
            display: flex; flex-direction: column; align-items: flex-end;
        }

        .money-popup {
            font-size: 1.5rem; font-weight: bold; color: #22c55e;
            animation: floatUpFade 2s ease-out forwards;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }

        @keyframes floatUpFade {
            0% { transform: translateY(0) scale(1.5); opacity: 1; }
            100% { transform: translateY(-50px) scale(1); opacity: 0; }
        }

        #deploy-probe-btn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; font-size: 1.2rem; font-weight: 800;
            background: #f59e0b; color: white; border: 3px solid #b45309; border-radius: 12px;
            cursor: pointer; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        #deploy-probe-btn:hover { background: #fbbf24; transform: translateX(-50%) scale(1.05); }
        #deploy-probe-btn:active { background: #d97706; transform: translateX(-50%) scale(0.95); }
        
        .probe-cooldown { opacity: 0.5; cursor: not-allowed !important; }

        /* MESONET UI */
        #mesonet-ui {
            position: absolute; bottom: 20px; right: 20px; 
            background: rgba(15, 23, 42, 0.85); border: 2px solid #22c55e; color: #22c55e; 
            padding: 15px; border-radius: 8px; font-family: monospace; min-width: 220px; 
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
            pointer-events: auto;
        }
        .meso-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .meso-val { font-size: 1.4em; color: white; font-weight: bold; }
        .meso-unit { font-size: 0.6em; color: #22c55e; margin-left: 4px; }

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>
    <canvas id="hud-canvas"></canvas>
    <div id="lightning-flash"></div>

    <!-- UI LAYER -->
    <div id="ui-layer">
        <h1>Twisted Web</h1>
        <div class="subtitle">Select your intercept vehicle</div>
        <div class="career-stats" id="career-data">Total Funds: $0</div>
        <div class="vehicle-grid" id="v-grid"></div>
        <button id="deploy-btn" disabled>GO</button>
    </div>

    <!-- IN-GAME HUD -->
    <div id="game-ui" class="hidden">
        <div id="money-container">
            $<span id="money-text">0</span>
            <div id="money-popups"></div>
        </div>
        
        <button id="deploy-probe-btn">DEPLOY MESONET PROBE</button>
        
        <!-- Mesonet Bottom Right -->
        <div id="mesonet-ui">
            <div style="border-bottom: 1px solid #22c55e; padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; display: flex; justify-content: space-between;">
                <span>MESONET // LIVE</span> <span id="meso-source">TIV-1</span>
            </div>
            <div class="meso-row">
                <span>WIND:</span> 
                <div><span class="meso-val" id="meso-wind">0.0</span><span class="meso-unit">MPH</span></div>
            </div>
            <div class="meso-row">
                <span>PRES:</span> 
                <div><span class="meso-val" id="meso-pres">1013</span><span class="meso-unit">MB</span></div>
            </div>
            <div class="meso-row">
                <span>DIST:</span> 
                <div><span class="meso-val" id="meso-dist">0</span><span class="meso-unit">M</span></div>
            </div>
        </div>
    </div>

    <!-- PAUSE MENU -->
    <div id="pause-menu" class="hidden">
        <h1>Paused</h1>
        <p style="color: var(--text-muted); margin-top: -10px; margin-bottom: 30px;">Press ESC to resume</p>
        <div style="text-align: left; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; font-size: 0.9rem; line-height: 1.8;">
            <b>WASD</b> - Drive & Steer<br>
            <b>F</b> - Vehicle Special Ability<br>
            <b>C</b> - Cycle camera view (Car/Probes)<br>
            <b>Right-Click Drag</b> - Orbit Camera<br>
            <b>Scroll</b> - Zoom camera
        </div>
        <button id="return-btn" style="margin-top: 30px; padding: 12px 30px; background: #ef4444; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight:bold;">ABORT & RETURN</button>
    </div>

    <script>
        // --- DATA & CONFIG ---
        const VEHICLES = [
            { id: 'dom3', name: 'Dominator', speed: 7, armor: 9, weight: 8, handling: 6, desc: 'Aerodynamic armored interceptor. F: Drops suspension & hydraulic spikes.', color: 0xaa2222 },
            { id: 'tiv2', name: 'TIV Tank', speed: 5, armor: 10, weight: 10, handling: 4, desc: 'Massive, heavy mobile fortress. F: Deploy ground blades to survive direct hits.', color: 0x333333 },
            { id: 'riv', name: 'Scout RIV', speed: 10, armor: 4, weight: 4, handling: 9, desc: 'Sleek, fast sports interceptor. F: Engage turbo boost (Very light, easily lifted).', color: 0x1066ff },
            { id: 'twistex', name: 'Probe Truck', speed: 6, armor: 7, weight: 6, handling: 7, desc: 'Utility pickup. Passive: Free probes. F: Drop science pod.', color: 0xffffff },
            { id: 'van', name: 'Doppler Van', speed: 5, armor: 6, weight: 7, handling: 5, desc: 'Mobile radar lab. F: Raise radar mast to passively earn money while parked.', color: 0xdddddd }
        ];

        let careerMoney = 0; // Persistent between rounds
        let sessionMoney = 0;
        
        let selectedVehicleId = null;
        let gameState = 'menu'; 
        let clock = new THREE.Clock();
        
        let activeProbes = [];
        let probeCooldown = 0;

        // --- AUDIO SYSTEM ---
        const AudioSys = {
            ctx: null, windGain: null, engineOsc: null,
            init() {
                if(this.ctx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                
                const bufferSize = this.ctx.sampleRate * 2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noiseSource = this.ctx.createBufferSource();
                noiseSource.buffer = buffer; noiseSource.loop = true;
                
                const windFilter = this.ctx.createBiquadFilter();
                windFilter.type = 'lowpass'; windFilter.frequency.value = 400;
                
                this.windGain = this.ctx.createGain(); this.windGain.gain.value = 0;
                
                noiseSource.connect(windFilter); windFilter.connect(this.windGain);
                this.windGain.connect(this.ctx.destination); noiseSource.start();

                this.engineOsc = this.ctx.createOscillator(); this.engineOsc.type = 'sawtooth';
                this.engineOsc.frequency.value = 40;
                const engineGain = this.ctx.createGain(); engineGain.gain.value = 0.02;
                this.engineOsc.connect(engineGain); engineGain.connect(this.ctx.destination);
                this.engineOsc.start();
            },
            updateWind(proximity) { 
                if(this.ctx) this.windGain.gain.setTargetAtTime(proximity * 0.9, this.ctx.currentTime, 0.1);
            },
            updateEngine(speedRatio) {
                if(this.ctx) this.engineOsc.frequency.setTargetAtTime(40 + speedRatio * 100, this.ctx.currentTime, 0.1);
            },
            playBang() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            },
            playThunder() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(50, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 2.5);
                gain.gain.setValueAtTime(0.6, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 2.5);
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.setValueAtTime(300, this.ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 2);
                
                osc.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 2.5);
            }
        };

        // --- CORE ENGINES ---
        const canvas = document.getElementById('game-canvas');
        const hudCanvas = document.getElementById('hud-canvas');
        const hudCtx = hudCanvas.getContext('2d');
        
        let scene, camera, renderer, dirLight, ambientLight, skyMesh, lightningLight;
        let player, tornado, terrain;
        let props = [], rainParticles, dirtParticles;
        let time = 0;
        let animationId;

        const Input = {
            keys: { w:false, a:false, s:false, d:false, f:false },
            mouse: { rightDown: false, x: 0, y: 0 },
            camMode: 0, 
            orbitAngleX: Math.PI, orbitAngleY: Math.PI/8, zoom: 25 
        };

        // MONEY SYSTEM
        function addMoney(amount) {
            sessionMoney += amount;
            careerMoney += amount;
            document.getElementById('money-text').innerText = sessionMoney;
            document.getElementById('career-data').innerText = `Total Funds: $${careerMoney}`;
            
            const popupsContainer = document.getElementById('money-popups');
            const popup = document.createElement('div');
            popup.className = 'money-popup';
            popup.innerText = "+$" + amount;
            popupsContainer.appendChild(popup);
            
            setTimeout(() => {
                if(popup.parentNode) popup.parentNode.removeChild(popup);
            }, 2000);
        }

        function initThree() {
            if(scene) renderer.dispose();
            sessionMoney = 0;
            activeProbes = [];
            Input.camMode = 0;
            document.getElementById('money-text').innerText = "0";

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x5c7a99, 0.0012); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            ambientLight = new THREE.AmbientLight(0xffffff, 0.5); 
            scene.add(ambientLight);

            dirLight = new THREE.DirectionalLight(0xfff5e6, 1.0); 
            dirLight.position.set(150, 250, 100);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.top = 400; dirLight.shadow.camera.bottom = -400;
            dirLight.shadow.camera.left = -400; dirLight.shadow.camera.right = 400;
            scene.add(dirLight);

            lightningLight = new THREE.PointLight(0xe0f2fe, 0, 1000);
            lightningLight.position.set(0, 300, 0);
            scene.add(lightningLight);

            const skyGeo = new THREE.SphereGeometry(1500, 32, 15);
            const skyMat = new THREE.MeshBasicMaterial({ color: 0x60a5fa, side: THREE.BackSide }); 
            skyMesh = new THREE.Mesh(skyGeo, skyMat);
            scene.add(skyMesh);

            createWorld();
            createWeatherSystems();
            
            const vData = VEHICLES.find(v => v.id === selectedVehicleId);
            player = new Vehicle(vData);
            tornado = new Tornado();

            window.addEventListener('resize', onWindowResize);
            
            clock.start();
            animate();
        }

        function createWeatherSystems() {
            const rainGeo = new THREE.BufferGeometry();
            const rainCount = 2000;
            const rainPos = new Float32Array(rainCount * 3);
            for(let i=0; i<rainCount*3; i++) {
                rainPos[i] = (Math.random() - 0.5) * 200; 
            }
            rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
            const rainMat = new THREE.PointsMaterial({color: 0x94a3b8, size: 0.2, transparent: true, opacity: 0.6});
            rainParticles = new THREE.Points(rainGeo, rainMat);
            scene.add(rainParticles);

            const dirtGeo = new THREE.BufferGeometry();
            const dirtCount = 100;
            const dirtPos = new Float32Array(dirtCount * 3);
            const dirtLife = new Float32Array(dirtCount);
            for(let i=0; i<dirtCount; i++) { dirtPos[i*3]=0; dirtPos[i*3+1]=-100; dirtPos[i*3+2]=0; dirtLife[i]=0; }
            dirtGeo.setAttribute('position', new THREE.BufferAttribute(dirtPos, 3));
            dirtGeo.setAttribute('life', new THREE.BufferAttribute(dirtLife, 1));
            const dirtMat = new THREE.PointsMaterial({color: 0x5d4037, size: 1.5, transparent: true, opacity: 0.4});
            dirtParticles = new THREE.Points(dirtGeo, dirtMat);
            scene.add(dirtParticles);
        }

        function spawnDirt(x, z, angle) {
            const pos = dirtParticles.geometry.attributes.position.array;
            const life = dirtParticles.geometry.attributes.life.array;
            for(let i=0; i<100; i++) {
                if(life[i] <= 0) {
                    pos[i*3] = x + (Math.random()-0.5)*2;
                    pos[i*3+1] = 0.5;
                    pos[i*3+2] = z + (Math.random()-0.5)*2;
                    life[i] = 1.0;
                    break;
                }
            }
        }

        function createWorld() {
            const planeGeo = new THREE.PlaneGeometry(3000, 3000, 64, 64);
            const planeMat = new THREE.MeshStandardMaterial({ color: 0x3d5a40, roughness: 0.9, flatShading: true });
            
            const pos = planeGeo.attributes.position;
            for(let i=0; i<pos.count; i++) {
                let x = pos.getX(i), y = pos.getY(i);
                if(Math.abs(x % 400) > 20 && Math.abs(y % 400) > 20) { 
                    pos.setZ(i, Math.sin(x*0.01) * Math.cos(y*0.01) * 8);
                }
            }
            planeGeo.computeVertexNormals();

            terrain = new THREE.Mesh(planeGeo, planeMat);
            terrain.rotation.x = -Math.PI / 2;
            terrain.receiveShadow = true;
            scene.add(terrain);

            const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
            for(let i=-3; i<=3; i++) {
                let rNS = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 3000), roadMat);
                rNS.position.set(i * 400, 0.2, 0); rNS.receiveShadow = true; scene.add(rNS);
                
                let lineNS = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 3000), lineMat);
                lineNS.position.set(i*400, 0.25, 0); scene.add(lineNS);

                let rEW = new THREE.Mesh(new THREE.BoxGeometry(3000, 0.2, 12), roadMat);
                rEW.position.set(0, 0.2, i * 400); rEW.receiveShadow = true; scene.add(rEW);
            }

            const treeLeafGeo = new THREE.ConeGeometry(3, 8, 5);
            const treeTrunkGeo = new THREE.CylinderGeometry(0.5, 0.7, 2, 5);
            const treeMat = new THREE.MeshStandardMaterial({ color: 0x2e5a27, flatShading:true });
            const woodMat = new THREE.MeshStandardMaterial({ color: 0x4a3b32 });
            
            const poleGeo = new THREE.CylinderGeometry(0.2, 0.2, 14, 4);
            const crossGeo = new THREE.BoxGeometry(4, 0.2, 0.2);

            props = [];
            for(let i=0; i<400; i++) {
                let x = (Math.random() - 0.5) * 2800;
                let z = (Math.random() - 0.5) * 2800;
                let isNearRoad = (Math.abs(x % 400) < 25 || Math.abs(z % 400) < 25);
                let onRoad = (Math.abs(x % 400) < 10 || Math.abs(z % 400) < 10);
                if(onRoad) continue;

                if(isNearRoad && Math.random() > 0.5) {
                    let group = new THREE.Group();
                    let pole = new THREE.Mesh(poleGeo, woodMat); pole.position.y = 7;
                    let cross = new THREE.Mesh(crossGeo, woodMat); cross.position.y = 13;
                    if(Math.abs(x % 400) < 25) cross.rotation.y = Math.PI/2;
                    group.add(pole, cross); group.position.set(x, 0, z);
                    pole.castShadow = true; scene.add(group);
                    props.push({ mesh: group, type: 'pole', active: true });
                } else if(Math.random() > 0.1) {
                    let group = new THREE.Group();
                    let trunk = new THREE.Mesh(treeTrunkGeo, woodMat); trunk.position.y = 1;
                    let leaves = new THREE.Mesh(treeLeafGeo, treeMat); leaves.position.y = 5;
                    group.add(trunk, leaves); group.position.set(x, 0, z);
                    trunk.castShadow = true; leaves.castShadow = true; scene.add(group);
                    props.push({ mesh: group, type: 'tree', active: true });
                }
            }
        }

        function createWedge(w, h, d) {
            const geom = new THREE.BufferGeometry();
            const vertices = new Float32Array([
                -w/2, 0, -d/2,  w/2, 0, -d/2,  w/2, 0, d/2,
                -w/2, 0, -d/2,  w/2, 0, d/2,  -w/2, 0, d/2,
                -w/2, 0, -d/2,  -w/2, h, -d/2,  w/2, h, -d/2,
                -w/2, 0, -d/2,  w/2, h, -d/2,  w/2, 0, -d/2,
                -w/2, h, -d/2,  -w/2, 0, d/2,   w/2, 0, d/2,
                -w/2, h, -d/2,  w/2, 0, d/2,   w/2, h, -d/2,
                -w/2, 0, -d/2,  -w/2, 0, d/2,  -w/2, h, -d/2,
                w/2, 0, -d/2,   w/2, h, -d/2,  w/2, 0, d/2,
            ]);
            geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            geom.computeVertexNormals();
            return geom;
        }

        class Vehicle {
            constructor(data) {
                this.data = data;
                this.group = new THREE.Group();
                this.chassis = new THREE.Group(); 
                this.group.add(this.chassis);

                this.health = 100;
                this.speed = 0;
                this.maxSpeed = data.speed * 4;
                this.turnSpeed = data.handling * 0.005;
                this.armor = data.armor;
                this.weight = data.weight;
                
                this.velocityY = 0; 
                this.isDeployed = false;
                this.deployCooldown = 0;
                this.airbagsActive = false;
                this.airbags = [];
                
                this.buildGeometry();
                scene.add(this.group);
                
                this.group.rotation.y = Math.PI;
            }

            buildGeometry() {
                const mat = new THREE.MeshStandardMaterial({ color: this.data.color, roughness: 0.4 });
                const darkMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
                const glassMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.1 });
                
                this.deployParts = [];

                if(this.data.id === 'dom3') {
                    let base = new THREE.Mesh(new THREE.BoxGeometry(2.6, 1.2, 5.5), mat); base.position.y = 1.0;
                    let slope = new THREE.Mesh(createWedge(2.6, 1.5, 2.5), mat); slope.position.set(0, 1.6, 1.5); slope.rotation.y = Math.PI;
                    let roof = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.8, 3), mat); roof.position.set(0, 2.0, -1);
                    this.chassis.add(base, slope, roof);
                    
                    for(let i of [[1.3,2], [-1.3,2], [1.3,-2], [-1.3,-2]]) {
                        let s = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2), darkMat);
                        s.position.set(i[0], 1, i[1]); this.chassis.add(s); this.deployParts.push(s);
                    }
                } 
                else if(this.data.id === 'tiv2') {
                    let base = new THREE.Mesh(new THREE.CylinderGeometry(2.2, 2.2, 6.5, 6), mat); 
                    base.rotation.z = Math.PI/2; base.rotation.y = Math.PI/2; base.position.y = 1.5;
                    let turret = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.5, 1.5, 8), glassMat); turret.position.y = 3;
                    this.chassis.add(base, turret);
                    
                    let b1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.5, 4), darkMat); b1.position.set(2, 1, 0);
                    let b2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.5, 4), darkMat); b2.position.set(-2, 1, 0);
                    this.chassis.add(b1, b2); this.deployParts.push(b1, b2);
                }
                else if(this.data.id === 'riv') {
                    let body = new THREE.Mesh(createWedge(2.2, 1.2, 5), mat); body.position.y = 0.6; body.rotation.y = Math.PI;
                    let cab = new THREE.Mesh(createWedge(1.8, 1, 2.5), glassMat); cab.position.set(0, 1.8, -0.5); cab.rotation.y = Math.PI;
                    let spoiler = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.2, 0.6), darkMat); spoiler.position.set(0, 2, -2.2);
                    this.chassis.add(body, cab, spoiler);
                }
                else if(this.data.id === 'twistex') {
                    let cab = new THREE.Mesh(new THREE.BoxGeometry(2.4, 2, 2.5), mat); cab.position.set(0, 1.5, 1);
                    let bed = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1, 3), mat); bed.position.set(0, 1, -1.5);
                    let pod = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshStandardMaterial({color:0xffaa00})); pod.position.set(0, 1.8, -1.5);
                    this.chassis.add(cab, bed, pod); this.deployParts.push(pod); 
                }
                else { 
                    let body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.8, 5.5), mat); body.position.y = 1.8;
                    let radar = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 0.2, 16), new THREE.MeshStandardMaterial({color:0xdddddd}));
                    radar.rotation.x = Math.PI/2; radar.position.set(0, 3.5, -1);
                    this.chassis.add(body, radar); this.deployParts.push(radar); 
                }

                this.wheels = [];
                const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.5, 16);
                wheelGeo.rotateZ(Math.PI/2);
                const wx = this.data.id === 'tiv2' ? 1.8 : 1.3;
                for(let pos of [[wx, 0.6, 1.8], [-wx, 0.6, 1.8], [wx, 0.6, -1.8], [-wx, 0.6, -1.8]]) {
                    let w = new THREE.Mesh(wheelGeo, darkMat); w.position.set(...pos);
                    this.group.add(w); this.wheels.push(w);
                }

                this.group.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; }});

                const bagGeo = new THREE.SphereGeometry(1, 16, 16);
                const bagMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent:true, opacity:0.8 });
                [ [0, 1.5, 3], [1.5, 1.5, 0], [-1.5, 1.5, 0] ].forEach(pos => {
                    let b = new THREE.Mesh(bagGeo, bagMat);
                    b.position.set(...pos); b.scale.set(0.01,0.01,0.01);
                    this.chassis.add(b); this.airbags.push(b);
                });
            }

            update(dt) {
                if(this.deployCooldown > 0) this.deployCooldown -= dt;

                if(Input.keys.f && this.deployCooldown <= 0 && this.group.position.y <= 0.1) {
                    this.isDeployed = !this.isDeployed;
                    this.deployCooldown = 3; 
                    
                    if(this.data.id === 'riv' && this.isDeployed) {
                        this.speed = this.maxSpeed * 2.5; 
                        setTimeout(() => this.isDeployed = false, 3000);
                    }
                    if(this.data.id === 'twistex' && this.isDeployed) {
                        addMoney(100); 
                        this.deployParts[0].visible = false;
                        setTimeout(() => { this.deployParts[0].visible = true; this.isDeployed = false; }, 4000);
                    }
                }

                if(this.data.id === 'van' && this.isDeployed && this.speed < 1 && this.group.position.y <= 0) {
                    if(Math.random() < 0.05) addMoney(5);
                    this.deployParts[0].rotation.y += dt * 5; 
                }

                let targetChassisY = 0;
                if(this.data.id === 'dom3') {
                    targetChassisY = this.isDeployed ? -0.4 : 0;
                    this.deployParts.forEach(p => p.position.y = THREE.MathUtils.lerp(p.position.y, this.isDeployed ? -0.5 : 1, 0.1));
                } else if(this.data.id === 'tiv2') {
                    targetChassisY = this.isDeployed ? -0.3 : 0;
                    this.deployParts[0].position.x = THREE.MathUtils.lerp(this.deployParts[0].position.x, this.isDeployed ? 2.6 : 2, 0.1);
                    this.deployParts[1].position.x = THREE.MathUtils.lerp(this.deployParts[1].position.x, this.isDeployed ? -2.6 : -2, 0.1);
                }
                this.chassis.position.y = THREE.MathUtils.lerp(this.chassis.position.y, targetChassisY, 0.1);

                let isGrounded = (this.group.position.y <= 0.1);
                
                let onGrass = (Math.abs(this.group.position.x % 400) > 12 && Math.abs(this.group.position.z % 400) > 12);
                if(isGrounded && Math.abs(this.speed) > 5 && onGrass) {
                    spawnDirt(this.group.position.x, this.group.position.z, this.group.rotation.y);
                }

                if(isGrounded) {
                    if(!this.isDeployed || this.data.id === 'riv' || this.data.id === 'twistex' || this.data.id === 'van') {
                        if(Input.keys.w) this.speed += 0.8;
                        else if(Input.keys.s) this.speed -= 0.8;
                        else this.speed *= 0.95; 
                    } else {
                        this.speed *= 0.8; 
                    }
                    
                    this.speed = Math.max(-this.maxSpeed/2, Math.min(this.speed, this.maxSpeed));
                    
                    if(Math.abs(this.speed) > 0.1) {
                        let turn = this.turnSpeed * (this.speed > 0 ? 1 : -1);
                        if(Input.keys.a) this.group.rotation.y += turn;
                        if(Input.keys.d) this.group.rotation.y -= turn;
                    }
                } else {
                    this.speed *= 0.99;
                }

                this.group.translateZ(-this.speed * dt); 
                if(isGrounded) this.wheels.forEach(w => w.rotation.x -= this.speed * dt * 1.5);

                this.group.position.y += this.velocityY * dt;
                if(this.group.position.y > 0) {
                    this.velocityY -= 40 * dt; 
                    this.group.rotation.z = THREE.MathUtils.lerp(this.group.rotation.z, Math.sin(time*10)*0.3, 0.05); 
                } else {
                    if (this.velocityY < -20) this.triggerCollision(Math.abs(this.velocityY) * 0.4); 
                    this.group.position.y = 0;
                    this.velocityY = 0;
                    this.group.rotation.z = THREE.MathUtils.lerp(this.group.rotation.z, 0, 0.1);
                }
            }

            triggerCollision(force) {
                this.health -= force * (10 / this.armor);
                document.body.classList.add('damage-pulse');
                setTimeout(() => document.body.classList.remove('damage-pulse'), 500);
                AudioSys.playBang();
                if(this.health <= 0 && gameState === 'playing') {
                    endSession(false);
                }
            }
        }

        class Tornado {
            constructor() {
                this.mesh = new THREE.Group();
                this.mesh.position.set(0, 0, -400);
                
                this.velocity = new THREE.Vector3((Math.random()-0.5)*15, 0, (Math.random()-0.5)*15);
                this.speed = 10;
                
                // Funnel Particles
                const particleCount = 2000;
                const geo = new THREE.BufferGeometry();
                const pos = new Float32Array(particleCount * 3);
                for (let i = 0; i < particleCount; i++) {
                    const height = Math.random() * 150;
                    const radius = 5 + Math.pow(height, 1.2) * 0.15 + Math.random() * 5;
                    const angle = Math.random() * Math.PI * 2;
                    pos[i * 3] = Math.cos(angle) * radius;
                    pos[i * 3 + 1] = height;
                    pos[i * 3 + 2] = Math.sin(angle) * radius;
                }
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const mat = new THREE.PointsMaterial({ color: 0x444450, size: 4, transparent: true, opacity: 0.5 });
                this.particles = new THREE.Points(geo, mat);
                this.mesh.add(this.particles);
                scene.add(this.mesh);

                // --- TORNADO PATH PROJECTOR ---
                const pathGeo = new THREE.PlaneGeometry(30, 400);
                pathGeo.translate(0, 200, 0); // Offset to extend outward
                pathGeo.rotateX(-Math.PI / 2);
                
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                const grad = ctx.createLinearGradient(0, 0, 0, 256);
                grad.addColorStop(0, 'rgba(255, 30, 0, 0.6)'); 
                grad.addColorStop(1, 'rgba(255, 30, 0, 0)');
                ctx.fillStyle = grad; ctx.fillRect(0, 0, 64, 256);

                const pathTex = new THREE.CanvasTexture(canvas);
                const pathMat = new THREE.MeshBasicMaterial({ map: pathTex, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending });
                this.pathMesh = new THREE.Mesh(pathGeo, pathMat);
                this.pathMesh.position.y = 0.5;
                scene.add(this.pathMesh);
            }

            update(dt) {
                this.particles.rotation.y -= 0.15;
                
                // Wander
                if(Math.random() < 0.02) {
                    this.velocity.x += (Math.random() - 0.5) * 5;
                    this.velocity.z += (Math.random() - 0.5) * 5;
                    this.velocity.normalize().multiplyScalar(this.speed);
                }
                
                this.mesh.position.addScaledVector(this.velocity, dt);

                // Update Path Projector LookAt
                this.pathMesh.position.x = this.mesh.position.x;
                this.pathMesh.position.z = this.mesh.position.z;
                const lookTarget = this.mesh.position.clone().add(this.velocity);
                this.pathMesh.lookAt(lookTarget.x, this.pathMesh.position.y, lookTarget.z);

                // Physics interaction with Player
                let distToPlayer = this.mesh.position.distanceTo(player.group.position);
                if (distToPlayer < 80) {
                    let pullStrength = (80 - distToPlayer) / 80;
                    
                    // Suction
                    let liftResist = player.weight + (player.isDeployed ? player.weight * 2 : 0);
                    if (pullStrength > liftResist * 0.05 && player.group.position.y < 50) {
                        player.velocityY += pullStrength * 50 * dt;
                    }

                    // Pull towards center
                    let dir = new THREE.Vector3().subVectors(this.mesh.position, player.group.position).normalize();
                    player.group.position.addScaledVector(dir, pullStrength * 10 * dt);
                }
            }
        }

        class Probe {
            constructor(pos) {
                this.mesh = new THREE.Group();
                let base = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1, 0.5), new THREE.MeshStandardMaterial({color: 0xffaa00}));
                let ant = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 2), new THREE.MeshStandardMaterial({color: 0xffffff}));
                ant.position.y = 1; base.position.y = 0.25;
                this.mesh.add(base, ant);
                this.mesh.position.copy(pos);
                scene.add(this.mesh);
            }
        }

        function deployProbe() {
            if (probeCooldown > 0) return;
            let p = new Probe(player.group.position);
            activeProbes.push(p);
            probeCooldown = 5;
            document.getElementById('deploy-probe-btn').classList.add('probe-cooldown');
            addMoney(50); // Reward for deploying
        }

        function setupInputs() {
            // Setup Garage UI
            const grid = document.getElementById('v-grid');
            VEHICLES.forEach(v => {
                let card = document.createElement('div');
                card.className = 'vehicle-card';
                card.innerHTML = `
                    <div class="v-name">${v.name}</div>
                    <div class="v-stat">SPD <div class="v-bar"><div class="v-fill" style="width:${v.speed*10}%"></div></div></div>
                    <div class="v-stat">ARM <div class="v-bar"><div class="v-fill" style="width:${v.armor*10}%"></div></div></div>
                    <div class="v-stat">WGT <div class="v-bar"><div class="v-fill" style="width:${v.weight*10}%"></div></div></div>
                    <div class="v-desc">${v.desc}</div>
                `;
                card.onclick = () => {
                    document.querySelectorAll('.vehicle-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedVehicleId = v.id;
                    document.getElementById('deploy-btn').disabled = false;
                };
                grid.appendChild(card);
            });

            document.getElementById('deploy-btn').onclick = () => {
                document.getElementById('ui-layer').classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                AudioSys.init();
                gameState = 'playing';
                initThree();
            };

            document.getElementById('deploy-probe-btn').onclick = deployProbe;

            document.getElementById('return-btn').onclick = () => {
                endSession(true);
            };

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    if (gameState === 'playing') {
                        gameState = 'paused';
                        document.getElementById('pause-menu').classList.remove('hidden');
                    } else if (gameState === 'paused') {
                        gameState = 'playing';
                        document.getElementById('pause-menu').classList.add('hidden');
                    }
                }
                if(gameState !== 'playing') return;
                
                const k = e.key.toLowerCase();
                if(Input.keys.hasOwnProperty(k)) Input.keys[k] = true;
                if(k === 'c') {
                    Input.camMode++;
                    if(Input.camMode > activeProbes.length) Input.camMode = 0;
                }
                if(e.code === 'Space') deployProbe();
            });

            document.addEventListener('keyup', e => {
                const k = e.key.toLowerCase();
                if(Input.keys.hasOwnProperty(k)) Input.keys[k] = false;
            });

            document.addEventListener('mousedown', e => {
                if (e.button === 2) Input.mouse.rightDown = true;
                Input.mouse.x = e.clientX; Input.mouse.y = e.clientY;
            });

            document.addEventListener('mouseup', e => {
                if (e.button === 2) Input.mouse.rightDown = false;
            });

            document.addEventListener('mousemove', e => {
                if (Input.mouse.rightDown && gameState === 'playing') {
                    let dx = e.clientX - Input.mouse.x;
                    let dy = e.clientY - Input.mouse.y;
                    Input.orbitAngleX -= dx * 0.01;
                    Input.orbitAngleY -= dy * 0.01;
                    Input.orbitAngleY = Math.max(0.1, Math.min(Math.PI/2 - 0.1, Input.orbitAngleY));
                    Input.mouse.x = e.clientX;
                    Input.mouse.y = e.clientY;
                }
            });

            document.addEventListener('wheel', e => {
                if(gameState === 'playing') {
                    Input.zoom += e.deltaY * 0.05;
                    Input.zoom = Math.max(10, Math.min(50, Input.zoom));
                }
            });

            // Prevent context menu
            document.addEventListener('contextmenu', e => e.preventDefault());
        }

        function endSession(safe) {
            gameState = 'menu';
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            
            if(!safe) {
                // Penalize career money
                careerMoney = Math.max(0, careerMoney - Math.floor(sessionMoney / 2));
            }
            document.getElementById('career-data').innerText = `Total Funds: $${careerMoney}`;
        }

        function onWindowResize() {
            if(!camera) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            let dt = clock.getDelta();
            time += dt;

            if (gameState !== 'playing') return;

            if(probeCooldown > 0) {
                probeCooldown -= dt;
                if(probeCooldown <= 0) document.getElementById('deploy-probe-btn').classList.remove('probe-cooldown');
            }

            player.update(dt);
            tornado.update(dt);

            // Lightning
            if (Math.random() < 0.005) {
                lightningLight.intensity = 2 + Math.random() * 3;
                setTimeout(() => lightningLight.intensity = 0, 100);
                setTimeout(() => AudioSys.playThunder(), 1000 + Math.random()*2000);
                
                let flash = document.getElementById('lightning-flash');
                flash.classList.remove('flash-white');
                void flash.offsetWidth; 
                flash.classList.add('flash-white');
            }

            // Audio Updates
            let d = player.group.position.distanceTo(tornado.mesh.position);
            AudioSys.updateWind(Math.max(0, 1 - (d / 800)));
            AudioSys.updateEngine(Math.abs(player.speed) / player.maxSpeed);

            // Weather Particles Follow Cam Target
            let targetMesh = Input.camMode === 0 ? player.group : activeProbes[Input.camMode - 1].mesh;
            
            const pArr = rainParticles.geometry.attributes.position.array;
            for(let i=0; i<pArr.length; i+=3) {
                pArr[i+1] -= 100 * dt;
                if(pArr[i+1] < 0) {
                    pArr[i] = targetMesh.position.x + (Math.random()-0.5)*200;
                    pArr[i+1] = 100;
                    pArr[i+2] = targetMesh.position.z + (Math.random()-0.5)*200;
                }
            }
            rainParticles.geometry.attributes.position.needsUpdate = true;

            const dArr = dirtParticles.geometry.attributes.position.array;
            const lArr = dirtParticles.geometry.attributes.life.array;
            for(let i=0; i<lArr.length; i++) {
                if(lArr[i] > 0) {
                    lArr[i] -= dt;
                    dArr[i*3+1] += 5 * dt; 
                    if(lArr[i] <= 0) dArr[i*3+1] = -100;
                }
            }
            dirtParticles.geometry.attributes.position.needsUpdate = true;

            // Camera System
            let camOffset = new THREE.Vector3();
            camOffset.x = Math.sin(Input.orbitAngleX) * Math.cos(Input.orbitAngleY) * Input.zoom;
            camOffset.y = Math.sin(Input.orbitAngleY) * Input.zoom;
            camOffset.z = Math.cos(Input.orbitAngleX) * Math.cos(Input.orbitAngleY) * Input.zoom;
            
            camera.position.lerp(targetMesh.position.clone().add(camOffset), 0.1);
            camera.lookAt(targetMesh.position.x, targetMesh.position.y + 2, targetMesh.position.z);

            // --- CAMERA SHAKE FIX ---
            // Only shakes subtly when you are incredibly close (< 150m)
            let distToTornado = targetMesh.position.distanceTo(tornado.mesh.position);
            let shake = 0;
            if (distToTornado < 150) {
                shake = ((150 - distToTornado) / 150) * 0.5; // Very tiny value, max 0.5 units of jitter
            }

            if (shake > 0) {
                camera.position.x += (Math.random() - 0.5) * shake;
                camera.position.y += (Math.random() - 0.5) * shake;
                camera.position.z += (Math.random() - 0.5) * shake;
            }

            // --- MESONET UI UPDATES ---
            let mesoSource = Input.camMode === 0 ? "TIV-1" : "PROBE " + Input.camMode;
            document.getElementById('meso-source').innerText = mesoSource;

            // Calculate live data based on distance
            let baseWind = 12 + Math.random()*2;
            let basePres = 1013;
            if (distToTornado < 400) {
                let intensity = Math.pow((400 - distToTornado) / 400, 2);
                baseWind += intensity * 260;
                basePres -= intensity * 110;
            }

            document.getElementById('meso-wind').innerText = baseWind.toFixed(1);
            document.getElementById('meso-pres').innerText = basePres.toFixed(1);
            document.getElementById('meso-dist').innerText = distToTornado.toFixed(0);

            let mesoDiv = document.getElementById('mesonet-ui');
            if (distToTornado < 80) {
                mesoDiv.style.borderColor = '#ef4444';
                mesoDiv.style.color = '#ef4444';
            } else if (distToTornado < 200) {
                mesoDiv.style.borderColor = '#eab308';
                mesoDiv.style.color = '#eab308';
            } else {
                mesoDiv.style.borderColor = '#22c55e';
                mesoDiv.style.color = '#22c55e';
            }

            renderer.render(scene, camera);
        }

        // Boot
        setupInputs();
    </script>
</body>
</html>
