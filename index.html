<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahur Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F0F7F2;--card:#FFFFFF;--border:#A8D5B0;
  --purple:#1E7A45;--rose:#D4690E;--green:#1A9950;
  --blue:#1A6FA0;--gold:#B8820A;--mid:#2E6040;--dark:#122018;
  --mint:#D0EDD8;--lav:#D0EDD8;--pink:#C5EDD0;--yel:#FFF0A0;--sky:#C8E8F8;--peach:#FFE0A0;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;overflow-x:hidden;}

/* ── GRASS ── */
.grass{position:fixed;bottom:0;left:0;width:100%;height:52px;z-index:5;pointer-events:none;}
.grass svg{width:100%;height:100%;}

/* ── FLOATING EGGS ── */
#floaters{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.egg-f{position:absolute;bottom:-80px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;animation:riseEgg linear infinite;}
@keyframes riseEgg{
  0%{transform:translateY(0) rotate(0deg) scale(1);}
  25%{transform:translateY(-25vh) rotate(90deg) scale(1.05);}
  50%{transform:translateY(-50vh) rotate(180deg) scale(0.95);}
  75%{transform:translateY(-75vh) rotate(270deg) scale(1.05);}
  100%{transform:translateY(-110vh) rotate(360deg) scale(1);}
}

/* ── HEADER ── */
header{position:relative;z-index:10;text-align:center;padding:1.8rem 1rem 0.8rem;background:linear-gradient(180deg,#D0EDD8 0%,transparent 100%);}
.ears{display:flex;justify-content:center;gap:12px;margin-bottom:-4px;}
.ear{width:18px;height:42px;background:#C5EDD0;border-radius:50% 50% 30% 30%;border:2.5px solid var(--green);position:relative;animation:earWiggle 1.8s ease-in-out infinite;}
.ear.l{transform-origin:bottom center;animation-delay:0s;}
.ear.r{transform-origin:bottom center;animation-delay:0.15s;}
@keyframes earWiggle{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
.ear::after{content:'';position:absolute;top:7px;left:5px;width:7px;height:24px;background:var(--green);border-radius:50%;opacity:0.4;}

.logo{font-family:'Bubblegum Sans',cursive;font-size:clamp(2rem,7vw,3.8rem);color:var(--purple);letter-spacing:1px;display:inline-flex;align-items:center;gap:0.15em;animation:logoBounce 2.4s cubic-bezier(0.34,1.8,0.64,1) infinite;}
@keyframes logoBounce{0%,100%{transform:translateY(0) scale(1);}40%{transform:translateY(-8px) scale(1.04);}60%{transform:translateY(-5px) scale(1.02);}}
.logo .hi{color:var(--rose);}
.eggico{display:inline-block;width:0.62em;height:0.75em;background:linear-gradient(135deg,#C5EDD0,#A8D8B8);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;border:2.5px solid var(--green);animation:eggSpin 3s ease-in-out infinite;}
@keyframes eggSpin{0%,100%{transform:rotate(-10deg) scale(1);}50%{transform:rotate(10deg) scale(1.1);}}

.tagline{color:var(--mid);font-size:0.9rem;margin-top:0.3rem;font-weight:800;letter-spacing:0.5px;}

/* ── NAV ── */
nav{display:flex;justify-content:center;gap:0.5rem;flex-wrap:wrap;padding:0.75rem 1rem;position:relative;z-index:10;}
.fb{background:white;border:2.5px solid var(--border);color:var(--mid);padding:0.35rem 1.1rem;border-radius:999px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:900;cursor:pointer;transition:transform 0.15s cubic-bezier(0.34,1.7,0.64,1),background 0.15s,box-shadow 0.15s;}
.fb:hover{transform:scale(1.1) translateY(-3px);}
.fb.active{background:var(--green);border-color:var(--green);color:white;transform:scale(1.08) translateY(-2px);box-shadow:0 5px 16px rgba(26,153,80,0.4);}

/* ── MAIN ── */
main{position:relative;z-index:10;max-width:1100px;margin:0 auto;padding:1rem 1.5rem 5rem;}
#hv{display:block;}
#av{display:none;}

.sec-title{font-family:'Bubblegum Sans',cursive;font-size:1.45rem;color:var(--green);margin-bottom:1.3rem;display:flex;align-items:center;gap:0.5rem;}

/* ── ACTIVITY CARDS ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:1.3rem;margin-bottom:3rem;}
.acard{background:var(--card);border:2.5px solid var(--border);border-radius:22px;overflow:hidden;cursor:pointer;transition:transform 0.2s cubic-bezier(0.34,1.7,0.64,1),box-shadow 0.2s,border-color 0.2s;position:relative;}
.acard:hover{transform:translateY(-8px) scale(1.03) rotate(-1deg);box-shadow:0 14px 32px rgba(26,153,80,0.22);border-color:var(--green);}
.acard:active{transform:scale(0.96);}
.athumb{width:100%;aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;}
.bdg{position:absolute;top:8px;right:8px;color:white;font-size:0.62rem;font-weight:900;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:0.5px;z-index:2;animation:bdgPop 2s ease-in-out infinite;}
@keyframes bdgPop{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
.bdg.hot{background:var(--rose);}
.bdg.new{background:var(--green);}
.bdg.cls{background:var(--purple);}
.ainfo{padding:0.7rem 1rem 0.2rem;}
.aname{font-family:'Bubblegum Sans',cursive;font-size:1.05rem;color:var(--dark);}
.acat{font-size:0.72rem;font-weight:900;text-transform:uppercase;letter-spacing:0.5px;margin-top:1px;}
.startbtn{display:block;width:calc(100% - 1.5rem);margin:0.6rem 0.75rem 0.75rem;padding:0.52rem;background:linear-gradient(135deg,var(--green),var(--rose));border:none;border-radius:12px;color:white;font-family:'Bubblegum Sans',cursive;font-size:1rem;cursor:pointer;transition:transform 0.15s cubic-bezier(0.34,1.8,0.64,1),box-shadow 0.15s;letter-spacing:1px;}
.startbtn:hover{transform:scale(1.06);box-shadow:0 5px 16px rgba(26,153,80,0.45);}
.startbtn:active{transform:scale(0.95);}

/* ── ACTIVITY VIEW ── */
.backbtn{display:inline-flex;align-items:center;gap:0.5rem;background:white;border:2.5px solid var(--border);color:var(--mid);padding:0.45rem 1.2rem;border-radius:999px;font-family:'Nunito',sans-serif;font-weight:900;cursor:pointer;font-size:0.9rem;margin-bottom:1.25rem;transition:transform 0.15s cubic-bezier(0.34,1.8,0.64,1),border-color 0.15s;}
.backbtn:hover{border-color:var(--green);color:var(--green);transform:translateX(-4px) scale(1.04);}
.stats{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
.stat{background:white;border:2.5px solid var(--border);border-radius:14px;padding:0.5rem 1.1rem;text-align:center;transition:transform 0.15s cubic-bezier(0.34,1.8,0.64,1);}
.stat:hover{transform:scale(1.05);}
.sl{font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--mid);margin-bottom:1px;}
.sv{font-family:'Bubblegum Sans',cursive;font-size:1.4rem;color:var(--green);}
.stage{background:#fff;border-radius:22px;overflow:hidden;border:2.5px solid var(--border);box-shadow:0 6px 24px rgba(26,153,80,0.12);display:flex;align-items:center;justify-content:center;position:relative;}
.stage canvas{display:block;max-width:100%;}
.hint{margin-top:0.85rem;padding:0.65rem 1rem;background:var(--mint);border-radius:12px;font-size:0.85rem;color:var(--mid);font-weight:800;}

/* ── MEMORY ── */
.mem-board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:18px;max-width:420px;margin:0 auto;width:100%;}
.mc{aspect-ratio:1;border-radius:14px;cursor:pointer;perspective:700px;}
.mci{width:100%;height:100%;position:relative;transition:transform 0.45s cubic-bezier(0.34,1.4,0.64,1);transform-style:preserve-3d;}
.mc.fl .mci{transform:rotateY(180deg);}
.mface{position:absolute;inset:0;border-radius:14px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.mback{background:linear-gradient(135deg,var(--green),var(--rose));border:3px solid rgba(255,255,255,0.45);font-size:1.4rem;}
.mback::after{content:'';width:52%;height:60%;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;background:rgba(255,255,255,0.22);position:absolute;top:16%;}
.mfront{background:var(--card);border:2.5px solid var(--border);transform:rotateY(180deg);font-size:1.9rem;}

/* ── 2048 BOARD ── */
.b48{background:var(--mint);border-radius:14px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 auto;max-width:380px;width:100%;}
.t48{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bubblegum Sans',cursive;font-size:1.3rem;background:rgba(255,255,255,0.5);color:var(--mid);border:2px solid rgba(255,255,255,0.7);transition:transform 0.08s cubic-bezier(0.34,1.8,0.64,1);}
.t48.pop{animation:tilePop 0.15s cubic-bezier(0.34,2,0.64,1);}
@keyframes tilePop{0%{transform:scale(0.85);}100%{transform:scale(1);}}
.v2{background:#FFF0A0;color:#6B4A00;border-color:#F0D040;}
.v4{background:#FFD878;color:#6B3200;border-color:#F0A820;}
.v8{background:#FFB830;color:#5A2400;border-color:#E08000;}
.v16{background:#FF8C00;color:#fff;border-color:#D06400;font-size:1.1rem;}
.v32{background:#C5EDD0;color:#0A4A28;border-color:#52A872;font-size:1.1rem;}
.v64{background:#90D4A8;color:#082A18;border-color:#1A9950;font-size:1.1rem;}
.v128{background:#1A9950;color:#fff;border-color:#12763C;font-size:.95rem;}
.v256{background:#D4690E;color:#fff;border-color:#A84A08;font-size:.95rem;}
.v512{background:#1A6FA0;color:#fff;border-color:#0E4E72;font-size:.95rem;}
.v1024{background:#122018;color:#fff;border-color:#0A1410;font-size:.8rem;}
.v2048{background:linear-gradient(135deg,#1A9950,#D4690E);color:#fff;border-color:#D4690E;font-size:.8rem;}

/* ── OVERLAY ── */
.ov{position:absolute;inset:0;background:rgba(230,248,235,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:20px;gap:1rem;z-index:20;animation:ovIn 0.35s cubic-bezier(0.34,1.6,0.64,1);}
@keyframes ovIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
.ov h2{font-family:'Bubblegum Sans',cursive;font-size:2.3rem;color:var(--green);}
.ov p{color:var(--mid);font-size:1rem;font-weight:800;}
.odeco{font-size:2rem;display:flex;gap:8px;animation:decorSpin 1s cubic-bezier(0.34,1.6,0.64,1);}
@keyframes decorSpin{from{transform:scale(0) rotate(-180deg);}to{transform:scale(1) rotate(0deg);}}
.rb{background:linear-gradient(135deg,var(--green),var(--rose));border:none;color:#fff;font-family:'Bubblegum Sans',cursive;font-size:1.15rem;padding:0.65rem 2.2rem;border-radius:999px;cursor:pointer;letter-spacing:1px;transition:transform 0.15s cubic-bezier(0.34,1.8,0.64,1),box-shadow 0.15s;animation:btnBounceIn 0.5s cubic-bezier(0.34,1.6,0.64,1);}
@keyframes btnBounceIn{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.rb:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(26,153,80,0.45);}
.rb:active{transform:scale(0.95);}

footer{text-align:center;padding:1.2rem 1rem 70px;color:var(--mid);font-size:0.8rem;font-weight:800;position:relative;z-index:10;}

@media(max-width:500px){
  .mem-board{gap:7px;padding:10px;max-width:300px;}
  .mface{font-size:1.3rem;}
  .mfront{font-size:1.5rem;}
  .b48{gap:7px;padding:10px;}
  .t48{font-size:.95rem;}
}
</style>
</head>
<body>

<!-- Floating egg bg -->
<div id="floaters"></div>

<header>
  <div class="ears"><div class="ear l"></div><div class="ear r"></div></div>
  <div class="logo">
    <div class="eggico"></div>
    Sahur&nbsp;<span class="hi">Hub</span>
    <div class="eggico"></div>
  </div>
  <p class="tagline">🐣 Sahur Hub</p>
</header>

<nav>
  <button class="fb active" onclick="filt('all',this)">🥚 All</button>
  <button class="fb" onclick="filt('action',this)">🐇 Action</button>
  <button class="fb" onclick="filt('puzzle',this)">🌸 Puzzle</button>
  <button class="fb" onclick="filt('classic',this)">🍬 Classic</button>
</nav>

<main>
  <!-- HOME -->
  <div id="hv">
    <p class="sec-title">🌷 Featured Activities</p>
    <div class="grid">

      <div class="acard" data-cat="action" data-id="snake">
        <div class="athumb" style="background:linear-gradient(135deg,#C8F2DC,#A8E6C0)">🐍
          <span class="bdg hot">Hot</span></div>
        <div class="ainfo"><p class="aname">Spring Snake</p><p class="acat" style="color:var(--green)">Action</p></div>
        <button class="startbtn" onclick="launch('snake')">▶ Start</button>
      </div>

      <div class="acard" data-cat="classic" data-id="tetris">
        <div class="athumb" style="background:linear-gradient(135deg,#EDD5F8,#D4B8F0)">🟪
          <span class="bdg cls">Classic</span></div>
        <div class="ainfo"><p class="aname">Egg Stacker</p><p class="acat" style="color:var(--purple)">Classic</p></div>
        <button class="startbtn" onclick="launch('tetris')">▶ Start</button>
      </div>

      <div class="acard" data-cat="classic" data-id="pong">
        <div class="athumb" style="background:linear-gradient(135deg,#FFE0CC,#FFD0B0)">🏓
          <span class="bdg hot">Hot</span></div>
        <div class="ainfo"><p class="aname">Bunny Bounce</p><p class="acat" style="color:var(--gold)">Classic</p></div>
        <button class="startbtn" onclick="launch('pong')">▶ Start</button>
      </div>

      <div class="acard" data-cat="puzzle" data-id="memory">
        <div class="athumb" style="background:linear-gradient(135deg,#FFD6E7,#FFB8D4)">🃏
          <span class="bdg new">New</span></div>
        <div class="ainfo"><p class="aname">Egg Hunt Match</p><p class="acat" style="color:var(--rose)">Puzzle</p></div>
        <button class="startbtn" onclick="launch('memory')">▶ Start</button>
      </div>

      <div class="acard" data-cat="puzzle" data-id="g2048">
        <div class="athumb" style="background:linear-gradient(135deg,#FFF3B0,#FFE880)">🥚
          <span class="bdg new">New</span></div>
        <div class="ainfo"><p class="aname">Egg 2048</p><p class="acat" style="color:var(--gold)">Puzzle</p></div>
        <button class="startbtn" onclick="launch('g2048')">▶ Start</button>
      </div>

    </div>
  </div>

  <!-- ACTIVITY VIEW -->
  <div id="av">
    <button class="backbtn" onclick="goHome()">🐣 Back</button>
    <div class="stats" id="stats"></div>
    <div class="stage" id="stage"></div>
    <div class="hint" id="hint"></div>
  </div>
</main>

<div class="grass">

</div>

<footer>🐰 Sahur Hub · No login needed 🥚</footer>

<script>
/* ── FLOATERS ── */
(function(){
  const c=['#C5EDD0','#A8D8B8','#FFF0A0','#D0EEDD','#C8E8F8','#FFD878'];
  const fl=document.getElementById('floaters');
  for(let i=0;i<20;i++){
    const e=document.createElement('div');e.className='egg-f';
    const s=16+Math.random()*36;
    const left=Math.random()*100;
    const dur=7+Math.random()*12;
    const delay=-Math.random()*14;
    e.style.cssText=`width:${s}px;height:${s*1.2}px;left:${left}%;background:${c[i%c.length]};animation-duration:${dur}s;animation-delay:${delay}s;`;
    fl.appendChild(e);
  }
})();

/* ── ROUTING ── */
let active=null;

function filt(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.acard').forEach(c=>{
    c.style.display=(cat==='all'||c.dataset.cat===cat)?'':'none';
  });
}

function goHome(){
  stopAll();
  document.getElementById('hv').style.display='';
  document.getElementById('av').style.display='none';
}

function launch(id){
  stopAll();
  document.getElementById('hv').style.display='none';
  document.getElementById('av').style.display='';
  active=id;
  const stage=document.getElementById('stage');
  const stats=document.getElementById('stats');
  const hint=document.getElementById('hint');
  stage.innerHTML=''; stats.innerHTML=''; hint.innerHTML='';
  if(id==='snake') runSnake(stage,stats,hint);
  else if(id==='tetris') runTetris(stage,stats,hint);
  else if(id==='pong') runPong(stage,stats,hint);
  else if(id==='memory') runMemory(stage,stats,hint);
  else if(id==='g2048') run2048(stage,stats,hint);
}

function stopAll(){
  clearInterval(window._SL);clearInterval(window._TL);
  cancelAnimationFrame(window._PA);
  window._SL=window._TL=window._PA=null;
  // remove key listeners by clearing flag
  active=null;
}

function sb(id,label){
  return`<div class="stat"><div class="sl">${label}</div><div class="sv" id="${id}">0</div></div>`;
}
function setV(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}

/* ───────────── SNAKE ───────────── */
function runSnake(stage,stats,hint){
  const W=400,H=400,SZ=20,COLS=20,ROWS=20;
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;cv.style.cssText='display:block;border-radius:20px;max-width:100%;';
  stage.appendChild(cv);
  const ctx=cv.getContext('2d');
  stats.innerHTML=sb('sc','Score')+sb('hi','Best');
  hint.innerHTML='🕹️ Arrow keys or WASD to move';

  let snake,dir,queued,food,score,best=0,dead=false;

  function reset(){
    snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir={x:1,y:0}; queued=null;
    food=newFood(); score=0; dead=false;
    stage.querySelectorAll('.ov').forEach(e=>e.remove());
    setV('sc',0);
  }

  function newFood(){
    let f;
    do{ f={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
    while(snake.some(s=>s.x===f.x&&s.y===f.y));
    return f;
  }

  function draw(){
    // Background
    ctx.fillStyle='#FFF8F0';ctx.fillRect(0,0,W,H);
    // Grid
    ctx.strokeStyle='rgba(180,111,204,0.07)';ctx.lineWidth=0.5;
    for(let x=0;x<=W;x+=SZ){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<=H;y+=SZ){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    // Food egg
    const fx=food.x*SZ+SZ/2, fy=food.y*SZ+SZ/2;
    ctx.save();ctx.translate(fx,fy);ctx.scale(0.78,1);
    ctx.beginPath();ctx.arc(0,0,SZ/2-1,0,Math.PI*2);
    ctx.fillStyle='#E8719A';ctx.fill();
    ctx.strokeStyle='#C04470';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.beginPath();ctx.ellipse(-2,-3,3,2,Math.PI/4,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Snake
    snake.forEach((seg,i)=>{
      const x=seg.x*SZ,y=seg.y*SZ;
      const colors=['#52A872','#68C48A','#80D09E'];
      ctx.fillStyle=i===0?'#3E9060':colors[i%3];
      ctx.beginPath();ctx.roundRect(x+2,y+2,SZ-4,SZ-4,5);ctx.fill();
      if(i===0){
        // Eyes
        ctx.fillStyle='rgba(255,255,255,0.85)';
        ctx.beginPath();ctx.arc(x+6,y+7,2.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(x+14,y+7,2.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#1a3a1a';
        ctx.beginPath();ctx.arc(x+6,y+7,1.2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(x+14,y+7,1.2,0,Math.PI*2);ctx.fill();
      }
    });
  }

  function step(){
    if(dead)return;
    if(queued) dir=queued, queued=null;
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    // Wall collision
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){
      dead=true; best=Math.max(best,score); setV('hi',best);
      showOv(stage,'Game Over 🥚',`Score: ${score}`,reset); return;
    }
    // Self collision
    if(snake.some(s=>s.x===head.x&&s.y===head.y)){
      dead=true; best=Math.max(best,score); setV('hi',best);
      showOv(stage,'Game Over 🥚',`Score: ${score}`,reset); return;
    }
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){
      score+=10; setV('sc',score); food=newFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function onKey(e){
    if(active!=='snake'){document.removeEventListener('keydown',onKey);return;}
    const k=e.key;
    if((k==='ArrowUp'||k==='w'||k==='W')&&dir.y!==1)queued={x:0,y:-1};
    else if((k==='ArrowDown'||k==='s'||k==='S')&&dir.y!==-1)queued={x:0,y:1};
    else if((k==='ArrowLeft'||k==='a'||k==='A')&&dir.x!==1)queued={x:-1,y:0};
    else if((k==='ArrowRight'||k==='d'||k==='D')&&dir.x!==-1)queued={x:1,y:0};
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k))e.preventDefault();
  }
  document.addEventListener('keydown',onKey);
  reset(); draw();
  window._SL=setInterval(step,120);
}

/* ───────────── TETRIS ───────────── */
function runTetris(stage,stats,hint){
  const W=300,H=600,BW=10,BH=20,SZ=30;
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;cv.style.cssText='display:block;border-radius:20px;max-width:100%;';
  stage.appendChild(cv);
  const ctx=cv.getContext('2d');
  stats.innerHTML=sb('ts','Score')+sb('tlv','Level')+sb('tli','Lines');
  hint.innerHTML='⬅➡ Move &nbsp;|&nbsp; ⬆ Rotate &nbsp;|&nbsp; ⬇ Soft drop &nbsp;|&nbsp; Space = Hard drop';

  const SHAPES=[
    {cells:[[1,1,1,1]],fill:'#D0EEFF',stroke:'#5BA3CC'},
    {cells:[[1,0],[1,0],[1,1]],fill:'#FFE0CC',stroke:'#E8923E'},
    {cells:[[0,1],[0,1],[1,1]],fill:'#C8F2DC',stroke:'#52A872'},
    {cells:[[1,1],[1,1]],fill:'#FFF3B0',stroke:'#C48A10'},
    {cells:[[0,1,1],[1,1,0]],fill:'#FFD6E7',stroke:'#E8719A'},
    {cells:[[1,1,0],[0,1,1]],fill:'#EDD5F8',stroke:'#9B5BB2'},
    {cells:[[1,1,1],[0,1,0]],fill:'#B46FCC',stroke:'#7B3B9C'}
  ];

  let board,piece,score,level,lines,dead;

  function newPiece(){
    const s=SHAPES[Math.floor(Math.random()*SHAPES.length)];
    return{cells:s.cells.map(r=>[...r]),fill:s.fill,stroke:s.stroke,x:Math.floor((BW-s.cells[0].length)/2),y:0};
  }

  function reset(){
    board=Array.from({length:BH},()=>Array(BW).fill(0));
    score=0;level=1;lines=0;dead=false;
    piece=newPiece();
    stage.querySelectorAll('.ov').forEach(e=>e.remove());
    setV('ts',0);setV('tlv',1);setV('tli',0);
    clearInterval(window._TL);
    window._TL=setInterval(tick,getSpeed());
  }

  function getSpeed(){return Math.max(50,480-((level-1)*45));}

  function valid(cells,ox,oy){
    return cells.every((row,r)=>row.every((c,col)=>{
      if(!c)return true;
      const nx=ox+col,ny=oy+r;
      return nx>=0&&nx<BW&&ny<BH&&(ny<0||!board[ny][nx]);
    }));
  }

  function rotate(cells){return cells[0].map((_,i)=>cells.map(r=>r[i]).reverse());}

  function lock(){
    piece.cells.forEach((row,r)=>row.forEach((c,col)=>{
      if(c&&piece.y+r>=0)board[piece.y+r][piece.x+col]={fill:piece.fill,stroke:piece.stroke};
    }));
    let cleared=0;
    for(let r=BH-1;r>=0;r--){
      if(board[r].every(c=>c)){board.splice(r,1);board.unshift(Array(BW).fill(0));cleared++;r++;}
    }
    if(cleared){
      lines+=cleared;
      score+=[0,100,300,500,800][cleared]*level;
      level=Math.floor(lines/10)+1;
      setV('ts',score);setV('tlv',level);setV('tli',lines);
      clearInterval(window._TL);
      window._TL=setInterval(tick,getSpeed());
    }
    piece=newPiece();
    if(!valid(piece.cells,piece.x,piece.y)){
      dead=true;clearInterval(window._TL);
      showOv(stage,'Game Over 🥚',`Score: ${score}`,reset);
    }
  }

  function tick(){
    if(dead)return;
    if(valid(piece.cells,piece.x,piece.y+1)){piece.y++;draw();}
    else{lock();draw();}
  }

  function drawCell(x,y,fill,stroke){
    ctx.fillStyle=fill;ctx.fillRect(x*SZ+1,y*SZ+1,SZ-2,SZ-2);
    ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.strokeRect(x*SZ+2,y*SZ+2,SZ-4,SZ-4);
  }

  function draw(){
    ctx.fillStyle='#FFF8F0';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(180,111,204,0.07)';ctx.lineWidth=0.5;
    for(let x=0;x<W;x+=SZ){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=SZ){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    board.forEach((row,r)=>row.forEach((c,col)=>{if(c)drawCell(col,r,c.fill,c.stroke);}));
    piece.cells.forEach((row,r)=>row.forEach((c,col)=>{if(c)drawCell(piece.x+col,piece.y+r,piece.fill,piece.stroke);}));
  }

  function onKey(e){
    if(active!=='tetris'){document.removeEventListener('keydown',onKey);return;}
    if(dead)return;
    if(e.key==='ArrowLeft'){if(valid(piece.cells,piece.x-1,piece.y))piece.x--;}
    else if(e.key==='ArrowRight'){if(valid(piece.cells,piece.x+1,piece.y))piece.x++;}
    else if(e.key==='ArrowDown'){if(valid(piece.cells,piece.x,piece.y+1))piece.y++;else lock();}
    else if(e.key==='ArrowUp'){const r=rotate(piece.cells);if(valid(r,piece.x,piece.y))piece.cells=r;}
    else if(e.key===' '){while(valid(piece.cells,piece.x,piece.y+1))piece.y++;lock();}
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
    draw();
  }
  document.addEventListener('keydown',onKey);
  reset();draw();
}

/* ───────────── PONG ───────────── */
function runPong(stage,stats,hint){
  const W=500,H=340;
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;cv.style.cssText='display:block;border-radius:20px;max-width:100%;';
  stage.appendChild(cv);
  const ctx=cv.getContext('2d');
  stats.innerHTML=sb('py','You')+sb('pc','CPU');
  hint.innerHTML='⬆⬇ or W/S to move your paddle · Left side is yours';

  const PH=72,PW=13,BR=8,SPD=5.5;
  let py,ey,bx,by,vx,vy,ps=0,es=0;
  const keys={};

  function resetBall(dir){
    bx=W/2;by=H/2;
    const angle=(Math.random()*0.6-0.3);
    vx=dir*(3.8+Math.random()*0.8);
    vy=Math.sin(angle)*3.5;
  }

  function reset(full){
    if(full){ps=0;es=0;setV('py',0);setV('pc',0);}
    py=H/2-PH/2;ey=H/2-PH/2;
    resetBall(Math.random()<.5?1:-1);
  }

  document.addEventListener('keydown',e=>{
    if(active!=='pong'){document.removeEventListener('keydown',kpd);return;}
    keys[e.key]=true;
    if(['ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
  });
  document.addEventListener('keyup',e=>{keys[e.key]=false;});
  // fix: named fn for removal
  function kpd(e){if(active!=='pong'){document.removeEventListener('keydown',kpd);return;}keys[e.key]=true;if(['ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();}
  function kpu(e){keys[e.key]=false;}
  document.addEventListener('keydown',kpd);
  document.addEventListener('keyup',kpu);

  function frame(){
    if(active!=='pong'){cancelAnimationFrame(window._PA);return;}
    // Player move
    if((keys['ArrowUp']||keys['w']||keys['W'])&&py>2)py-=SPD;
    if((keys['ArrowDown']||keys['s']||keys['S'])&&py<H-PH-2)py+=SPD;
    // CPU move
    const cCen=ey+PH/2;
    const cpuSpd=3.6+Math.min(es+ps,6)*0.15;
    if(cCen<by-4)ey+=cpuSpd; else if(cCen>by+4)ey-=cpuSpd;
    ey=Math.max(0,Math.min(H-PH,ey));
    // Ball
    bx+=vx;by+=vy;
    // Top/bottom bounce
    if(by-BR<=0){by=BR;vy=Math.abs(vy);}
    if(by+BR>=H){by=H-BR;vy=-Math.abs(vy);}
    // Player paddle hit
    const PLX=10+PW;
    if(vx<0&&bx-BR<=PLX&&bx-BR>PLX-Math.abs(vx)*1.5&&by>=py-BR&&by<=py+PH+BR){
      bx=PLX+BR;
      const rel=(by-(py+PH/2))/(PH/2);
      vy=rel*5.5;
      vx=Math.abs(vx)*1.06;
      if(vx>10)vx=10;
    }
    // CPU paddle hit
    const CPX=W-10-PW;
    if(vx>0&&bx+BR>=CPX&&bx+BR<CPX+Math.abs(vx)*1.5&&by>=ey-BR&&by<=ey+PH+BR){
      bx=CPX-BR;
      const rel=(by-(ey+PH/2))/(PH/2);
      vy=rel*5.5;
      vx=-Math.abs(vx)*1.04;
      if(vx<-10)vx=-10;
    }
    // Score
    if(bx+BR<0){es++;setV('pc',es);reset(false);}
    if(bx-BR>W){ps++;setV('py',ps);reset(false);}
    // Draw
    ctx.fillStyle='#FFF8F0';ctx.fillRect(0,0,W,H);
    ctx.setLineDash([6,6]);ctx.strokeStyle='rgba(180,111,204,0.18)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
    // Player pad
    ctx.fillStyle='#C8F2DC';ctx.strokeStyle='#52A872';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.roundRect(10,py,PW,PH,7);ctx.fill();ctx.stroke();
    // CPU pad
    ctx.fillStyle='#FFD6E7';ctx.strokeStyle='#E8719A';
    ctx.beginPath();ctx.roundRect(W-10-PW,ey,PW,PH,7);ctx.fill();ctx.stroke();
    // Egg ball
    ctx.save();ctx.translate(bx,by);ctx.scale(0.8,1);
    ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);
    ctx.fillStyle='#FFF3B0';ctx.fill();
    ctx.strokeStyle='#C48A10';ctx.lineWidth=1.5;ctx.stroke();
    ctx.strokeStyle='rgba(196,138,16,0.3)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(-BR+2,0);ctx.lineTo(BR-2,0);ctx.stroke();
    ctx.restore();
    window._PA=requestAnimationFrame(frame);
  }
  reset(true);
  window._PA=requestAnimationFrame(frame);
}

/* ───────────── MEMORY ───────────── */
function runMemory(stage,stats,hint){
  const EMOJIS=['🐣','🌷','🐰','🌸','🥕','🌈','🦋','🍫'];
  let cards=[...EMOJIS,...EMOJIS].sort(()=>Math.random()-0.5)
    .map((e,i)=>({id:i,emoji:e,matched:false,flipped:false}));
  let flipped=[],moves=0,matched=0,locked=false;
  stats.innerHTML=sb('mm','Moves')+sb('mf','Found');
  hint.innerHTML='🖱️ Click cards to flip them and find matching pairs!';

  function render(){
    const board=document.createElement('div');board.className='mem-board';
    cards.forEach(card=>{
      const el=document.createElement('div');
      el.className='mc'+(card.flipped||card.matched?' fl':'');
      el.innerHTML=`<div class="mci"><div class="mface mback"></div><div class="mface mfront">${card.emoji}</div></div>`;
      el.style.cssText='transition:transform 0.12s cubic-bezier(0.34,1.7,0.64,1);';
      if(!card.matched){
        el.addEventListener('click',()=>flip(card.id));
        el.addEventListener('mouseenter',()=>el.style.transform='scale(1.08)');
        el.addEventListener('mouseleave',()=>el.style.transform='scale(1)');
      }
      board.appendChild(el);
    });
    stage.innerHTML='';stage.appendChild(board);
  }

  function flip(id){
    if(locked)return;
    const card=cards[id];
    if(card.flipped||card.matched)return;
    card.flipped=true;flipped.push(id);render();
    if(flipped.length===2){
      locked=true;moves++;setV('mm',moves);
      const[a,b]=[cards[flipped[0]],cards[flipped[1]]];
      if(a.emoji===b.emoji){
        a.matched=b.matched=true;matched++;setV('mf',matched);
        flipped=[];locked=false;render();
        if(matched===8)setTimeout(()=>showOv(stage,'🐣 You Win!',`Solved in ${moves} moves`,()=>runMemory(stage,stats,hint)),300);
      } else {
        setTimeout(()=>{a.flipped=b.flipped=false;flipped=[];locked=false;render();},900);
      }
    }
  }
  render();
}

/* ───────────── 2048 ───────────── */
function run2048(stage,stats,hint){
  let board,score,best=0;
  stats.innerHTML=sb('gs','Score')+sb('gb','Best');
  hint.innerHTML='⬅➡⬆⬇ Arrow keys to slide tiles · Swipe on mobile';

  function newBoard(){board=Array.from({length:4},()=>Array(4).fill(0));score=0;addTile();addTile();}

  function addTile(){
    const empty=[];
    board.forEach((r,ri)=>r.forEach((c,ci)=>{if(!c)empty.push([ri,ci]);}));
    if(!empty.length)return;
    const[r,c]=empty[Math.floor(Math.random()*empty.length)];
    board[r][c]=Math.random()<0.9?2:4;
  }

  function slideRow(row){
    let a=row.filter(v=>v),merged=false;
    for(let i=0;i<a.length-1;i++){
      if(a[i]===a[i+1]&&!merged){score+=a[i]*2;a[i]*=2;a.splice(i+1,1);merged=true;}
      else merged=false;
    }
    while(a.length<4)a.push(0);
    return a;
  }

  function move(dir){
    const prev=JSON.stringify(board);
    if(dir==='left')board=board.map(r=>slideRow(r));
    else if(dir==='right')board=board.map(r=>slideRow([...r].reverse()).reverse());
    else if(dir==='up'){
      const t=board[0].map((_,c)=>slideRow(board.map(r=>r[c])));
      board=board.map((r,ri)=>r.map((_,ci)=>t[ci][ri]));
    } else if(dir==='down'){
      const t=board[0].map((_,c)=>slideRow([...board.map(r=>r[c])].reverse()).reverse());
      board=board.map((r,ri)=>r.map((_,ci)=>t[ci][ri]));
    }
    if(JSON.stringify(board)!==prev){
      addTile();
      setV('gs',score);
      if(score>best){best=score;setV('gb',best);}
    }
    render();
    if(isOver())setTimeout(()=>showOv(stage,'Game Over 🥚',`Score: ${score}`,()=>{newBoard();render();}),100);
  }

  function isOver(){
    for(let r=0;r<4;r++)for(let c=0;c<4;c++){
      if(!board[r][c])return false;
      if(c<3&&board[r][c]===board[r][c+1])return false;
      if(r<3&&board[r][c]===board[r+1][c])return false;
    }
    return true;
  }

  function tClass(v){
    if(!v)return't48';
    const m={2:'v2',4:'v4',8:'v8',16:'v16',32:'v32',64:'v64',128:'v128',256:'v256',512:'v512',1024:'v1024',2048:'v2048'};
    return't48 '+(m[v]||'v2048');
  }

  function render(){
    const el=document.createElement('div');el.className='b48';
    board.forEach(row=>row.forEach(v=>{
      const t=document.createElement('div');t.className=tClass(v);
      t.textContent=v||'';
      if(v)t.classList.add('pop');
      el.appendChild(t);
    }));
    stage.innerHTML='';stage.appendChild(el);
  }

  function onKey(e){
    if(active!=='g2048'){document.removeEventListener('keydown',onKey);return;}
    const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
    if(map[e.key]){e.preventDefault();move(map[e.key]);}
  }
  document.addEventListener('keydown',onKey);

  // Touch/swipe
  let tx=null,ty=null;
  stage.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  stage.addEventListener('touchend',e=>{
    if(tx===null)return;
    const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
    tx=null;ty=null;
  },{passive:true});

  newBoard();render();
}

/* ── SHARED OVERLAY ── */
function showOv(container,title,sub,onRestart){
  const ov=document.createElement('div');ov.className='ov';
  ov.innerHTML=`<div class="odeco">🥚🐣🌸</div><h2>${title}</h2><p>${sub}</p><button class="rb">Play Again 🐰</button>`;
  ov.querySelector('button').addEventListener('click',()=>{ov.remove();onRestart();});
  container.style.position='relative';
  container.appendChild(ov);
}
