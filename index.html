<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahur Hub</title>
<link rel="icon" type="image/png" href="https://sahurhub.github.io/Objects/logo.png">
<link rel="apple-touch-icon" href="https://sahurhub.github.io/Objects/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;overflow-x:hidden;
  background:#080810;color:#fff;
  /* smooth scroll inertia feel */
  -webkit-overflow-scrolling:touch;
}

/* ── AMBIENT ORBS — slow, fluid, never stop ── */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;will-change:transform;}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(110,60,255,0.32),transparent 70%);top:-220px;left:-120px;animation:orb1Move 24s cubic-bezier(0.45,0.05,0.55,0.95) infinite alternate;}
.orb2{width:560px;height:560px;background:radial-gradient(circle,rgba(0,160,255,0.22),transparent 70%);top:25%;right:-160px;animation:orb2Move 30s cubic-bezier(0.45,0.05,0.55,0.95) infinite alternate;}
.orb3{width:480px;height:480px;background:radial-gradient(circle,rgba(240,80,180,0.18),transparent 70%);bottom:5%;left:15%;animation:orb3Move 20s cubic-bezier(0.45,0.05,0.55,0.95) infinite alternate;}
@keyframes orb1Move{from{transform:translate(0,0) scale(1);}to{transform:translate(80px,60px) scale(1.12);}}
@keyframes orb2Move{from{transform:translate(0,0) scale(1);}to{transform:translate(-60px,80px) scale(0.9);}}
@keyframes orb3Move{from{transform:translate(0,0) scale(1);}to{transform:translate(50px,-70px) scale(1.08);}}

/* ── GLASS ── */
.glass{
  background:rgba(255,255,255,0.065);
  backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  -webkit-backdrop-filter:blur(28px) saturate(190%) brightness(1.08);
  border:1px solid rgba(255,255,255,0.13);
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 1.8rem;
  border-bottom:1px solid rgba(255,255,255,0.07);
  /* header itself slides in */
  animation:headerIn 0.6s cubic-bezier(0.34,1.4,0.64,1) both;
}
@keyframes headerIn{from{transform:translateY(-100%);opacity:0;}to{transform:translateY(0);opacity:1;}}

.logo{
  font-size:1.25rem;font-weight:700;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.55) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logoPop 0.7s cubic-bezier(0.34,1.7,0.64,1) 0.1s both;
  display:inline-flex;align-items:center;gap:0.4em;
}
.logo-img{
  width:28px;height:28px;border-radius:7px;
  object-fit:contain;
  /* image doesn't inherit text clip, so reset */
  -webkit-text-fill-color:initial;
  filter:drop-shadow(0 0 8px rgba(167,139,250,0.35));
  animation:logoPop 0.7s cubic-bezier(0.34,1.7,0.64,1) 0s both;
  flex-shrink:0;
}
@keyframes logoPop{from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.logo span{
  background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200%;
  animation:gradShift 4s ease infinite;
}
@keyframes gradShift{0%,100%{background-position:0%;}50%{background-position:100%;}}

.header-right{display:flex;align-items:center;gap:10px;}

.search-toggle{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.07);
  color:rgba(255,255,255,0.6);font-size:0.95rem;
  /* will be spring-animated via JS */
  will-change:transform;
}
.search-toggle.active{background:rgba(167,139,250,0.22);border-color:rgba(167,139,250,0.45);color:#c4b5fd;}

/* ── SEARCH ── */
.search-wrap{
  overflow:hidden;max-height:0;opacity:0;
  position:relative;z-index:90;padding:0 1.8rem;
  transition:max-height 0.5s cubic-bezier(0.34,1.3,0.64,1),
             opacity 0.3s cubic-bezier(0.34,1.3,0.64,1),
             padding 0.3s ease;
}
.search-wrap.open{max-height:80px;opacity:1;padding:0.65rem 1.8rem;}
.search-inner{
  display:flex;align-items:center;gap:12px;
  padding:0.55rem 1rem;border-radius:14px;
}
.search-inner input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Inter',sans-serif;font-size:0.9rem;color:#fff;
}
.search-inner input::placeholder{color:rgba(255,255,255,0.3);}
.search-icon{color:rgba(255,255,255,0.35);font-size:0.85rem;flex-shrink:0;}
.clear-search{
  background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;
  font-size:0.95rem;padding:0 2px;display:none;
  transition:color 0.15s,transform 0.15s cubic-bezier(0.34,1.8,0.64,1);
}
.clear-search.vis{display:block;}
.clear-search:hover{color:#fff;transform:scale(1.2) rotate(90deg);}

/* ── NAV ── */
nav{
  position:relative;z-index:80;
  display:flex;align-items:center;gap:7px;
  padding:0.9rem 1.8rem 0.4rem;flex-wrap:wrap;
  /* stagger pills via JS */
}
.pill{
  padding:0.35rem 0.95rem;border-radius:999px;
  font-size:0.75rem;font-weight:600;letter-spacing:0.2px;
  cursor:pointer;border:1px solid rgba(255,255,255,0.09);
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.5);
  will-change:transform;
  /* spring handled in JS, CSS fallback: */
  transition:background 0.2s,border-color 0.2s,color 0.2s;
}
.pill.active{
  background:linear-gradient(135deg,rgba(167,139,250,0.3),rgba(96,165,250,0.25));
  border-color:rgba(167,139,250,0.45);color:#fff;
  box-shadow:0 2px 14px rgba(167,139,250,0.22);
}

/* ── MAIN ── */
main{position:relative;z-index:10;max-width:1120px;margin:0 auto;padding:1.1rem 1.8rem 4rem;}
#hv{display:block;}
#av{display:none;}

.sec-label{
  font-size:0.66rem;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;
  color:rgba(255,255,255,0.25);margin-bottom:0.95rem;margin-top:0.4rem;
}

.state-msg{
  grid-column:1/-1;text-align:center;padding:3rem 1rem;
  color:rgba(255,255,255,0.28);font-size:0.9rem;
}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(188px,1fr));
  gap:13px;margin-bottom:2rem;
}

/* Cards — all motion handled via JS springs, CSS only for base appearance */
.acard{
  border-radius:20px;overflow:hidden;cursor:pointer;
  background:rgba(255,255,255,0.055);
  border:1px solid rgba(255,255,255,0.09);
  backdrop-filter:blur(22px) saturate(170%);
  -webkit-backdrop-filter:blur(22px) saturate(170%);
  will-change:transform,filter;
  /* motion blur applied via JS filter */
}

.athumb{
  width:100%;aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
  font-size:2.3rem;position:relative;
  background:linear-gradient(135deg,rgba(255,255,255,0.055),rgba(255,255,255,0.015));
  border-bottom:1px solid rgba(255,255,255,0.06);
  overflow:hidden;
}
/* travelling highlight — glass glint */
.athumb::before{
  content:'';position:absolute;
  top:-60%;left:-60%;width:60%;height:220%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,0.07),transparent);
  transform:skewX(-15deg);
  animation:glint 4s ease-in-out infinite;
}
@keyframes glint{0%,100%{left:-60%;}50%{left:160%;}}

.ainfo{padding:0.7rem 0.85rem 0.25rem;}
.aname{font-size:0.87rem;font-weight:600;color:rgba(255,255,255,0.88);letter-spacing:-0.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.aext{font-size:0.65rem;font-weight:500;color:rgba(255,255,255,0.28);margin-top:1px;letter-spacing:0.3px;}

.btnrow{display:flex;gap:7px;padding:0.45rem 0.85rem 0.8rem;}
.startbtn{
  flex:1;padding:0.42rem 0;
  background:linear-gradient(135deg,rgba(167,139,250,0.45),rgba(96,165,250,0.35));
  border:1px solid rgba(167,139,250,0.35);
  border-radius:10px;color:#fff;
  font-family:'Inter',sans-serif;font-size:0.74rem;font-weight:600;
  cursor:pointer;letter-spacing:0.3px;
  will-change:transform;
}
.popbtn{
  padding:0.42rem 0.72rem;
  background:rgba(255,255,255,0.055);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;color:rgba(255,255,255,0.5);
  font-family:'Inter',sans-serif;font-size:0.74rem;font-weight:600;
  cursor:pointer;white-space:nowrap;will-change:transform;
}

.no-results{
  grid-column:1/-1;text-align:center;padding:2.5rem 1rem;
  color:rgba(255,255,255,0.25);font-size:0.88rem;
}

/* ── ACTIVITY VIEW ── */
.backbtn{
  display:inline-flex;align-items:center;gap:8px;
  padding:0.42rem 1.05rem;border-radius:999px;
  background:rgba(255,255,255,0.065);
  border:1px solid rgba(255,255,255,0.11);
  color:rgba(255,255,255,0.65);
  font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:500;
  cursor:pointer;margin-bottom:1.1rem;
  will-change:transform;
}

.stage{
  border-radius:20px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.09);
  box-shadow:0 10px 50px rgba(0,0,0,0.55);
  min-height:520px;background:rgba(0,0,0,0.28);
  display:flex;align-items:stretch;
  /* stage entrance */
  animation:stageIn 0.55s cubic-bezier(0.34,1.35,0.64,1) both;
}
@keyframes stageIn{from{opacity:0;transform:scale(0.94) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.stage iframe{width:100%;min-height:520px;border:none;display:block;flex:1;}

.hint{
  margin-top:9px;padding:0.55rem 0.95rem;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;font-size:0.74rem;
  color:rgba(255,255,255,0.3);font-weight:400;
}

/* ── GAME SHEET ── */
/* Dim overlay behind sheet */
#sheet-backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0);
  pointer-events:none;
  transition:background 0.4s ease;
}
#sheet-backdrop.open{
  background:rgba(0,0,0,0.55);
  pointer-events:all;
}

/* The sheet itself — slides up from bottom */
#game-sheet{
  position:fixed;
  left:0;right:0;bottom:0;
  height:92vh;
  z-index:201;
  border-radius:22px 22px 0 0;
  background:rgba(12,12,22,0.82);
  backdrop-filter:blur(40px) saturate(200%) brightness(1.1);
  -webkit-backdrop-filter:blur(40px) saturate(200%) brightness(1.1);
  border-top:1px solid rgba(255,255,255,0.13);
  border-left:1px solid rgba(255,255,255,0.08);
  border-right:1px solid rgba(255,255,255,0.08);
  display:flex;flex-direction:column;
  /* start offscreen */
  transform:translateY(100%);
  will-change:transform,filter;
  box-shadow:0 -20px 80px rgba(0,0,0,0.6);
}

/* drag handle */
.sheet-handle{
  width:36px;height:5px;border-radius:999px;
  background:rgba(255,255,255,0.22);
  margin:10px auto 0;flex-shrink:0;
  cursor:pointer;
}

/* sheet top bar */
.sheet-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 8px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,0.07);
}
.sheet-title{
  font-size:0.82rem;font-weight:600;
  color:rgba(255,255,255,0.75);letter-spacing:-0.1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:70%;
}
.sheet-close{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6);
  font-size:0.8rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  will-change:transform;flex-shrink:0;
}

/* iframe container */
.sheet-frame{
  flex:1;overflow:hidden;
  border-radius:0 0 0 0;
  position:relative;
}
.sheet-frame iframe{
  width:100%;height:100%;border:none;display:block;
}

/* loading state inside sheet */
.sheet-loading{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:0.85rem;color:rgba(255,255,255,0.3);
  font-weight:400;letter-spacing:0.3px;
}

/* hub shrinks when sheet is open */
#hub-wrap{
  will-change:transform,filter;
  transition:border-radius 0.5s ease;
}
#hub-wrap.sheet-open{
  border-radius:16px;
  overflow:hidden;
}

  header{padding:0.9rem 1.1rem;}
  nav,.search-wrap,main{padding-left:1.1rem;padding-right:1.1rem;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;}
  #game-sheet{height:96vh;}
}
</style>
</head>
<body>

<!-- Sheet backdrop -->
<div id="sheet-backdrop" onclick="closeSheet()"></div>

<script>
/* ═══════════════════════════════════════════════
   SPRING PHYSICS ENGINE
   Simulates iOS UIKit spring animations:
   - stiffness / damping / mass
   - per-frame velocity tracking for motion blur
   - requestAnimationFrame loop
═══════════════════════════════════════════════ */
class Spring{
  constructor(stiffness=300,damping=24,mass=1){
    this.k=stiffness;this.b=damping;this.m=mass;
    this.pos=0;this.vel=0;this.target=0;this.cb=null;this._raf=null;
  }
  to(target,cb){
    this.target=target;this.cb=cb;
    if(!this._raf)this._tick();
  }
  set(val){this.pos=val;this.vel=0;this.target=val;if(this.cb)this.cb(val,0);}
  _tick(){
    const dt=1/120; // 120fps physics step (sub-steps real frame)
    const f=-(this.k*(this.pos-this.target))-(this.b*this.vel);
    this.vel+=f/this.m*dt;
    this.pos+=this.vel*dt;
    if(this.cb)this.cb(this.pos,this.vel);
    const done=Math.abs(this.pos-this.target)<0.001&&Math.abs(this.vel)<0.001;
    if(done){this.pos=this.target;this.vel=0;if(this.cb)this.cb(this.pos,0);this._raf=null;}
    else this._raf=requestAnimationFrame(()=>this._tick());
  }
  stop(){if(this._raf){cancelAnimationFrame(this._raf);this._raf=null;}}
}

/* Apply motion blur from velocity — mimics iOS' velocity-proportional blur */
function motionBlur(el,vel,axis='Y'){
  const b=Math.min(Math.abs(vel)*0.9,12);
  el.style.filter=b>0.4
    ?`blur(${axis==='Y'?`0px,${b.toFixed(1)}px`:`${b.toFixed(1)}px,0px`})`
    :'none';
}

/* Spring a button with bounce + motion blur on hover/press */
function springBtn(el,{hoverScale=1.08,pressScale=0.94,stiffness=380,damping=18}={}){
  const sp=new Spring(stiffness,damping,1);
  sp.set(1);
  el.addEventListener('mouseenter',()=>sp.to(hoverScale,v=>{
    el.style.transform=`scale(${v})`;
    motionBlur(el,sp.vel,'Y');
  }));
  el.addEventListener('mouseleave',()=>sp.to(1,v=>{
    el.style.transform=`scale(${v})`;
    motionBlur(el,sp.vel,'Y');
  }));
  el.addEventListener('mousedown',()=>sp.to(pressScale,v=>{el.style.transform=`scale(${v})`;}));
  el.addEventListener('mouseup',()=>sp.to(hoverScale,v=>{el.style.transform=`scale(${v})`;}));
  el.addEventListener('touchstart',{passive:true},()=>sp.to(pressScale,v=>{el.style.transform=`scale(${v})`;}));
  el.addEventListener('touchend',{passive:true},()=>sp.to(1,v=>{el.style.transform=`scale(${v})`;}));
}

/* Spring a card: lift + tilt + motion blur */
function springCard(el){
  const spY=new Spring(260,20,1);
  const spS=new Spring(260,20,1);
  spY.set(0);spS.set(1);

  function applyCard(){
    const blur=Math.min(Math.abs(spY.vel)*0.5,6);
    el.style.transform=`translateY(${spY.pos.toFixed(2)}px) scale(${spS.pos.toFixed(4)})`;
    el.style.filter=blur>0.3?`blur(0px,${blur.toFixed(1)}px)`:'none';
    // glow border on hover
  }

  el.addEventListener('mouseenter',()=>{
    spY.to(-7,applyCard);
    spS.to(1.025,applyCard);
    el.style.borderColor='rgba(167,139,250,0.35)';
    el.style.boxShadow='0 18px 44px rgba(0,0,0,0.45),0 0 0 1px rgba(167,139,250,0.12)';
  });
  el.addEventListener('mouseleave',()=>{
    spY.to(0,applyCard);
    spS.to(1,applyCard);
    el.style.borderColor='rgba(255,255,255,0.09)';
    el.style.boxShadow='none';
  });
  el.addEventListener('mousedown',()=>{spY.to(-2,applyCard);spS.to(0.96,applyCard);});
  el.addEventListener('mouseup',()=>{spY.to(-7,applyCard);spS.to(1.025,applyCard);});
  el.addEventListener('touchstart',{passive:true},()=>{spY.to(-2,applyCard);spS.to(0.96,applyCard);});
  el.addEventListener('touchend',{passive:true},()=>{spY.to(0,applyCard);spS.to(1,applyCard);});
}

/* Stagger-animate items into view from below with spring */
function staggerIn(els,{delay=60,fromY=28,stiffness=280,damping=22}={}){
  els.forEach((el,i)=>{
    el.style.opacity='0';
    el.style.transform=`translateY(${fromY}px)`;
    setTimeout(()=>{
      el.style.opacity='1';
      const sp=new Spring(stiffness,damping,1);
      sp.set(fromY);
      sp.to(0,v=>{
        el.style.transform=`translateY(${v.toFixed(2)}px)`;
        const blur=Math.min(Math.abs(sp.vel)*0.4,8);
        el.style.filter=blur>0.3?`blur(0px,${blur.toFixed(1)}px)`:'none';
      });
    },i*delay);
  });
}

/* ── CONFIG ── */
const REPO_OWNER='sahurhub';
const REPO_NAME='sahurhub.github.io';
const FOLDER='Education';
const BASE=`https://${REPO_OWNER}.github.io/${FOLDER}/`;
const API=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FOLDER}`;

const EMOJIS=['🎮','🕹️','🎯','🎲','🧩','⚡','🔥','🌀','🎪','🏆','💥','🎭','🚀','⭐','🎰','🌊'];
function fileEmoji(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xffff;return EMOJIS[h%EMOJIS.length];}

const ACTION_WORDS=['snake','shoot','run','jump','race','fight','dodge','ball','war','battle','flap','dash'];
const PUZZLE_WORDS=['puzzle','match','memory','2048','slide','swap','block','tetris','word','sudoku','sort'];
const CLASSIC_WORDS=['pong','chess','pac','space','breakout','brick','frogger','minesweeper','solitaire'];
function guessCategory(name){
  const n=name.toLowerCase();
  if(ACTION_WORDS.some(w=>n.includes(w)))return'action';
  if(PUZZLE_WORDS.some(w=>n.includes(w)))return'puzzle';
  if(CLASSIC_WORDS.some(w=>n.includes(w)))return'classic';
  return'action';
}
function prettyName(f){return f.replace(/\.html?$/i,'').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}

let allFiles=[],currentCat='all',currentSearch='',searchOpen=false;

/* ── LOAD FILES ── */
async function loadFiles(){
  try{
    const res=await fetch(API);
    if(!res.ok)throw new Error('API '+res.status);
    const data=await res.json();
    allFiles=data.filter(f=>f.type==='file'&&/\.html?$/i.test(f.name))
      .map(f=>({name:f.name,display:prettyName(f.name),cat:guessCategory(f.name),emoji:fileEmoji(f.name),url:BASE+f.name}));
    if(!allFiles.length){document.getElementById('loadMsg').textContent='No activities in Education/ yet.';}
    else renderCards();
  }catch(e){document.getElementById('loadMsg').textContent='Could not reach repo. Make sure it\'s public.';console.error(e);}
}

/* ── RENDER ── */
function renderCards(){
  const grid=document.getElementById('grid');
  const q=currentSearch.toLowerCase().trim();
  const filtered=allFiles.filter(f=>{
    const catOk=currentCat==='all'||f.cat===currentCat;
    const searchOk=!q||f.display.toLowerCase().includes(q)||f.name.toLowerCase().includes(q);
    return catOk&&searchOk;
  });
  if(!filtered.length){grid.innerHTML=`<div class="no-results">Nothing found for "${currentSearch||currentCat}"</div>`;return;}

  grid.innerHTML=filtered.map(f=>`
    <div class="acard" data-cat="${f.cat}" data-name="${f.name}">
      <div class="athumb">${f.emoji}</div>
      <div class="ainfo"><p class="aname">${f.display}</p><p class="aext">${f.name}</p></div>
      <div class="btnrow">
        <button class="startbtn" onclick="launch('${f.name}')">&#9658; Play</button>
        <button class="popbtn" onclick="popout('${f.name}')">&#10696; Tab</button>
      </div>
    </div>`).join('');

  /* Apply spring interactions to every new card and button */
  document.querySelectorAll('.acard').forEach(springCard);
  document.querySelectorAll('.startbtn').forEach(b=>springBtn(b,{hoverScale:1.06,pressScale:0.93,stiffness:400,damping:16}));
  document.querySelectorAll('.popbtn').forEach(b=>springBtn(b,{hoverScale:1.08,pressScale:0.92,stiffness:400,damping:16}));

  /* Stagger cards in */
  staggerIn(document.querySelectorAll('.acard'),{delay:50,fromY:22});
}

/* ── FILTER ── */
function filt(cat,btn){
  currentCat=cat;
  /* spring the pill */
  document.querySelectorAll('.pill').forEach(b=>{
    b.classList.remove('active');
    const sp=new Spring(320,18,1);sp.set(1);
    sp.to(1,v=>b.style.transform=`scale(${v})`);
  });
  btn.classList.add('active');
  const sp=new Spring(380,16,1);sp.set(0.88);
  sp.to(1,v=>btn.style.transform=`scale(${v})`);
  renderCards();
}

/* ── SEARCH ── */
function toggleSearch(){
  searchOpen=!searchOpen;
  const wrap=document.getElementById('searchWrap');
  const btn=document.getElementById('searchToggle');
  wrap.classList.toggle('open',searchOpen);
  btn.classList.toggle('active',searchOpen);
  /* spring the toggle button */
  const sp=new Spring(420,15,1);
  sp.set(searchOpen?0.8:1.15);
  sp.to(1,v=>{btn.style.transform=`scale(${v})`;motionBlur(btn,sp.vel,'Y');});
  if(searchOpen)setTimeout(()=>document.getElementById('searchInput').focus(),260);
  else clearSearch();
}

function onSearch(val){
  currentSearch=val;
  document.getElementById('clearBtn').classList.toggle('vis',val.length>0);
  renderCards();
}
function clearSearch(){
  currentSearch='';
  const inp=document.getElementById('searchInput');
  if(inp)inp.value='';
  document.getElementById('clearBtn').classList.remove('vis');
  renderCards();
}

/* ── SHEET SPRINGS ── */
const sheetSp = new Spring(320, 28, 1);
const hubSp   = new Spring(300, 26, 1);
const hubBlurSp = new Spring(280, 24, 1);
sheetSp.set(100); // starts fully offscreen (100% translated)
hubSp.set(1);
hubBlurSp.set(0);

const sheet    = document.getElementById('game-sheet');
const backdrop = document.getElementById('sheet-backdrop');
const hubWrap  = document.getElementById('hub-wrap');
let sheetOpen  = false;

function applySheet(v){
  sheet.style.transform = `translateY(${v.toFixed(2)}%)`;
  // subtle motion blur while flying
  const spd = Math.abs(sheetSp.vel);
  const mb  = Math.min(spd * 0.3, 10);
  sheet.style.filter = mb > 0.5 ? `blur(0px,${mb.toFixed(1)}px)` : 'none';
}

function applyHub(scale, blur){
  hubWrap.style.transform = `scale(${scale.toFixed(4)})`;
  hubWrap.style.filter    = blur > 0.1 ? `blur(${blur.toFixed(1)}px)` : 'none';
}

function openSheet(filename, displayName){
  if(sheetOpen) return;
  sheetOpen = true;

  // Set iframe src + title
  const url = BASE + filename;
  const iframe = document.getElementById('sheet-iframe');
  document.getElementById('sheet-title').textContent = displayName;
  document.getElementById('sheet-loading').style.display = 'flex';
  iframe.style.opacity = '0';
  iframe.src = url;

  // Show backdrop
  backdrop.classList.add('open');
  hubWrap.classList.add('sheet-open');
  document.body.style.overflow = 'hidden';

  // Spring sheet up from bottom (100% → 0%)
  sheetSp.to(0, applySheet);

  // Spring hub: scale down + blur in
  hubSp.to(0.92, v => {
    hubBlurSp.to(6, b => applyHub(v, b));
  });
}

function closeSheet(){
  if(!sheetOpen) return;
  sheetOpen = false;

  backdrop.classList.remove('open');
  document.body.style.overflow = '';

  // Spring sheet back down
  sheetSp.to(100, applySheet);

  // Spring hub back to normal
  hubSp.to(1, v => {
    hubBlurSp.to(0, b => {
      applyHub(v, b);
      if(Math.abs(v - 1) < 0.001){
        hubWrap.classList.remove('sheet-open');
        hubWrap.style.transform = '';
        hubWrap.style.filter = '';
      }
    });
  });

  // Clear iframe after animation
  setTimeout(()=>{
    const iframe = document.getElementById('sheet-iframe');
    iframe.src = '';
    iframe.style.opacity = '0';
    document.getElementById('sheet-loading').style.display = 'flex';
  }, 450);

  // Spring close button
  const closeBtn = document.getElementById('sheet-close');
  const sp = new Spring(400, 14, 1); sp.set(0.8);
  sp.to(1, v => closeBtn.style.transform = `scale(${v})`);
}

/* ── LAUNCH — open in sheet with spring ── */
function launch(filename){
  const card = document.querySelector(`.acard[data-name="${filename}"]`);
  const displayName = card ? card.querySelector('.aname').textContent : filename;
  openSheet(filename, displayName);
}


/* ── POPOUT — open in about:blank then immediately redirect ── */
function popout(filename){
  const url=BASE+filename;
  const tab=window.open('about:blank','_blank');
  if(!tab){alert('Allow pop-ups to use Tab mode.');return;}
  /* Write a redirect page — the tab starts as about:blank then navigates itself */
  tab.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=${url}">
<title>Loading…</title>
<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;
font-family:system-ui,sans-serif;background:#080810;color:rgba(255,255,255,0.35);font-size:0.9rem;letter-spacing:0.5px;}</style>
</head><body><p>Loading…</p>
<script>location.replace(${JSON.stringify(url)});<\/script>
</body></html>`);
  tab.document.close();
}

/* ── BOOT ── */
window.addEventListener('DOMContentLoaded',()=>{
  staggerIn(document.querySelectorAll('.pill'),{delay:80,fromY:14,stiffness:350,damping:20});
  document.querySelectorAll('.pill').forEach(p=>springBtn(p,{hoverScale:1.06,pressScale:0.94,stiffness:360,damping:18}));
  springBtn(document.getElementById('searchToggle'),{hoverScale:1.12,pressScale:0.9,stiffness:400,damping:15});
  springBtn(document.getElementById('sheet-close'),{hoverScale:1.15,pressScale:0.88,stiffness:420,damping:14});
  sheet.style.transform='translateY(100%)';

  /* wire iframe load event here so function is guaranteed defined */
  document.getElementById('sheet-iframe').addEventListener('load', function(){
    if(!this.src || this.src === window.location.href) return;
    document.getElementById('sheet-loading').style.display='none';
    this.style.opacity='1';
  });

  loadFiles();
});</script>
</body>
