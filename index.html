<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EggZone - Free Unblocked Games</title>
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8F0;
    --lavender: #E8D5F5;
    --mint: #C8F0DC;
    --sky: #D0EEFF;
    --pink: #FFD6E7;
    --peach: #FFE0CC;
    --yellow: #FFF3B0;
    --purple: #B57BCC;
    --green: #5BAD7F;
    --blue: #5BA3CC;
    --rose: #E8719A;
    --gold: #C4920A;
    --dark: #3D2B4E;
    --mid: #7B5C96;
    --card-bg: #FFFAF5;
    --border: #E0C8F0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;overflow-x:hidden;position:relative;}
  .egg-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
  .ef{position:absolute;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;opacity:0.13;animation:floatUp linear infinite;}
  @keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg);}100%{transform:translateY(-20vh) rotate(360deg);}}
  body::after{content:'';position:fixed;bottom:0;left:0;width:100%;height:55px;background:repeating-linear-gradient(90deg,#7BC67E 0px,#7BC67E 8px,#5BAD7F 8px,#5BAD7F 14px,#8FD494 14px,#8FD494 20px,#5BAD7F 20px,#5BAD7F 26px);clip-path:polygon(0% 55%,2% 18%,4% 55%,6% 12%,8% 55%,10% 22%,12% 55%,14% 8%,16% 55%,18% 28%,20% 55%,22% 15%,24% 55%,26% 22%,28% 55%,30% 10%,32% 55%,34% 25%,36% 55%,38% 13%,40% 55%,42% 20%,44% 55%,46% 15%,48% 55%,50% 8%,52% 55%,54% 22%,56% 55%,58% 18%,60% 55%,62% 12%,64% 55%,66% 25%,68% 55%,70% 10%,72% 55%,74% 20%,76% 55%,78% 15%,80% 55%,82% 22%,84% 55%,86% 12%,88% 55%,90% 18%,92% 55%,94% 10%,96% 55%,98% 22%,100% 55%,100% 100%,0% 100%);pointer-events:none;z-index:1;}
  header{position:relative;z-index:10;text-align:center;padding:2rem 1rem 0.75rem;background:linear-gradient(180deg,#FFE8F5 0%,transparent 100%);}
  .ears{display:flex;justify-content:center;gap:10px;margin-bottom:2px;}
  .ear{width:16px;height:38px;background:#FFD6E7;border-radius:50% 50% 30% 30%;border:2px solid var(--rose);position:relative;}
  .ear::after{content:'';position:absolute;top:6px;left:4px;width:7px;height:22px;background:var(--rose);border-radius:50%;opacity:0.45;}
  .ear.l{transform:rotate(-12deg);}
  .ear.r{transform:rotate(12deg);}
  .logo{font-family:'Bubblegum Sans',cursive;font-size:clamp(2rem,6vw,3.4rem);color:var(--purple);letter-spacing:2px;display:inline-flex;align-items:center;gap:0.2em;}
  .logo span{color:var(--rose);}
  .eggico{display:inline-block;width:0.65em;height:0.78em;background:linear-gradient(135deg,#FFD6E7,#E8D5F5);border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;border:2.5px solid var(--rose);animation:wb 2s ease-in-out infinite;}
  @keyframes wb{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
  .tagline{color:var(--mid);font-size:0.9rem;margin-top:0.25rem;font-weight:700;letter-spacing:0.5px;}
  nav{display:flex;justify-content:center;gap:0.5rem;flex-wrap:wrap;padding:0.75rem 1rem;position:relative;z-index:10;}
  .fb{background:white;border:2px solid var(--border);color:var(--mid);padding:0.35rem 1rem;border-radius:999px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .fb:hover,.fb.active{background:var(--purple);border-color:var(--purple);color:white;transform:translateY(-2px);box-shadow:0 4px 12px rgba(181,123,204,0.35);}
  main{position:relative;z-index:10;max-width:1100px;margin:0 auto;padding:1rem 1.5rem 5rem;}
  #hv{display:block;}#gv{display:none;}
  .st{font-family:'Bubblegum Sans',cursive;font-size:1.4rem;color:var(--purple);margin-bottom:1.25rem;}
  .gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1.25rem;margin-bottom:3rem;}
  .gc{background:var(--card-bg);border:2.5px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);position:relative;}
  .gc:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 10px 28px rgba(181,123,204,0.25);border-color:var(--purple);}
  .gt{width:100%;aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;}
  .bdg{position:absolute;top:8px;right:8px;background:var(--rose);color:white;font-size:0.62rem;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:0.5px;z-index:2;}
  .bdg.new{background:var(--green);}
  .bdg.cls{background:var(--purple);}
  .gi{padding:0.75rem 1rem 0.2rem;}
  .gn{font-family:'Bubblegum Sans',cursive;font-size:1.05rem;color:var(--dark);}
  .gcat{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;margin-top:1px;}
  .pb{display:block;width:calc(100% - 1.5rem);margin:0.6rem 0.75rem 0.75rem;padding:0.5rem;background:linear-gradient(135deg,var(--purple),var(--rose));border:none;border-radius:12px;color:white;font-family:'Bubblegum Sans',cursive;font-size:1rem;cursor:pointer;transition:all 0.2s;letter-spacing:1px;}
  .pb:hover{transform:scale(1.03);box-shadow:0 4px 14px rgba(181,123,204,0.45);}
  .ts-snake{background:linear-gradient(135deg,var(--mint),#A8E6C0);}
  .ts-tetris{background:linear-gradient(135deg,var(--lavender),#D4B8F0);}
  .ts-pong{background:linear-gradient(135deg,var(--peach),#FFD0B0);}
  .ts-memory{background:linear-gradient(135deg,var(--pink),#FFB8D4);}
  .ts-2048{background:linear-gradient(135deg,var(--yellow),#FFE880);}
  .bb{display:inline-flex;align-items:center;gap:0.5rem;background:white;border:2px solid var(--border);color:var(--mid);padding:0.45rem 1.2rem;border-radius:999px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;font-size:0.9rem;margin-bottom:1.25rem;transition:all 0.2s;}
  .bb:hover{border-color:var(--purple);color:var(--purple);transform:translateX(-3px);}
  .gs{background:#fff;border-radius:20px;overflow:hidden;border:2.5px solid var(--border);box-shadow:0 6px 24px rgba(181,123,204,0.15);display:flex;align-items:center;justify-content:center;position:relative;}
  .gs canvas{display:block;max-width:100%;}
  .sd{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
  .sb{background:white;border:2px solid var(--border);border-radius:14px;padding:0.55rem 1.1rem;text-align:center;}
  .sl{font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--mid);margin-bottom:1px;}
  .sv{font-family:'Bubblegum Sans',cursive;font-size:1.4rem;color:var(--purple);}
  .gc2{margin-top:0.85rem;padding:0.65rem 1rem;background:var(--lavender);border-radius:10px;font-size:0.85rem;color:var(--mid);font-weight:700;}
  .memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px;max-width:420px;margin:0 auto;width:100%;}
  .mc{aspect-ratio:1;border-radius:12px;cursor:pointer;perspective:600px;position:relative;}
  .mci{width:100%;height:100%;position:relative;transition:transform 0.4s;transform-style:preserve-3d;}
  .mc.fl .mci{transform:rotateY(180deg);}
  .mf{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;font-size:1.8rem;}
  .mb{background:linear-gradient(135deg,var(--purple),var(--rose));border:3px solid rgba(255,255,255,0.4);position:relative;}
  .mb::after{content:'';width:55%;height:65%;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;background:rgba(255,255,255,0.2);position:absolute;top:18%;}
  .mfr{background:var(--card-bg);border:2.5px solid var(--border);transform:rotateY(180deg);}
  .b2{background:var(--lavender);border-radius:14px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 auto;max-width:380px;width:100%;}
  .t2048{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bubblegum Sans',cursive;font-size:1.3rem;background:rgba(255,255,255,0.5);color:var(--mid);border:2px solid rgba(255,255,255,0.7);}
  .v2{background:#FFF3B0;color:#7A5800;border-color:#FFE566;}
  .v4{background:#FFE0CC;color:#7A3800;border-color:#FFB87A;}
  .v8{background:#FFD6E7;color:#7A1040;border-color:#FF8AB8;}
  .v16{background:#E8D5F5;color:#4A107A;border-color:#C47BEA;font-size:1.1rem;}
  .v32{background:#C8F0DC;color:#0A4A28;border-color:#5BAD7F;font-size:1.1rem;}
  .v64{background:#D0EEFF;color:#0A3A5A;border-color:#5BA3CC;font-size:1.1rem;}
  .v128{background:var(--purple);color:white;border-color:#9B5BB2;font-size:.95rem;}
  .v256{background:var(--rose);color:white;border-color:#C44D7A;font-size:.95rem;}
  .v512{background:var(--green);color:white;border-color:#3D8B60;font-size:.95rem;}
  .v1024{background:var(--blue);color:white;border-color:#3D7FAA;font-size:.8rem;}
  .v2048{background:linear-gradient(135deg,var(--purple),var(--rose));color:white;border-color:var(--rose);font-size:.8rem;}
  .ov{position:absolute;inset:0;background:rgba(255,240,250,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:18px;gap:1rem;z-index:20;}
  .ov h2{font-family:'Bubblegum Sans',cursive;font-size:2.2rem;color:var(--purple);}
  .ov p{color:var(--mid);font-size:1rem;font-weight:700;}
  .rb{background:linear-gradient(135deg,var(--purple),var(--rose));border:none;color:white;font-family:'Bubblegum Sans',cursive;font-size:1.1rem;padding:0.65rem 2rem;border-radius:999px;cursor:pointer;letter-spacing:1px;transition:transform 0.2s;}
  .rb:hover{transform:scale(1.05);}
  .odeco{font-size:1.8rem;display:flex;gap:8px;}
  footer{text-align:center;padding:1.5rem 1rem 70px;color:var(--mid);font-size:0.8rem;font-weight:700;position:relative;z-index:10;}
  @media(max-width:500px){.memory-board{gap:7px;padding:12px;max-width:300px;}.mf{font-size:1.3rem;}.b2{gap:7px;padding:10px;}.t2048{font-size:1rem;}}
</style>
</head>
<body>

<div class="egg-bg" id="ebg"></div>

<header>
  <div class="ears"><div class="ear l"></div><div class="ear r"></div></div>
  <div class="logo"><div class="eggico"></div>Egg<span>Zone</span><div class="eggico"></div></div>
  <p class="tagline">🐣 Free Unblocked Games &nbsp;·&nbsp; Happy Easter! 🌸</p>
</header>

<nav>
  <button class="fb active" onclick="fg('all',this)">🥚 All Games</button>
  <button class="fb" onclick="fg('arcade',this)">🐇 Arcade</button>
  <button class="fb" onclick="fg('puzzle',this)">🌸 Puzzle</button>
  <button class="fb" onclick="fg('classic',this)">🍬 Classic</button>
</nav>

<main>
  <div id="hv">
    <p class="st">🌷 Featured Games</p>
    <div class="gg">
      <div class="gc" data-cat="arcade" data-game="snake">
        <div class="gt ts-snake">🐍<span class="bdg">Hot</span></div>
        <div class="gi"><p class="gn">Easter Snake</p><p class="gcat" style="color:var(--green)">Arcade</p></div>
        <button class="pb" onclick="lg('snake')">▶ Play Now</button>
      </div>
      <div class="gc" data-cat="classic" data-game="tetris">
        <div class="gt ts-tetris">🟪<span class="bdg cls">Classic</span></div>
        <div class="gi"><p class="gn">Egg Stacker</p><p class="gcat" style="color:var(--purple)">Classic</p></div>
        <button class="pb" onclick="lg('tetris')">▶ Play Now</button>
      </div>
      <div class="gc" data-cat="classic" data-game="pong">
        <div class="gt ts-pong">🏓<span class="bdg">Hot</span></div>
        <div class="gi"><p class="gn">Bunny Pong</p><p class="gcat" style="color:var(--gold)">Classic</p></div>
        <button class="pb" onclick="lg('pong')">▶ Play Now</button>
      </div>
      <div class="gc" data-cat="puzzle" data-game="memory">
        <div class="gt ts-memory">🃏<span class="bdg new">New</span></div>
        <div class="gi"><p class="gn">Egg Hunt Match</p><p class="gcat" style="color:var(--rose)">Puzzle</p></div>
        <button class="pb" onclick="lg('memory')">▶ Play Now</button>
      </div>
      <div class="gc" data-cat="puzzle" data-game="g2048">
        <div class="gt ts-2048">🥚<span class="bdg new">New</span></div>
        <div class="gi"><p class="gn">Egg 2048</p><p class="gcat" style="color:var(--gold)">Puzzle</p></div>
        <button class="pb" onclick="lg('g2048')">▶ Play Now</button>
      </div>
    </div>
  </div>

  <div id="gv">
    <button class="bb" onclick="goHome()">🐣 Back to Games</button>
    <div class="sd" id="sd"></div>
    <div class="gs" id="gs"></div>
    <div class="gc2" id="gc2"></div>
  </div>
</main>

<footer>🐰 EggZone · Play anywhere, anytime · Happy Easter! 🌸🥚</footer>

<script>
(function(){
  const bg=document.getElementById('ebg');
  const cols=['#FFD6E7','#E8D5F5','#C8F0DC','#FFF3B0','#D0EEFF','#FFE0CC'];
  for(let i=0;i<18;i++){
    const e=document.createElement('div');e.className='ef';
    const s=18+Math.random()*38;
    e.style.cssText=`width:${s}px;height:${s*1.2}px;left:${Math.random()*100}%;background:${cols[i%cols.length]};animation-duration:${9+Math.random()*14}s;animation-delay:${-Math.random()*14}s;`;
    bg.appendChild(e);
  }
})();

let activeGame=null;

function fg(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.gc').forEach(c=>{c.style.display=(cat==='all'||c.dataset.cat===cat)?'':'none';});
}

function goHome(){
  stop();
  document.getElementById('hv').style.display='';
  document.getElementById('gv').style.display='none';
}

function lg(id){
  stop();
  document.getElementById('hv').style.display='none';
  document.getElementById('gv').style.display='';
  activeGame=id;
  const gs=document.getElementById('gs'),sd=document.getElementById('sd'),gc=document.getElementById('gc2');
  gs.innerHTML='';sd.innerHTML='';gc.innerHTML='';
  if(id==='snake')iSnake(gs,sd,gc);
  else if(id==='tetris')iTetris(gs,sd,gc);
  else if(id==='pong')iPong(gs,sd,gc);
  else if(id==='memory')iMemory(gs,sd,gc);
  else if(id==='g2048')i2048(gs,sd,gc);
}

function stop(){
  if(window._sl)clearInterval(window._sl);
  if(window._tl)clearInterval(window._tl);
  if(window._pa)cancelAnimationFrame(window._pa);
  window._sl=window._tl=window._pa=null;
}

function scoreBox(id,label){return`<div class="sb"><div class="sl">${label}</div><div class="sv" id="${id}">0</div></div>`;}

// ── SNAKE ──
function iSnake(stage,scores,controls){
  const W=400,H=400,SZ=20,C=W/SZ,R=H/SZ;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;cv.style.cssText='display:block;border-radius:18px;max-width:100%';stage.appendChild(cv);
  const ctx=cv.getContext('2d');
  scores.innerHTML=scoreBox('ss','Score')+scoreBox('sb2','Best');
  controls.innerHTML='🕹️ Arrow keys or WASD to move';
  let sn,dir,nd,food,sc,best=0,dead=false;
  function rst(){sn=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dir={x:1,y:0};nd={x:1,y:0};food=rf();sc=0;dead=false;stage.querySelectorAll('.ov').forEach(e=>e.remove());document.getElementById('ss').textContent=0;}
  function rf(){let f;do{f={x:Math.floor(Math.random()*C),y:Math.floor(Math.random()*R)};}while(sn.some(s=>s.x===f.x&&s.y===f.y));return f;}
  function draw(){
    ctx.fillStyle='#FFF8F0';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(181,123,204,0.07)';ctx.lineWidth=0.5;
    for(let x=0;x<W;x+=SZ){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=SZ){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    ctx.save();ctx.translate(food.x*SZ+SZ/2,food.y*SZ+SZ/2);ctx.scale(0.8,1);
    ctx.beginPath();ctx.arc(0,0,SZ/2-1,0,Math.PI*2);ctx.fillStyle='#E8719A';ctx.fill();
    ctx.strokeStyle='#C44D78';ctx.lineWidth=1.5;ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-4,-2);ctx.lineTo(4,-2);ctx.stroke();
    ctx.restore();
    const segs=['#5BAD7F','#7BC89A','#9AD4B0'];
    sn.forEach((seg,i)=>{
      ctx.fillStyle=i===0?'#5BAD7F':segs[i%3];
      ctx.beginPath();ctx.roundRect(seg.x*SZ+2,seg.y*SZ+2,SZ-4,SZ-4,5);ctx.fill();
      if(i===0){ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(seg.x*SZ+5,seg.y*SZ+5,3,3);ctx.fillRect(seg.x*SZ+11,seg.y*SZ+5,3,3);}
    });
  }
  function step(){
    if(dead)return;dir=nd;
    const h={x:sn[0].x+dir.x,y:sn[0].y+dir.y};
    if(h.x<0||h.x>=C||h.y<0||h.y>=R||sn.some(s=>s.x===h.x&&s.y===h.y)){dead=true;best=Math.max(best,sc);document.getElementById('sb2').textContent=best;showOv(stage,'Game Over 🥚',`Score: ${sc}`,rst);return;}
    sn.unshift(h);
    if(h.x===food.x&&h.y===food.y){sc+=10;document.getElementById('ss').textContent=sc;food=rf();}else sn.pop();
    draw();
  }
  document.addEventListener('keydown',function sk(e){
    if(!activeGame||activeGame!=='snake'){document.removeEventListener('keydown',sk);return;}
    if(['ArrowUp','w','W'].includes(e.key)&&dir.y!==1)nd={x:0,y:-1};
    else if(['ArrowDown','s','S'].includes(e.key)&&dir.y!==-1)nd={x:0,y:1};
    else if(['ArrowLeft','a','A'].includes(e.key)&&dir.x!==1)nd={x:-1,y:0};
    else if(['ArrowRight','d','D'].includes(e.key)&&dir.x!==-1)nd={x:1,y:0};
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
  });
  rst();draw();window._sl=setInterval(step,135);
}

// ── TETRIS ──
function iTetris(stage,scores,controls){
  const W=300,H=600,BW=10,BH=20,SZ=30;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;cv.style.cssText='display:block;border-radius:18px;max-width:100%';stage.appendChild(cv);
  const ctx=cv.getContext('2d');
  scores.innerHTML=scoreBox('ts','Score')+scoreBox('tl','Level')+scoreBox('tli','Lines');
  controls.innerHTML='⬅➡ Move &nbsp;|&nbsp; ⬆ Rotate &nbsp;|&nbsp; ⬇ Drop &nbsp;|&nbsp; Space Hard drop';
  const PS=[{s:[[1,1,1,1]],c:'#D0EEFF',b:'#5BA3CC'},{s:[[1,0],[1,0],[1,1]],c:'#FFE0CC',b:'#E8923E'},{s:[[0,1],[0,1],[1,1]],c:'#C8F0DC',b:'#5BAD7F'},{s:[[1,1],[1,1]],c:'#FFF3B0',b:'#C4920A'},{s:[[0,1,1],[1,1,0]],c:'#FFD6E7',b:'#E8719A'},{s:[[1,1,0],[0,1,1]],c:'#E8D5F5',b:'#9B5BB2'},{s:[[1,1,1],[0,1,0]],c:'#B57BCC',b:'#7B3B9C'}];
  let board,piece,sc,level,lines,dead;
  function np(){const i=Math.floor(Math.random()*PS.length),p=PS[i];return{shape:p.s.map(r=>[...r]),color:p.c,border:p.b,x:Math.floor((BW-p.s[0].length)/2),y:0};}
  function rst(){board=Array.from({length:BH},()=>Array(BW).fill(null));piece=np();sc=0;level=1;lines=0;dead=false;stage.querySelectorAll('.ov').forEach(e=>e.remove());['ts','tli'].forEach(id=>document.getElementById(id).textContent=0);document.getElementById('tl').textContent=1;}
  function valid(sh,x,y){return sh.every((row,r)=>row.every((c,col)=>!c||(x+col>=0&&x+col<BW&&y+r<BH&&!(board[y+r]&&board[y+r][x+col]))));}
  function rotate(sh){return sh[0].map((_,i)=>sh.map(r=>r[i]).reverse());}
  function lock(){
    piece.shape.forEach((row,r)=>row.forEach((c,col)=>{if(c)board[piece.y+r][piece.x+col]={color:piece.color,border:piece.border};}));
    let cl=0;for(let r=BH-1;r>=0;r--){if(board[r].every(c=>c)){board.splice(r,1);board.unshift(Array(BW).fill(null));cl++;r++;}}
    lines+=cl;sc+=cl?[0,100,300,500,800][cl]*level:0;level=Math.floor(lines/10)+1;
    document.getElementById('ts').textContent=sc;document.getElementById('tl').textContent=level;document.getElementById('tli').textContent=lines;
    piece=np();if(!valid(piece.shape,piece.x,piece.y)){dead=true;showOv(stage,'Game Over 🥚',`Score: ${sc}`,rst);}
  }
  function draw(){
    ctx.fillStyle='#FFF8F0';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(181,123,204,0.07)';ctx.lineWidth=0.5;
    for(let x=0;x<W;x+=SZ){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=SZ){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    board.forEach((row,r)=>row.forEach((c,col)=>{if(c){ctx.fillStyle=c.color;ctx.fillRect(col*SZ+1,r*SZ+1,SZ-2,SZ-2);ctx.strokeStyle=c.border;ctx.lineWidth=2;ctx.strokeRect(col*SZ+2,r*SZ+2,SZ-4,SZ-4);}}));
    piece.shape.forEach((row,r)=>row.forEach((c,col)=>{if(c){ctx.fillStyle=piece.color;ctx.fillRect((piece.x+col)*SZ+1,(piece.y+r)*SZ+1,SZ-2,SZ-2);ctx.strokeStyle=piece.border;ctx.lineWidth=2;ctx.strokeRect((piece.x+col)*SZ+2,(piece.y+r)*SZ+2,SZ-4,SZ-4);}}));
  }
  document.addEventListener('keydown',function tk(e){
    if(!activeGame||activeGame!=='tetris'){document.removeEventListener('keydown',tk);return;}
    if(dead)return;
    if(e.key==='ArrowLeft'){if(valid(piece.shape,piece.x-1,piece.y))piece.x--;}
    else if(e.key==='ArrowRight'){if(valid(piece.shape,piece.x+1,piece.y))piece.x++;}
    else if(e.key==='ArrowDown'){if(valid(piece.shape,piece.x,piece.y+1))piece.y++;else lock();}
    else if(e.key==='ArrowUp'){const r=rotate(piece.shape);if(valid(r,piece.x,piece.y))piece.shape=r;}
    else if(e.key===' '){while(valid(piece.shape,piece.x,piece.y+1))piece.y++;lock();}
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
    draw();
  });
  rst();
  window._tl=setInterval(()=>{
    if(!activeGame||activeGame!=='tetris'){clearInterval(window._tl);return;}
    if(dead)return;if(valid(piece.shape,piece.x,piece.y+1))piece.y++;else lock();draw();
  },Math.max(50,500-(level-1)*40));
}

// ── PONG ──
function iPong(stage,scores,controls){
  const W=500,H=350;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;cv.style.cssText='display:block;border-radius:18px;max-width:100%';stage.appendChild(cv);
  const ctx=cv.getContext('2d');
  scores.innerHTML=scoreBox('py','You')+scoreBox('pc','CPU');
  controls.innerHTML='⬆⬇ or W/S to move your paddle (left side)';
  const PH=70,PW=12,BR=9;
  let py,ey,bx,by,vx,vy,ps,es,keys={};
  function rst(full){if(full){ps=0;es=0;document.getElementById('py').textContent=0;document.getElementById('pc').textContent=0;}py=H/2-PH/2;ey=H/2-PH/2;bx=W/2;by=H/2;vx=(Math.random()<.5?1:-1)*4;vy=(Math.random()-.5)*4;}
  document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','w','s'].includes(e.key))e.preventDefault();});
  document.addEventListener('keyup',e=>{keys[e.key]=false;});
  function upd(){
    if(!activeGame||activeGame!=='pong'){cancelAnimationFrame(window._pa);return;}
    if((keys['ArrowUp']||keys['w']||keys['W'])&&py>0)py-=5;
    if((keys['ArrowDown']||keys['s']||keys['S'])&&py<H-PH)py+=5;
    const cen=ey+PH/2;if(cen<by-5)ey+=3.5;else if(cen>by+5)ey-=3.5;
    ey=Math.max(0,Math.min(H-PH,ey));
    bx+=vx;by+=vy;
    if(by<=BR||by>=H-BR)vy*=-1;
    if(bx-BR<=PW+10&&by>=py&&by<=py+PH){vx=Math.abs(vx);vy=((by-(py+PH/2))/(PH/2))*5;vx+=0.15;}
    if(bx+BR>=W-PW-10&&by>=ey&&by<=ey+PH){vx=-Math.abs(vx);vy=((by-(ey+PH/2))/(PH/2))*5;}
    if(bx<0){es++;document.getElementById('pc').textContent=es;rst(false);}
    if(bx>W){ps++;document.getElementById('py').textContent=ps;rst(false);}
    ctx.fillStyle='#FFF8F0';ctx.fillRect(0,0,W,H);
    ctx.setLineDash([6,6]);ctx.strokeStyle='rgba(181,123,204,0.2)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#C8F0DC';ctx.strokeStyle='#5BAD7F';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(10,py,PW,PH,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='#FFD6E7';ctx.strokeStyle='#E8719A';ctx.beginPath();ctx.roundRect(W-PW-10,ey,PW,PH,6);ctx.fill();ctx.stroke();
    ctx.save();ctx.translate(bx,by);ctx.scale(0.85,1);
    ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.fillStyle='#FFF3B0';ctx.fill();ctx.strokeStyle='#C4920A';ctx.lineWidth=1.5;ctx.stroke();
    ctx.strokeStyle='rgba(196,146,10,0.35)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-BR+2,0);ctx.lineTo(BR-2,0);ctx.stroke();
    ctx.restore();
    window._pa=requestAnimationFrame(upd);
  }
  rst(true);window._pa=requestAnimationFrame(upd);
}

// ── MEMORY ──
function iMemory(stage,scores,controls){
  const emojis=['🐣','🌷','🐰','🌸','🥕','🌈','🦋','🍫'];
  let cards=[...emojis,...emojis].sort(()=>Math.random()-.5).map((e,i)=>({id:i,emoji:e,matched:false,flipped:false}));
  let flipped=[],moves=0,matched=0,locked=false;
  scores.innerHTML=scoreBox('mm','Moves')+scoreBox('mf2','Found');
  controls.innerHTML='🖱️ Click eggs to flip and find matching pairs!';
  function render(){
    const board=document.createElement('div');board.className='memory-board';
    cards.forEach(card=>{
      const el=document.createElement('div');el.className='mc'+(card.flipped||card.matched?' fl':'');
      el.innerHTML=`<div class="mci"><div class="mf mb"></div><div class="mf mfr">${card.emoji}</div></div>`;
      if(!card.matched)el.addEventListener('click',()=>flip(card.id));
      board.appendChild(el);
    });
    stage.innerHTML='';stage.appendChild(board);
  }
  function flip(id){
    if(locked)return;const card=cards[id];if(card.flipped||card.matched)return;
    card.flipped=true;flipped.push(id);render();
    if(flipped.length===2){
      locked=true;moves++;document.getElementById('mm').textContent=moves;
      const[a,b]=[cards[flipped[0]],cards[flipped[1]]];
      if(a.emoji===b.emoji){a.matched=b.matched=true;matched++;document.getElementById('mf2').textContent=matched;flipped=[];locked=false;render();if(matched===8)setTimeout(()=>showOv(stage,'🐣 You Win!',`${moves} moves`,()=>iMemory(stage,scores,controls)),300);}
      else{setTimeout(()=>{a.flipped=b.flipped=false;flipped=[];locked=false;render();},900);}
    }
  }
  render();
}

// ── 2048 ──
function i2048(stage,scores,controls){
  let board,sc,best=0;
  scores.innerHTML=scoreBox('gs2','Score')+scoreBox('gb','Best');
  controls.innerHTML='⬅➡⬆⬇ Arrow keys to slide &nbsp;|&nbsp; Swipe on mobile';
  function nb(){board=Array.from({length:4},()=>Array(4).fill(0));sc=0;at();at();}
  function at(){const e=[];board.forEach((r,ri)=>r.forEach((c,ci)=>{if(!c)e.push([ri,ci]);}));if(!e.length)return;const[r,c]=e[Math.floor(Math.random()*e.length)];board[r][c]=Math.random()<.9?2:4;}
  function slide(row){let a=row.filter(v=>v),m=false;for(let i=0;i<a.length-1;i++){if(a[i]===a[i+1]&&!m){sc+=a[i]*2;a[i]*=2;a.splice(i+1,1);m=true;}else{m=false;}}while(a.length<4)a.push(0);return a;}
  function mv(dir){
    const prev=board.map(r=>[...r]);
    if(dir==='left')board=board.map(r=>slide(r));
    if(dir==='right')board=board.map(r=>slide([...r].reverse()).reverse());
    if(dir==='up'){const cols=board[0].map((_,c)=>slide(board.map(r=>r[c])));board=board.map((r,ri)=>r.map((_,ci)=>cols[ci][ri]));}
    if(dir==='down'){const cols=board[0].map((_,c)=>slide([...board.map(r=>r[c])].reverse()).reverse());board=board.map((r,ri)=>r.map((_,ci)=>cols[ci][ri]));}
    if(JSON.stringify(board)!==JSON.stringify(prev)){at();document.getElementById('gs2').textContent=sc;best=Math.max(best,sc);document.getElementById('gb').textContent=best;}
    render();if(over())showOv(stage,'Game Over 🥚',`Score: ${sc}`,()=>{nb();render();});
  }
  function over(){for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(!board[r][c])return false;if(c<3&&board[r][c]===board[r][c+1])return false;if(r<3&&board[r][c]===board[r+1][c])return false;}return true;}
  function tc(v){if(!v)return't2048';const m={2:'v2',4:'v4',8:'v8',16:'v16',32:'v32',64:'v64',128:'v128',256:'v256',512:'v512',1024:'v1024',2048:'v2048'};return't2048 '+(m[v]||'v2048');}
  function render(){const el=document.createElement('div');el.className='b2';board.forEach(row=>row.forEach(v=>{const t=document.createElement('div');t.className=tc(v);t.textContent=v||'';el.appendChild(t);}));stage.innerHTML='';stage.appendChild(el);}
  document.addEventListener('keydown',function k2(e){
    if(!activeGame||activeGame!=='g2048'){document.removeEventListener('keydown',k2);return;}
    const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
    if(m[e.key]){e.preventDefault();mv(m[e.key]);}
  });
  let tx=null,ty=null;
  stage.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  stage.addEventListener('touchend',e=>{if(!tx||!ty)return;const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy))mv(dx>0?'right':'left');else mv(dy>0?'down':'up');tx=ty=null;},{passive:true});
  nb();render();
}

// ── OVERLAY ──
function showOv(container,title,sub,onRestart){
  const ov=document.createElement('div');ov.className='ov';
  ov.innerHTML=`<div class="odeco">🥚🐣🌸</div><h2>${title}</h2><p>${sub}</p><button class="rb">Play Again 🐰</button>`;
  ov.querySelector('button').addEventListener('click',()=>{ov.remove();onRestart();});
  container.style.position='relative';container.appendChild(ov);
}
