<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahur Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

/* ── BACKGROUND ── */
body{
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  background:#0a0a0f;
  color:#fff;
}

/* Ambient gradient orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:orbDrift ease-in-out infinite;}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(120,80,255,0.28),transparent 70%);top:-200px;left:-100px;animation-duration:18s;animation-delay:0s;}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(0,180,255,0.2),transparent 70%);top:30%;right:-150px;animation-duration:22s;animation-delay:-6s;}
.orb3{width:400px;height:400px;background:radial-gradient(circle,rgba(255,100,180,0.15),transparent 70%);bottom:10%;left:20%;animation-duration:16s;animation-delay:-10s;}
@keyframes orbDrift{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(40px,-30px) scale(1.05);}
  66%{transform:translate(-30px,40px) scale(0.95);}
}

/* Glass mixin used everywhere */
.glass{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,0.13);
}
.glass-strong{
  background:rgba(255,255,255,0.11);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border:1px solid rgba(255,255,255,0.18);
}

/* ── HEADER ── */
header{
  position:relative;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 1.8rem;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.logo{
  font-size:1.3rem;font-weight:700;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.6) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo span{
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.header-right{display:flex;align-items:center;gap:10px;}

/* Search toggle button */
.search-toggle{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.7);
  font-size:1rem;
  transition:all 0.2s cubic-bezier(0.34,1.6,0.64,1);
}
.search-toggle:hover{background:rgba(255,255,255,0.15);color:#fff;transform:scale(1.08);}
.search-toggle.active{background:rgba(167,139,250,0.25);border-color:rgba(167,139,250,0.5);color:#a78bfa;}

/* Collapsible search bar */
.search-wrap{
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:max-height 0.35s cubic-bezier(0.34,1.4,0.64,1),opacity 0.25s ease,padding 0.25s ease;
  position:relative;z-index:20;
  padding:0 1.8rem;
}
.search-wrap.open{max-height:80px;opacity:1;padding:0.7rem 1.8rem;}
.search-inner{
  display:flex;align-items:center;gap:12px;
  padding:0.6rem 1rem;
  border-radius:14px;
}
.search-inner input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:400;
  color:#fff;
}
.search-inner input::placeholder{color:rgba(255,255,255,0.35);}
.search-icon{color:rgba(255,255,255,0.4);font-size:0.9rem;flex-shrink:0;}
.clear-search{
  background:none;border:none;color:rgba(255,255,255,0.35);cursor:pointer;
  font-size:1rem;padding:0 2px;transition:color 0.15s;
  display:none;
}
.clear-search.vis{display:block;}
.clear-search:hover{color:rgba(255,255,255,0.8);}

/* ── NAV PILLS ── */
nav{
  position:relative;z-index:20;
  display:flex;align-items:center;gap:8px;
  padding:1rem 1.8rem 0.5rem;
  flex-wrap:wrap;
}
.pill{
  padding:0.38rem 1rem;border-radius:999px;
  font-size:0.78rem;font-weight:600;letter-spacing:0.2px;
  cursor:pointer;border:none;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.55);
  transition:all 0.18s cubic-bezier(0.34,1.6,0.64,1);
}
.pill:hover{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.9);transform:scale(1.05);}
.pill.active{
  background:linear-gradient(135deg,rgba(167,139,250,0.35),rgba(96,165,250,0.3));
  border-color:rgba(167,139,250,0.5);
  color:#fff;
  box-shadow:0 2px 12px rgba(167,139,250,0.25);
}

/* ── MAIN ── */
main{position:relative;z-index:10;max-width:1120px;margin:0 auto;padding:1.2rem 1.8rem 4rem;}
#hv{display:block;}
#av{display:none;}

/* Section label */
.sec-label{
  font-size:0.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.3);margin-bottom:1rem;margin-top:0.5rem;
}

/* Empty / loading states */
.state-msg{
  text-align:center;padding:3rem 1rem;
  color:rgba(255,255,255,0.3);font-size:0.95rem;font-weight:400;
}

/* ── CARDS GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:14px;margin-bottom:2rem;
}

.acard{
  border-radius:20px;overflow:hidden;cursor:pointer;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  transition:transform 0.22s cubic-bezier(0.34,1.6,0.64,1),box-shadow 0.22s,border-color 0.22s;
  position:relative;
}
.acard:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:rgba(167,139,250,0.4);
  box-shadow:0 16px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(167,139,250,0.15);
}
.acard:active{transform:scale(0.97);}

.athumb{
  width:100%;aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;
  position:relative;
  background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
  border-bottom:1px solid rgba(255,255,255,0.07);
}

/* shimmer on thumb */
.athumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.04) 50%,transparent 60%);
  animation:shimmer 3s ease infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}

.ainfo{padding:0.75rem 0.9rem 0.3rem;}
.aname{font-size:0.9rem;font-weight:600;color:rgba(255,255,255,0.9);letter-spacing:-0.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.aext{font-size:0.68rem;font-weight:500;color:rgba(255,255,255,0.3);margin-top:1px;letter-spacing:0.3px;}

.btnrow{display:flex;gap:7px;padding:0.5rem 0.9rem 0.85rem;}
.startbtn{
  flex:1;padding:0.45rem 0;
  background:linear-gradient(135deg,rgba(167,139,250,0.5),rgba(96,165,250,0.4));
  border:1px solid rgba(167,139,250,0.4);
  border-radius:10px;color:#fff;
  font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:600;
  cursor:pointer;letter-spacing:0.3px;
  transition:all 0.15s cubic-bezier(0.34,1.8,0.64,1);
  backdrop-filter:blur(8px);
}
.startbtn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(167,139,250,0.35);}
.startbtn:active{transform:scale(0.95);}
.popbtn{
  padding:0.45rem 0.75rem;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;color:rgba(255,255,255,0.55);
  font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:600;
  cursor:pointer;white-space:nowrap;
  transition:all 0.15s cubic-bezier(0.34,1.8,0.64,1);
}
.popbtn:hover{border-color:rgba(255,255,255,0.3);color:#fff;transform:scale(1.06);}
.popbtn:active{transform:scale(0.94);}

/* no results */
.no-results{
  grid-column:1/-1;
  text-align:center;padding:2.5rem 1rem;
  color:rgba(255,255,255,0.28);font-size:0.9rem;
}

/* ── ACTIVITY VIEW ── */
.backbtn{
  display:inline-flex;align-items:center;gap:8px;
  padding:0.45rem 1.1rem;border-radius:999px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.7);
  font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:500;
  cursor:pointer;margin-bottom:1.2rem;
  transition:all 0.15s cubic-bezier(0.34,1.8,0.64,1);
}
.backbtn:hover{background:rgba(255,255,255,0.13);color:#fff;transform:translateX(-3px);}

.stage{
  border-radius:20px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
  min-height:520px;
  background:rgba(0,0,0,0.3);
  display:flex;align-items:stretch;
}
.stage iframe{width:100%;min-height:520px;border:none;border-radius:18px;display:block;flex:1;}

.hint{
  margin-top:10px;padding:0.6rem 1rem;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;font-size:0.78rem;
  color:rgba(255,255,255,0.35);font-weight:400;
}

footer{
  position:relative;z-index:10;
  text-align:center;padding:1rem;
  border-top:1px solid rgba(255,255,255,0.05);
}

@media(max-width:600px){
  header{padding:1rem 1.2rem;}
  nav,.search-wrap,main{padding-left:1.2rem;padding-right:1.2rem;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<header class="glass">
  <div class="logo">Sahur<span>Hub</span></div>
  <div class="header-right">
    <button class="search-toggle" id="searchToggle" onclick="toggleSearch()" title="Search">
      &#9906;
    </button>
  </div>
</header>

<div class="search-wrap glass" id="searchWrap">
  <div class="search-inner glass">
    <span class="search-icon">&#9906;</span>
    <input type="text" id="searchInput" placeholder="Search activities..." oninput="onSearch(this.value)">
    <button class="clear-search" id="clearBtn" onclick="clearSearch()">&#10005;</button>
  </div>
</div>

<nav>
  <button class="pill active" onclick="filt('all',this)">All</button>
  <button class="pill" onclick="filt('action',this)">Action</button>
  <button class="pill" onclick="filt('puzzle',this)">Puzzle</button>
  <button class="pill" onclick="filt('classic',this)">Classic</button>
</nav>

<main>
  <div id="hv">
    <p class="sec-label">Activities</p>
    <div class="grid" id="grid">
      <div class="state-msg" id="loadMsg">Loading activities…</div>
    </div>
  </div>

  <div id="av">
    <button class="backbtn" onclick="goHome()">&#8592; Back</button>
    <div class="stage" id="stage"></div>
    <div class="hint" id="hint"></div>
  </div>
</main>

<footer></footer>

<script>
/* ── CONFIG ── */
const REPO_OWNER='sahurhub';
const REPO_NAME='sahurhub.github.io';
const FOLDER='Education';
const BASE=`https://${REPO_OWNER}.github.io/${FOLDER}/`;
const API=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FOLDER}`;

/* Emoji assigned by filename hash for visual variety */
const EMOJIS=['🎮','🕹️','🎯','🎲','🧩','⚡','🔥','🌀','🎪','🏆','💥','🎭','🚀','⭐','🎰','🌊'];
function fileEmoji(name){
  let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xffff;
  return EMOJIS[h%EMOJIS.length];
}

/* Category guess from filename */
const ACTION_WORDS=['snake','shoot','run','jump','race','fight','dodge','ball','war','battle','flap','dash'];
const PUZZLE_WORDS=['puzzle','match','memory','2048','slide','swap','block','tetris','word','sudoku','sort'];
const CLASSIC_WORDS=['pong','chess','pac','space','breakout','brick','frogger','minesweeper','solitaire'];
function guessCategory(name){
  const n=name.toLowerCase();
  if(ACTION_WORDS.some(w=>n.includes(w)))return'action';
  if(PUZZLE_WORDS.some(w=>n.includes(w)))return'puzzle';
  if(CLASSIC_WORDS.some(w=>n.includes(w)))return'classic';
  return'action';
}

/* Pretty-print filename → display name */
function prettyName(filename){
  return filename
    .replace(/\.html?$/i,'')
    .replace(/[-_]/g,' ')
    .replace(/\b\w/g,c=>c.toUpperCase());
}

/* ── STATE ── */
let allFiles=[];
let currentCat='all';
let currentSearch='';
let searchOpen=false;

/* ── FETCH FILES FROM GITHUB API ── */
async function loadFiles(){
  try{
    const res=await fetch(API);
    if(!res.ok)throw new Error('GitHub API error '+res.status);
    const data=await res.json();
    allFiles=data
      .filter(f=>f.type==='file'&&/\.html?$/i.test(f.name))
      .map(f=>({
        name:f.name,
        display:prettyName(f.name),
        cat:guessCategory(f.name),
        emoji:fileEmoji(f.name),
        url:BASE+f.name
      }));
    if(allFiles.length===0){
      document.getElementById('loadMsg').textContent='No activities found in Education/ yet.';
    } else {
      renderCards();
    }
  }catch(e){
    document.getElementById('loadMsg').textContent='Could not load activities. Check your repo is public.';
    console.error(e);
  }
}

/* ── RENDER CARDS ── */
function renderCards(){
  const grid=document.getElementById('grid');
  const q=currentSearch.toLowerCase().trim();
  const filtered=allFiles.filter(f=>{
    const catOk=currentCat==='all'||f.cat===currentCat;
    const searchOk=!q||f.display.toLowerCase().includes(q)||f.name.toLowerCase().includes(q);
    return catOk&&searchOk;
  });

  if(filtered.length===0){
    grid.innerHTML=`<div class="no-results">No results for "${currentSearch || currentCat}"</div>`;
    return;
  }

  grid.innerHTML=filtered.map(f=>`
    <div class="acard" data-cat="${f.cat}" data-name="${f.name}">
      <div class="athumb">${f.emoji}</div>
      <div class="ainfo">
        <p class="aname">${f.display}</p>
        <p class="aext">${f.name}</p>
      </div>
      <div class="btnrow">
        <button class="startbtn" onclick="launch('${f.name}')">&#9658; Here</button>
        <button class="popbtn" onclick="popout('${f.name}')">&#10696; Tab</button>
      </div>
    </div>`).join('');
}

/* ── FILTER ── */
function filt(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

/* ── SEARCH ── */
function toggleSearch(){
  searchOpen=!searchOpen;
  const wrap=document.getElementById('searchWrap');
  const btn=document.getElementById('searchToggle');
  wrap.classList.toggle('open',searchOpen);
  btn.classList.toggle('active',searchOpen);
  if(searchOpen)setTimeout(()=>document.getElementById('searchInput').focus(),200);
  else clearSearch();
}

function onSearch(val){
  currentSearch=val;
  document.getElementById('clearBtn').classList.toggle('vis',val.length>0);
  renderCards();
}

function clearSearch(){
  currentSearch='';
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').classList.remove('vis');
  renderCards();
}

/* ── LAUNCH (iframe inline) ── */
function goHome(){
  document.getElementById('hv').style.display='';
  document.getElementById('av').style.display='none';
}

function launch(filename){
  const url=BASE+filename;
  document.getElementById('hv').style.display='none';
  document.getElementById('av').style.display='';
  document.getElementById('hint').textContent='Use keyboard or touch to play · Press Back to return';
  document.getElementById('stage').innerHTML=
    `<iframe src="${url}" allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      title="Activity"></iframe>`;
}

/* ── POPOUT (about:blank) ── */
function popout(filename){
  const url=BASE+filename;
  const tab=window.open('about:blank','_blank');
  if(!tab){alert('Allow pop-ups to use Tab mode.');return;}
  tab.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Loading…</title>
<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;
font-family:system-ui,sans-serif;background:#0a0a0f;color:rgba(255,255,255,0.4);font-size:1rem;}</style>
</head><body><p>Loading…</p></body></html>`);
  tab.document.close();
  fetch(url)
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.text();})
    .then(html=>{tab.document.open();tab.document.write(html);tab.document.close();})
    .catch(err=>{
      tab.document.open();
      tab.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Error</title>
<style>body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
height:100vh;font-family:system-ui,sans-serif;background:#0a0a0f;color:#fff;gap:10px;text-align:center;padding:2rem;}
code{font-size:.8rem;color:rgba(255,255,255,.4);word-break:break-all;}</style>
</head><body><h2>Couldn't load</h2><code>${url}</code><p style="color:rgba(255,255,255,.4);font-size:.85rem">${err}</p></body></html>`);
      tab.document.close();
    });
}

/* ── BOOT ── */
loadFiles();
</script>
</body>
</html>
