<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Chaser: Twisted Web</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #game-canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #hud-canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        
        /* UI System */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #2a3b2a 0%, #050505 100%); transition: opacity 0.5s; }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
        
        h1 { color: #8bc34a; font-size: 4rem; text-shadow: 2px 2px 0px #000, 0 0 20px #8bc34a; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 5px;}
        .subtitle { color: #ffeb3b; font-size: 1.2rem; margin-bottom: 40px; }
        
        .vehicle-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1200px; }
        .vehicle-card { background: rgba(0,0,0,0.7); border: 2px solid #555; padding: 20px; border-radius: 8px; width: 200px; text-align: center; cursor: pointer; transition: all 0.2s; color: white; }
        .vehicle-card:hover, .vehicle-card.selected { border-color: #8bc34a; background: rgba(40, 60, 40, 0.8); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(139, 195, 74, 0.2); }
        .v-name { font-weight: bold; font-size: 1.2rem; color: #ffeb3b; margin-bottom: 10px;}
        .v-stat { display: flex; justify-content: space-between; margin: 5px 0; font-size: 0.9rem;}
        .v-bar { width: 100px; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        .v-fill { height: 100%; background: #8bc34a; }
        .v-desc { font-size: 0.8rem; color: #aaa; margin-top: 15px; height: 60px;}
        
        #deploy-btn { margin-top: 40px; padding: 15px 50px; font-size: 1.5rem; font-family: inherit; font-weight: bold; background: #8bc34a; color: #000; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        #deploy-btn:hover:not(:disabled) { background: #ffeb3b; box-shadow: 0 0 20px #ffeb3b; }
        #deploy-btn:disabled { background: #555; cursor: not-allowed; }

        #pause-menu { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        
        .damage-pulse { animation: pulseRed 0.5s infinite; }
        @keyframes pulseRed { 0% { box-shadow: inset 0 0 0px red; } 50% { box-shadow: inset 0 0 50px red; } 100% { box-shadow: inset 0 0 0px red; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>
    <canvas id="hud-canvas"></canvas>

    <div id="ui-layer">
        <h1>Twisted Web</h1>
        <div class="subtitle">Select Intercept Vehicle</div>
        <div class="vehicle-grid" id="v-grid"></div>
        <button id="deploy-btn" disabled>DEPLOY</button>
    </div>

    <div id="pause-menu" class="hidden">
        <h1>PAUSED</h1>
        <p>Press ESC to resume</p>
        <p>Controls: WASD to Drive | F to Deploy | C for Camera | Right-click Drag to Look | Scroll to Zoom</p>
    </div>

    <script>
        // --- DATA & CONFIG ---
        const VEHICLES = [
            { id: 'dom3', name: 'Dominator 3', speed: 7, armor: 9, handling: 6, desc: 'Armored interceptor. F: Hydraulic spikes lock to ground.', color: 0x8b0000 },
            { id: 'tiv2', name: 'TIV 2', speed: 4, armor: 10, handling: 3, desc: 'Massive tank. F: Deploy ground blades & thrusters.', color: 0x333333 },
            { id: 'twistex', name: 'TWISTEX Probe', speed: 6, armor: 7, handling: 7, desc: 'Utility truck. F: Launch independent probe.', color: 0xffffff },
            { id: 'riv', name: 'RIV', speed: 10, armor: 4, handling: 9, desc: 'Fast sports car. F: Turbo boost (3s duration).', color: 0x0055ff },
            { id: 'van', name: 'Research Van', speed: 5, armor: 6, handling: 5, desc: 'Mobile lab. F: Deploy radar mast (earns data).', color: 0xcccccc }
        ];

        let selectedVehicleId = null;
        let gameState = 'menu'; // menu, playing, paused
        let dataPoints = 0;

        // --- AUDIO SYSTEM (Web Audio API) ---
        const AudioSys = {
            ctx: null,
            windGain: null,
            engineOsc: null,
            init() {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                
                // Wind noise (buffer noise)
                const bufferSize = this.ctx.sampleRate * 2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noiseSource = this.ctx.createBufferSource();
                noiseSource.buffer = buffer;
                noiseSource.loop = true;
                
                const windFilter = this.ctx.createBiquadFilter();
                windFilter.type = 'lowpass';
                windFilter.frequency.value = 400;
                
                this.windGain = this.ctx.createGain();
                this.windGain.gain.value = 0;
                
                noiseSource.connect(windFilter);
                windFilter.connect(this.windGain);
                this.windGain.connect(this.ctx.destination);
                noiseSource.start();

                // Engine
                this.engineOsc = this.ctx.createOscillator();
                this.engineOsc.type = 'sawtooth';
                this.engineOsc.frequency.value = 50;
                const engineGain = this.ctx.createGain();
                engineGain.gain.value = 0.05;
                this.engineOsc.connect(engineGain);
                engineGain.connect(this.ctx.destination);
                this.engineOsc.start();
            },
            updateWind(proximity) { // 0 to 1
                if(!this.ctx) return;
                this.windGain.gain.setTargetAtTime(proximity * 0.5, this.ctx.currentTime, 0.1);
            },
            updateEngine(speedRatio) {
                if(!this.ctx) return;
                this.engineOsc.frequency.setTargetAtTime(50 + speedRatio * 100, this.ctx.currentTime, 0.1);
            },
            playBang() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            },
            playDeploy() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.2);
                osc.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.2);
            }
        };

        // --- CORE ENGINES ---
        const canvas = document.getElementById('game-canvas');
        const hudCanvas = document.getElementById('hud-canvas');
        const hudCtx = hudCanvas.getContext('2d');
        
        let scene, camera, renderer, dirLight, ambientLight, skyMesh;
        let player, tornado, terrain;
        let buildings = [];
        let particles = [];
        let time = 0;

        const Input = {
            keys: { w:false, a:false, s:false, d:false },
            mouse: { rightDown: false, x: 0, y: 0, deltaX: 0, deltaY: 0 },
            camMode: 0, // 0: Chase, 1: Hood, 2: Cinematic, 3: Overhead
            orbitAngleX: 0, orbitAngleY: Math.PI/6, zoom: 20
        };

        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x2a3b2a, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);

            dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(100, 200, 50);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 200;
            dirLight.shadow.camera.bottom = -200;
            dirLight.shadow.camera.left = -200;
            dirLight.shadow.camera.right = 200;
            scene.add(dirLight);

            // Sky Dome
            const skyGeo = new THREE.SphereGeometry(1000, 32, 15);
            const skyMat = new THREE.MeshBasicMaterial({ color: 0x5c705c, side: THREE.BackSide });
            skyMesh = new THREE.Mesh(skyGeo, skyMat);
            scene.add(skyMesh);

            createWorld();
            
            window.addEventListener('resize', onWindowResize);
            setupInputs();
        }

        function createWorld() {
            // Terrain
            const planeGeo = new THREE.PlaneGeometry(2000, 2000, 32, 32);
            const planeMat = new THREE.MeshStandardMaterial({ color: 0x3d4a32, roughness: 0.9 });
            terrain = new THREE.Mesh(planeGeo, planeMat);
            terrain.rotation.x = -Math.PI / 2;
            terrain.receiveShadow = true;
            scene.add(terrain);

            // Roads (Grid)
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xddaa00 });
            for(let i=-2; i<=2; i++) {
                // NS Roads
                const roadGeoNS = new THREE.BoxGeometry(10, 0.2, 2000);
                const rNS = new THREE.Mesh(roadGeoNS, roadMat);
                rNS.position.set(i * 400, 0.1, 0);
                rNS.receiveShadow = true;
                scene.add(rNS);
                const lineNS = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 2000), lineMat);
                lineNS.position.set(i*400, 0.15, 0);
                scene.add(lineNS);

                // EW Roads
                const roadGeoEW = new THREE.BoxGeometry(2000, 0.2, 10);
                const rEW = new THREE.Mesh(roadGeoEW, roadMat);
                rEW.position.set(0, 0.1, i * 400);
                rEW.receiveShadow = true;
                scene.add(rEW);
            }

            // Props (Houses/Silos)
            const houseGeo = new THREE.BoxGeometry(8, 6, 8);
            const siloGeo = new THREE.CylinderGeometry(4, 4, 15, 16);
            const mat1 = new THREE.MeshStandardMaterial({ color: 0x883322 });
            const mat2 = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });

            for(let i=0; i<50; i++) {
                let x = (Math.random() - 0.5) * 1800;
                let z = (Math.random() - 0.5) * 1800;
                if(Math.abs(x % 400) < 20 || Math.abs(z % 400) < 20) continue; // Keep off roads
                
                let isSilo = Math.random() > 0.7;
                let mesh = new THREE.Mesh(isSilo ? siloGeo : houseGeo, isSilo ? mat2 : mat1);
                mesh.position.set(x, isSilo ? 7.5 : 3, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                buildings.push({ mesh, active: true, size: isSilo? 4 : 5 });
            }
        }

        // --- VEHICLE CLASSES ---
        class Vehicle {
            constructor(data) {
                this.data = data;
                this.group = new THREE.Group();
                this.health = 100;
                this.speed = 0;
                this.maxSpeed = data.speed * 4;
                this.turnSpeed = data.handling * 0.005;
                this.armor = data.armor;
                
                this.isDeployed = false;
                this.deployCooldown = 0;
                this.airbagsActive = false;
                this.airbags = [];
                
                this.buildGeometry();
                scene.add(this.group);
            }

            buildGeometry() {
                const mat = new THREE.MeshStandardMaterial({ color: this.data.color });
                const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
                
                // Base chassis
                let chassisGeo;
                if(this.data.id === 'van') chassisGeo = new THREE.BoxGeometry(2.5, 3, 5.5);
                else if(this.data.id === 'tiv2') chassisGeo = new THREE.BoxGeometry(3.5, 2, 6);
                else if(this.data.id === 'riv') chassisGeo = new THREE.BoxGeometry(2.2, 1.2, 4.8);
                else chassisGeo = new THREE.BoxGeometry(2.5, 1.8, 5); // Dom3/Twistex
                
                const chassis = new THREE.Mesh(chassisGeo, mat);
                chassis.position.y = 1.2;
                chassis.castShadow = true;
                this.group.add(chassis);

                // Add wheels
                const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
                wheelGeo.rotateZ(Math.PI/2);
                const wx = this.data.id === 'tiv2' ? 1.8 : 1.3;
                const positions = [[wx, 0.5, 1.5], [-wx, 0.5, 1.5], [wx, 0.5, -1.5], [-wx, 0.5, -1.5]];
                positions.forEach(pos => {
                    let w = new THREE.Mesh(wheelGeo, darkMat);
                    w.position.set(...pos);
                    this.group.add(w);
                });

                // Vehicle specific deploy parts & Airbags
                const bagGeo = new THREE.SphereGeometry(1, 16, 16);
                const bagMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent:true, opacity:0.8 });
                
                const addAirbag = (x,y,z) => {
                    let b = new THREE.Mesh(bagGeo, bagMat);
                    b.position.set(x,y,z);
                    b.scale.set(0.01,0.01,0.01);
                    this.group.add(b);
                    this.airbags.push(b);
                };

                addAirbag(0, 1.5, 2.5); // Front
                addAirbag(1.5, 1.5, 0); // Right
                addAirbag(-1.5, 1.5, 0); // Left

                if(this.data.id === 'dom3') {
                    this.deployParts = [];
                    const spikeGeo = new THREE.BoxGeometry(0.2, 2, 0.2);
                    for(let i=0; i<4; i++) {
                        let s = new THREE.Mesh(spikeGeo, darkMat);
                        s.position.set(positions[i][0], 1, positions[i][2]);
                        this.group.add(s);
                        this.deployParts.push(s);
                    }
                } else if(this.data.id === 'tiv2') {
                    this.deployParts = [];
                    const bladeGeo = new THREE.BoxGeometry(0.5, 1.5, 4);
                    let b1 = new THREE.Mesh(bladeGeo, darkMat); b1.position.set(2, 1, 0);
                    let b2 = new THREE.Mesh(bladeGeo, darkMat); b2.position.set(-2, 1, 0);
                    this.group.add(b1); this.group.add(b2);
                    this.deployParts.push(b1, b2);
                } else if(this.data.id === 'van') {
                    this.deployParts = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,3), darkMat);
                    this.deployParts.position.set(0, 2, -1);
                    this.group.add(this.deployParts);
                }
            }

            update(dt) {
                if(this.deployCooldown > 0) this.deployCooldown -= dt;

                // Handle Deploy logic
                if(Input.keys.f && this.deployCooldown <= 0) {
                    this.isDeployed = !this.isDeployed;
                    this.deployCooldown = 5; // 5 sec cooldown toggle
                    AudioSys.playDeploy();
                    
                    if(this.data.id === 'riv' && this.isDeployed) {
                        this.speed = this.maxSpeed * 2; // Turbo burst
                        setTimeout(() => this.isDeployed = false, 3000);
                    }
                    if(this.data.id === 'twistex' && this.isDeployed) {
                        dataPoints += 100; // instant bonus for probe
                        this.isDeployed = false;
                    }
                }

                // Passive van data
                if(this.data.id === 'van' && this.isDeployed && this.speed < 1) {
                    dataPoints += 1;
                }

                // Animate deploy parts
                if(this.data.id === 'dom3') {
                    this.deployParts.forEach(p => p.position.y = THREE.MathUtils.lerp(p.position.y, this.isDeployed ? 0 : 1, 0.1));
                } else if(this.data.id === 'tiv2') {
                    this.deployParts[0].position.x = THREE.MathUtils.lerp(this.deployParts[0].position.x, this.isDeployed ? 2.5 : 2, 0.1);
                    this.deployParts[1].position.x = THREE.MathUtils.lerp(this.deployParts[1].position.x, this.isDeployed ? -2.5 : -2, 0.1);
                } else if(this.data.id === 'van') {
                    this.deployParts.position.y = THREE.MathUtils.lerp(this.deployParts.position.y, this.isDeployed ? 4 : 2, 0.1);
                }

                // Driving physics
                if(!this.isDeployed || this.data.id === 'riv' || this.data.id === 'twistex') {
                    if(Input.keys.w) this.speed += 0.5;
                    else if(Input.keys.s) this.speed -= 0.5;
                    else this.speed *= 0.95; // friction
                } else {
                    this.speed *= 0.8; // anchored brake
                }

                this.speed = Math.max(-this.maxSpeed/2, Math.min(this.speed, this.maxSpeed));
                
                if(Math.abs(this.speed) > 0.1) {
                    if(Input.keys.a) this.group.rotation.y += this.turnSpeed * (this.speed>0?1:-1);
                    if(Input.keys.d) this.group.rotation.y -= this.turnSpeed * (this.speed>0?1:-1);
                }

                this.group.translateZ(-this.speed * dt); // Move forward

                // Bounds
                if(this.group.position.x > 950) this.group.position.x = 950;
                if(this.group.position.x < -950) this.group.position.x = -950;
                if(this.group.position.z > 950) this.group.position.z = 950;
                if(this.group.position.z < -950) this.group.position.z = -950;

                // Airbag animation
                if(this.airbagsActive) {
                    this.airbags.forEach(b => {
                        b.scale.set(THREE.MathUtils.lerp(b.scale.x, 1, 0.2), THREE.MathUtils.lerp(b.scale.y, 1, 0.2), THREE.MathUtils.lerp(b.scale.z, 1, 0.2));
                    });
                } else {
                    this.airbags.forEach(b => {
                        b.scale.set(THREE.MathUtils.lerp(b.scale.x, 0.01, 0.1), THREE.MathUtils.lerp(b.scale.y, 0.01, 0.1), THREE.MathUtils.lerp(b.scale.z, 0.01, 0.1));
                    });
                }
            }

            triggerCollision(impact) {
                if(this.airbagsActive || impact < 2) return;
                
                let damage = impact * (10 / this.armor);
                this.health -= damage;
                
                this.airbagsActive = true;
                AudioSys.playBang();
                document.body.classList.add('damage-pulse');
                
                setTimeout(() => {
                    this.airbagsActive = false;
                    document.body.classList.remove('damage-pulse');
                }, 3000);

                if(this.health <= 0) {
                    // Game Over scenario
                    gameState = 'menu';
                    document.getElementById('ui-layer').classList.remove('hidden');
                    document.getElementById('ui-layer').innerHTML = `<h1>VEHICLE DESTROYED</h1><p>Data Collected: ${dataPoints}</p><button onclick="location.reload()">RESTART</button>`;
                }
            }
        }

        // --- TORNADO CLASS ---
        class Tornado {
            constructor() {
                this.group = new THREE.Group();
                this.group.position.set(0, 0, -500);
                this.efScale = Math.floor(Math.random() * 6); // 0-5
                this.speed = 10 + Math.random() * 15;
                this.angle = Math.random() * Math.PI * 2;
                
                this.funnelLayers = [];
                const mat = new THREE.MeshStandardMaterial({ color: 0x1a1c1a, transparent: true, opacity: 0.8 });
                
                for(let i=0; i<15; i++) {
                    let radius = 2 + (i * i * 0.3) + (this.efScale * 2);
                    let geo = new THREE.CylinderGeometry(radius*1.2, radius, 10, 16);
                    let mesh = new THREE.Mesh(geo, mat);
                    mesh.position.y = i * 9 + 5;
                    this.funnelLayers.push(mesh);
                    this.group.add(mesh);
                }

                // Debris particles
                const partGeo = new THREE.BufferGeometry();
                const partCount = 500 + this.efScale * 200;
                const posArray = new Float32Array(partCount * 3);
                for(let i=0; i<partCount*3; i++) posArray[i] = (Math.random()-0.5)*100;
                partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const partMat = new THREE.PointsMaterial({ color: 0x555555, size: 2 });
                this.debris = new THREE.Points(partGeo, partMat);
                this.group.add(this.debris);

                scene.add(this.group);
            }

            update(dt, playerPos) {
                // Rotation
                this.group.children.forEach((c, idx) => {
                    c.rotation.y += dt * (5 - idx*0.1);
                });
                
                // Movement (erratic)
                this.angle += (Math.random() - 0.5) * 0.05;
                this.group.position.x += Math.cos(this.angle) * this.speed * dt;
                this.group.position.z += Math.sin(this.angle) * this.speed * dt;

                // Ground scar (simple visualization: leave dark plane)
                if(Math.random() < 0.1) {
                    let scar = new THREE.Mesh(new THREE.PlaneGeometry(20+this.efScale*5, 20+this.efScale*5), new THREE.MeshBasicMaterial({color:0x111111}));
                    scar.rotation.x = -Math.PI/2;
                    scar.position.copy(this.group.position);
                    scar.position.y = 0.15;
                    scene.add(scar);
                }

                // Physics interaction
                let dist = this.group.position.distanceTo(playerPos);
                
                // Wind force
                let pushRadius = 100 + this.efScale * 50;
                if(dist < pushRadius) {
                    let force = (1 - dist/pushRadius) * (this.efScale + 1) * 20;
                    if(player.isDeployed) force *= 0.2; // Resist wind
                    
                    let dir = new THREE.Vector3().subVectors(playerPos, this.group.position).normalize();
                    player.group.position.addScaledVector(dir, force * dt);
                    player.speed *= 0.9; // Drag

                    // Camera shake intensity
                    cameraShake = force * 0.05;

                    if(dist < 20 + this.efScale*5) { // Direct hit
                        player.triggerCollision(5);
                    }
                } else {
                    cameraShake = 0;
                }

                // Building destruction
                buildings.forEach(b => {
                    if(b.active && this.group.position.distanceTo(b.mesh.position) < 30 + this.efScale*5) {
                        b.active = false;
                        b.mesh.scale.set(0.1, 0.1, 0.1); // "Explode"
                        b.mesh.position.y = -10;
                        dataPoints += 50; // Bonus for observing damage
                    }
                });

                return { dist, speed: this.speed * 3.6, ef: this.efScale }; // stats for HUD
            }
        }

        let cameraShake = 0;

        // --- INPUT & CAMERA ---
        function setupInputs() {
            window.addEventListener('keydown', e => {
                if(e.key === 'Escape') togglePause();
                if(gameState !== 'playing') return;
                
                const k = e.key.toLowerCase();
                if(Input.keys.hasOwnProperty(k)) Input.keys[k] = true;
                if(k === 'f') Input.keys.f = true;
                if(k === 'c') Input.camMode = (Input.camMode + 1) % 4;
            });
            window.addEventListener('keyup', e => {
                const k = e.key.toLowerCase();
                if(Input.keys.hasOwnProperty(k)) Input.keys[k] = false;
                if(k === 'f') Input.keys.f = false;
            });

            window.addEventListener('mousedown', e => {
                if(e.button === 2 || e.button === 1) {
                    Input.mouse.rightDown = true;
                    Input.mouse.x = e.clientX;
                    Input.mouse.y = e.clientY;
                }
            });
            window.addEventListener('mouseup', e => {
                if(e.button === 2 || e.button === 1) Input.mouse.rightDown = false;
            });
            window.addEventListener('mousemove', e => {
                if(Input.mouse.rightDown) {
                    Input.orbitAngleX -= (e.clientX - Input.mouse.x) * 0.01;
                    Input.orbitAngleY += (e.clientY - Input.mouse.y) * 0.01;
                    Input.orbitAngleY = Math.max(0.1, Math.min(Math.PI/2.1, Input.orbitAngleY));
                    Input.mouse.x = e.clientX;
                    Input.mouse.y = e.clientY;
                }
            });
            window.addEventListener('wheel', e => {
                Input.zoom += e.deltaY * 0.05;
                Input.zoom = Math.max(5, Math.min(50, Input.zoom));
            });
            
            // Prevent context menu
            document.addEventListener('contextmenu', event => event.preventDefault());
        }

        function updateCamera() {
            if(!player) return;
            const target = player.group.position.clone();
            let camPos = new THREE.Vector3();

            if(Input.camMode === 0) { // Chase
                if(!Input.mouse.rightDown) {
                    // Auto behind
                    Input.orbitAngleX = THREE.MathUtils.lerp(Input.orbitAngleX, player.group.rotation.y, 0.05);
                }
                camPos.set(
                    target.x - Math.sin(Input.orbitAngleX) * Input.zoom * Math.cos(Input.orbitAngleY),
                    target.y + Math.sin(Input.orbitAngleY) * Input.zoom,
                    target.z - Math.cos(Input.orbitAngleX) * Input.zoom * Math.cos(Input.orbitAngleY)
                );
            } else if(Input.camMode === 1) { // Hood
                camPos.set(target.x - Math.sin(player.group.rotation.y)*2, target.y + 2, target.z - Math.cos(player.group.rotation.y)*2);
                target.set(target.x - Math.sin(player.group.rotation.y)*10, target.y + 2, target.z - Math.cos(player.group.rotation.y)*10);
            } else if(Input.camMode === 2) { // Cinematic
                time += 0.01;
                camPos.set(target.x + Math.sin(time)*30, target.y + 10, target.z + Math.cos(time)*30);
            } else if(Input.camMode === 3) { // Overhead
                camPos.set(target.x, target.y + 50, target.z);
            }

            // Shake
            if(cameraShake > 0) {
                camPos.x += (Math.random()-0.5) * cameraShake;
                camPos.y += (Math.random()-0.5) * cameraShake;
                camPos.z += (Math.random()-0.5) * cameraShake;
            }

            camera.position.lerp(camPos, 0.2);
            camera.lookAt(target);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            hudCanvas.width = window.innerWidth;
            hudCanvas.height = window.innerHeight;
        }

        function togglePause() {
            if(gameState === 'playing') {
                gameState = 'paused';
                document.getElementById('pause-menu').classList.remove('hidden');
            } else if(gameState === 'paused') {
                gameState = 'playing';
                document.getElementById('pause-menu').classList.add('hidden');
                lastTime = performance.now();
                animate();
            }
        }

        // --- HUD DRAWING ---
        function drawHUD(tStats) {
            hudCtx.clearRect(0,0, hudCanvas.width, hudCanvas.height);
            
            // Minimap (Top Left)
            const mapSize = 150;
            const mX = 20, mY = 20;
            hudCtx.fillStyle = 'rgba(0,0,0,0.6)';
            hudCtx.fillRect(mX, mY, mapSize, mapSize);
            hudCtx.strokeStyle = '#555';
            hudCtx.strokeRect(mX, mY, mapSize, mapSize);
            
            // Draw player on minimap
            let px = (player.group.position.x / 2000) * mapSize + mapSize/2;
            let py = (player.group.position.z / 2000) * mapSize + mapSize/2;
            hudCtx.fillStyle = '#8bc34a';
            hudCtx.beginPath(); hudCtx.arc(mX+px, mY+py, 3, 0, Math.PI*2); hudCtx.fill();

            // Draw tornado on minimap
            let tx = (tornado.group.position.x / 2000) * mapSize + mapSize/2;
            let ty = (tornado.group.position.z / 2000) * mapSize + mapSize/2;
            hudCtx.fillStyle = 'red';
            hudCtx.beginPath(); hudCtx.arc(mX+tx, mY+ty, 4, 0, Math.PI*2); hudCtx.fill();

            // Stats (Top Right)
            hudCtx.fillStyle = 'white';
            hudCtx.font = '16px monospace';
            hudCtx.textAlign = 'right';
            hudCtx.fillText(`Tornado Distance: ${Math.floor(tStats.dist)}m`, window.innerWidth - 20, 30);
            hudCtx.fillText(`Vortex Speed: ${Math.floor(tStats.speed)} km/h`, window.innerWidth - 20, 50);
            hudCtx.fillStyle = tStats.ef > 3 ? '#ff4444' : '#ffeb3b';
            hudCtx.font = 'bold 24px monospace';
            hudCtx.fillText(`EF-${tStats.ef}`, window.innerWidth - 20, 80);

            // Player Stats (Bottom Left)
            hudCtx.textAlign = 'left';
            hudCtx.font = '16px monospace';
            hudCtx.fillStyle = 'white';
            hudCtx.fillText(`Speed: ${Math.floor(Math.abs(player.speed * 10))} mph`, 20, window.innerHeight - 80);
            
            // Health bar
            hudCtx.fillStyle = 'red';
            hudCtx.fillRect(20, window.innerHeight - 60, 200, 15);
            hudCtx.fillStyle = '#8bc34a';
            hudCtx.fillRect(20, window.innerHeight - 60, player.health * 2, 15);
            hudCtx.strokeStyle = 'white';
            hudCtx.strokeRect(20, window.innerHeight - 60, 200, 15);

            // Deploy Cooldown
            if(player.deployCooldown > 0) {
                hudCtx.fillStyle = 'rgba(255,255,0,0.5)';
                hudCtx.fillRect(20, window.innerHeight - 40, (player.deployCooldown/5)*200, 5);
            } else {
                hudCtx.fillStyle = player.isDeployed ? '#8bc34a' : 'white';
                hudCtx.fillText(player.isDeployed ? "DEPLOYED [F]" : "READY TO DEPLOY [F]", 20, window.innerHeight - 30);
            }

            // Data Points (Bottom Center)
            hudCtx.textAlign = 'center';
            hudCtx.font = '24px monospace';
            hudCtx.fillStyle = '#ffeb3b';
            hudCtx.fillText(`Data: ${Math.floor(dataPoints)}`, window.innerWidth/2, window.innerHeight - 30);

            // Warning Vignette
            if(tStats.dist < 200) {
                let intensity = (1 - tStats.dist/200) * 0.5;
                let grd = hudCtx.createRadialGradient(window.innerWidth/2, window.innerHeight/2, window.innerHeight/3, window.innerWidth/2, window.innerHeight/2, window.innerWidth);
                grd.addColorStop(0, "transparent");
                grd.addColorStop(1, `rgba(255, 0, 0, ${intensity})`);
                hudCtx.fillStyle = grd;
                hudCtx.fillRect(0,0, window.innerWidth, window.innerHeight);
            }
        }

        // --- MAIN LOOP ---
        let lastTime = 0;
        function animate(now) {
            if(gameState !== 'playing') return;
            requestAnimationFrame(animate);
            
            let dt = (now - lastTime) / 1000;
            if(dt > 0.1) dt = 0.1; // clamp
            lastTime = now;

            // Vehicle update
            player.update(dt);
            
            // Tornado update
            let tStats = tornado.update(dt, player.group.position);
            
            // Lighting/Sky logic based on tornado distance
            let stormFactor = Math.max(0, 1 - tStats.dist / 800);
            skyMesh.material.color.setHex(0x5c705c).lerp(new THREE.Color(0x2a3b2a), stormFactor);
            dirLight.intensity = 0.8 * (1 - stormFactor * 0.7);
            
            // Audio update
            AudioSys.updateWind(stormFactor);
            AudioSys.updateEngine(Math.abs(player.speed / player.maxSpeed));

            // Camera & Render
            updateCamera();
            renderer.render(scene, camera);
            
            // HUD
            drawHUD(tStats);
        }

        // --- BOOTSTRAP ---
        function buildMenu() {
            const grid = document.getElementById('v-grid');
            VEHICLES.forEach(v => {
                const card = document.createElement('div');
                card.className = 'vehicle-card';
                card.innerHTML = `
                    <div class="v-name">${v.name}</div>
                    <div class="v-stat"><span>SPD</span><div class="v-bar"><div class="v-fill" style="width:${v.speed*10}%"></div></div></div>
                    <div class="v-stat"><span>AMR</span><div class="v-bar"><div class="v-fill" style="width:${v.armor*10}%"></div></div></div>
                    <div class="v-stat"><span>HND</span><div class="v-bar"><div class="v-fill" style="width:${v.handling*10}%"></div></div></div>
                    <div class="v-desc">${v.desc}</div>
                `;
                card.onclick = () => {
                    document.querySelectorAll('.vehicle-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedVehicleId = v.id;
                    document.getElementById('deploy-btn').disabled = false;
                };
                grid.appendChild(card);
            });

            document.getElementById('deploy-btn').onclick = () => startGame();
        }

        function startGame() {
            document.getElementById('ui-layer').classList.add('hidden');
            
            initThree();
            AudioSys.init();
            
            const vData = VEHICLES.find(v => v.id === selectedVehicleId);
            player = new Vehicle(vData);
            tornado = new Tornado();

            onWindowResize(); // Set correct canvas sizes
            
            gameState = 'playing';
            lastTime = performance.now();
            requestAnimationFrame(animate);
        }

        // Init Menu
        window.onload = buildMenu;

    </script>
</body>
</html>
